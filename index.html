","a":"Both refer to creditors giving their consent to the company breaching covenants. However, a waiver is temporary (e.g., temporary breach due to an unforeseeable event), whereas consent is permanent.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"Would a Section 363 Sale hurt creditors because of the loss of collateral?","a":"The contrary would be true as the sale cannot be completed without the creditors' approval, the key stakeholders in the bankruptcy process whom the sale process should benefit above all else. Thus, a completed sale would imply that no objections were presented to the Court. For example, if the debtor is attempting to sell an asset at a discount far below the fair value, the Court must listen to the creditors\u2019 objections before granting approval/rejection \u2013 but again, the creditors' interests carry more weight than the debtor. In addition, 363 sales enable secured creditors to place credit bids, which can help cancel a portion of the debt amount owed by the debtor. If eligible, the secured creditor can opt to bid on the debt owed to them on which the asset is collateral (i.e., acquire the asset solely using credits and with no cash outflow).","cat":"valuation","diff":2,"src":"Redbook"},{"q":"What is the purpose of bondholder committees?","a":"During an out-of-court bankruptcy, the various lending parties will often band together in a bondholder committee to negotiate with the borrowing company with more leverage. These committees work alongside one another to increase the probability that the borrower will agree to their negotiation terms in the out-of-court restructuring scenario. If needed, the committee may hire a 3rd party Rx advisory shop to help them conduct their analysis and solidify their pitch.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"Why might certain distressed funds be hesitant to join a bondholder committee?","a":"The downside to joining a bondholder committee is the disclosure requirements \u2013 this obligation to disclose security positions is typically why certain distressed funds refuse to join a committee. Once the fund becomes a part of the committee, they must sign an agreement to disclose when they buy or sell securities.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"Why does the holdout problem occur in out-of-court restructurings?","a":"A company cannot unilaterally provide individual creditors with partial recoveries out-of-court \u2013 creditors must agree. This agreement becomes increasingly challenging to get a consensus when there are more parties involved. In these cases, especially when there are many bondholders, bondholders may calculate that if enough other creditors participate, they\u2019ll be better off not participating and insist on a full recovery. In contrast, for in-court restructuring, the recoveries agreed upon applies to the entire class.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"What is a fraudulent conveyance?","a":"Fraudulent conveyance is when the debtor, when the company was considered to be already \"insolvent,\" made a cash, property, or other asset transfer intending to defraud its creditors. The lienholder that claims a fraudulent transfer must prove the company was insolvent when making the sale and that the sale was made to delay or avoid its due obligation to its creditors. If successful, the lienholder can claw back some proceeds.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"What is an equitable subordination?","a":"Although a rare occurrence, secured creditors should be aware of the very unfavorable scenario that the courts could unilaterally equalize all claims under certain circumstances (called \u201cequitable subordination\u201d). The type of situation that would invoke such an uncommon decision and is typically associated with the misconduct of secured creditors with proof of wrongdoing (i.e., \u201cacting in bad faith\u201d). For example, an insider could be acting on the secured creditor\u2019s behalf to influence the debt to the detriment of other creditors.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"Why might the NAV be preferable to a DCF for REITs?","a":"The NAV approach is so well suited for real estate because, unlike other industries, REIT balance sheets carry real estate assets for which there are often comparable assets with observable market values. The NAV approach recalculates a REIT's balance sheet to reflect fair market values of assets using cap rate assumptions. This is simply not feasible for most industries, so a discounted cash flow analysis is often employed instead.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"What are the most common methods for valuing REITs?","a":"REITs Valuation Methods Net Asset Value (\u201cNAV\u201d): Applies to US REITs, where book values are not marked up to their FMV Price to Book (P/B): Applies to IFRS REITs because the book values reflect market value due to IFRS revaluation rules Relative Valuation of REITs: Refers to comps analysis Intrinsic Value of REITs: Used less often but can supplement the more common approaches REIT Valuation Multiples \u201cFFO\u201d Multiple: FFO = Equity Value/Funds from Operations \u201cAFFO\u201d Multiple: AFFO = Equity Value/Adjusted Funds from Operations Intrinsic REIT Valuation Methods Dividend Discount Model (DDM): Unlike other types of businesses, the DDM is suitable for REITs because at least 90% of a REIT's profits must be distributed to shareholders. The DDM discounts all future expected dividends using the cost of equity. Discounted Cash Flow Analysis (DCF): The traditional DCF valuation can be done for REITs as with other industries, but in practice, it's used far less often than the NAV approach.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"What is the trend of servitization in manufacturing?","a":"Simply put, servitization refers to building additional revenue streams for manufacturers from providing more service offerings, rather than depending on a third party. Some of the most common services include replacing spare parts, product repairs, maintenance, overhauls, performance monitoring, and customer service. In the past, the focus was solely on equipment manufacturing. Sales and distribution would be handed off to 3rd party equipment vendors and customers would rely on specialists for product support. Nowadays, manufacturers are selling \"systems,\" focusing on the outcome of their products and providing the services themselves to ensure customer satisfaction. This trend is in-line with the shift towards placing greater emphasis on after-sales service operations to improve customer retention and increase margins.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"How did Industry 4.0 help bridge the gap between OEMs and their customers?","a":"Before the technological advancements and hyper-connectivity from Industry 4.0, the original equipment manufacturer (\u201cOEM\u201d) would produce replacement parts in which service contractors would then perform the planned maintenance and reactive repairs on their behalf. The result is limited visibility into the existing install base and less customer connectivity/engagement. Industrial IoT has allowed OEMs to control uptime and monitor performance throughout the asset and service life-cycle relationship. Also, guaranteed service level agreements (SLAs) are directly put into place and enable better customer relationships.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"What are some basic unit economics for a truck transportation company you would look at to forecast revenue?","a":"To build a revenue model for a trucking transportation company, some key historical metrics necessary first required would be the average number of shipment orders (i.e., transportation hauls) in a year, the average length of each haul in miles, and the total annual shipping revenues. Then you can back into the average revenue per mile driven. Then, to further build out the model with greater specificity, one could look at the number of clients it works with consistently, the current pipeline of shipment orders, and the number of new client contracts it could win in the years ahead. Alternatively, you could forecast the revenue on a per-driver, per-truck, or per-project basis.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"Why does the airline industry have such low margins?","a":"Despite providing an essential transportation service, airlines have historically suffered from razor-thin margins due to their high-fixed cost structure. The cost of purchasing new fleets is very expensive, and the constant need for fleet maintenance, repairs, and geographic footprint all cut into the margins significantly. Each airline has high variable costs (e.g., certified pilots, flight crews, key personnel, airport customer service agents, security services) to worsen the margins that have already been hampered by the highly capitalintensive nature of the industry. Airline companies are also constrained in their ability to cut costs because of how high-stakes each expenditure is. For example, the decision to not repair a damaged plane, spend less on airline security, or reduce the number of flights could have significant reputational repercussions and wipe out a large portion of current and future bookings. There are very few costs/expenses that could be considered being \u201cunnecessary.\u201d Another consideration is the competitive nature of the airline industry with various rival incumbents within the market that compete on pricing, availability of flights, and geographic reach. Therefore, airline businesses must ensure that they get their pricing strategy correct to appeal to customers, which effectively reduces their pricing power and reduces their ability to improve upon their margins.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"Why has the rollout of Waymo and self-driving been done at such a slow pace?","a":"Waymo has long been considered a leading player in the self-driving technology space. Despite their head start, the project has been beset by delays and revisions to commercialization predictions. Given the regulatory challenges they face, safety has become their highest priority as their autonomous vehicles are deployed. One fatal accident could cause this venture to grind to a halt and cause reputational damage from society and mistrust in the technology being used.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"What is additive manufacturing, and what benefits does it provide?","a":"Additive manufacturing (AM), also known as 3D printing, is a technological advancement in industrial production that enables the efficient creation of lighter yet durable parts and systems through layering. AM uses computer-aided-design (CAD) and 3D object scanners to create a customizable, precise product quickly without a deterioration in quality despite the reduced cycle time.","cat":"valuation","diff":2,"src":"Redbook"}];

// ── STATE ─────────────────────────────────────────────────────────────────────
var mode = 'fc';
var cat  = 'all';
var diff = 'all';
var correct = 0, wrong = 0, total = 0, streak = 0, best = 0;
var pool = [], idx = 0, cur = null, answered = false;

// ── INIT ──────────────────────────────────────────────────────────────────────
function init() {
  buildPool();
  showNext();
}

function buildPool() {
  var f = [];
  for (var i = 0; i < QS.length; i++) {
    var q = QS[i];
    if (cat !== 'all' && q.cat !== cat) continue;
    if (diff !== 'all' && q.diff !== parseInt(diff)) continue;
    f.push(q);
  }
  // Shuffle
  for (var i = f.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = f[i]; f[i] = f[j]; f[j] = tmp;
  }
  pool = f;
  idx = 0;
}

function showNext() {
  if (pool.length === 0) {
    document.getElementById('cc').innerHTML = '<div class="empty-msg">No questions match your filters.<br>Try selecting a different topic or difficulty.</div>';
    return;
  }
  if (idx >= pool.length) {
    buildPool();
  }
  cur = pool[idx++];
  answered = false;
  if (mode === 'fc') showFlashcard();
  else showMC();
}

// ── FLASHCARD ─────────────────────────────────────────────────────────────────
function showFlashcard() {
  var q = cur;
  var html = metaHTML(q) +
    '<div class="q-text">' + esc(q.q) + '</div>' +
    '<button class="btn-reveal" onclick="reveal()">Reveal Answer</button>' +
    '<div class="answer-box" id="ans">' + esc(q.a) + '</div>' +
    '<div id="grade-area" style="display:none">' +
      '<div class="grade-row">' +
        '<button class="btn-grade btn-got"  onclick="grade(true)">&#10003; Got It</button>' +
        '<button class="btn-grade btn-missed" onclick="grade(false)">&#10007; Missed</button>' +
      '</div>' +
      '<button class="btn-next" onclick="showNext()">Next Question &#8594;</button>' +
    '</div>';
  document.getElementById('cc').innerHTML = html;
}

function reveal() {
  document.getElementById('ans').classList.add('show');
  document.getElementById('grade-area').style.display = 'block';
  var btn = document.querySelector('.btn-reveal');
  if (btn) btn.style.display = 'none';
}

// ── MULTIPLE CHOICE ───────────────────────────────────────────────────────────
function showMC() {
  var q = cur;
  // Get 3 distractors
  var others = [];
  var tries = 0;
  var usedIdx = {};
  while (others.length < 3 && tries < 200) {
    tries++;
    var ri = Math.floor(Math.random() * pool.length);
    if (usedIdx[ri] || pool[ri] === q) continue;
    usedIdx[ri] = true;
    others.push(pool[ri]);
  }
  // Build options array and shuffle
  var opts = [q].concat(others.slice(0, 3));
  for (var i = opts.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = opts[i]; opts[i] = opts[j]; opts[j] = tmp;
  }
  var correctIdx = opts.indexOf(q);

  var optsHTML = '';
  for (var i = 0; i < opts.length; i++) {
    var letter = String.fromCharCode(65 + i);
    var preview = opts[i].a.length > 140 ? opts[i].a.substring(0, 140) + '...' : opts[i].a;
    optsHTML += '<button class="mc-opt" id="opt' + i + '" onclick="pickMC(' + i + ',' + correctIdx + ')">' +
      '<strong>' + letter + '.</strong> ' + esc(preview) + '</button>';
  }

  var html = metaHTML(q) +
    '<div class="q-text">' + esc(q.q) + '</div>' +
    '<div id="mc-status" class="mc-status"></div>' +
    optsHTML +
    '<div class="expl-box" id="expl"><strong>Full answer:</strong> ' + esc(q.a) + '</div>' +
    '<button class="btn-next" id="mc-next" onclick="showNext()" disabled>Next Question &#8594;</button>';
  document.getElementById('cc').innerHTML = html;
}

function pickMC(picked, correct) {
  if (answered) return;
  answered = true;
  var ok = (picked === correct);
  // Lock all options
  var opts = document.querySelectorAll('.mc-opt');
  for (var i = 0; i < opts.length; i++) {
    opts[i].classList.add('locked');
  }
  document.getElementById('opt' + picked).classList.add(ok ? 'correct' : 'wrong');
  if (!ok) document.getElementById('opt' + correct).classList.add('reveal');
  document.getElementById('expl').classList.add('show');
  document.getElementById('mc-next').disabled = false;
  var status = document.getElementById('mc-status');
  if (ok) {
    status.innerHTML = '<span style="color:var(--green)">&#10003; Correct!</span>';
  } else {
    status.innerHTML = '<span style="color:var(--red)">&#10007; Incorrect</span>';
  }
  grade(ok);
}

// ── SCORING ───────────────────────────────────────────────────────────────────
function grade(ok) {
  if (ok) { correct++; streak++; if (streak > best) best = streak; }
  else     { wrong++;  streak = 0; }
  total++;
  updateStats();
}

function updateStats() {
  document.getElementById('sc').textContent = correct;
  document.getElementById('sw').textContent = wrong;
  document.getElementById('st').textContent = total;
  var s = document.getElementById('ss');
  s.textContent = streak > 0 ? ('\uD83D\uDD25 ' + streak) : (best > 0 ? 'best: ' + best : '\u2014');
  var pct = total > 0 ? Math.round(correct / total * 100) : 0;
  document.getElementById('pfill').style.width = pct + '%';
}

// ── CONTROLS ──────────────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('btn-fc').className = 'pill' + (m === 'fc' ? ' mode-active' : '');
  document.getElementById('btn-mc').className = 'pill' + (m === 'mc' ? ' mode-active' : '');
  buildPool();
  showNext();
}

function setCat(c, btn) {
  cat = c;
  var btns = document.querySelectorAll('#cat-row .pill');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  btn.classList.add('active');
  buildPool();
  showNext();
}

function setDiff(d, btn) {
  diff = d;
  var rows = btn.parentNode.querySelectorAll('.pill');
  for (var i = 0; i < rows.length; i++) rows[i].classList.remove('active');
  btn.classList.add('active');
  buildPool();
  showNext();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function catLabel(c) {
  var m = {accounting:'Accounting',valuation:'Valuation',ma:'M&A',lbo:'LBO',dcf:'DCF',ev:'EV / Equity',brain:'Brain Teaser'};
  return m[c] || c;
}

function metaHTML(q) {
  var dots = '';
  for (var i = 1; i <= 3; i++) dots += '<div class="dot' + (i <= q.diff ? ' lit' : '') + '"></div>';
  return '<div class="q-meta">' +
    '<span class="q-tag tag-' + q.cat + '">' + catLabel(q.cat) + '</span>' +
    '<div class="q-right">' +
      '<div class="q-diff">' + dots + '</div>' +
      '<span class="q-src">' + q.src + '</span>' +
      '<span class="q-counter">' + idx + '/' + pool.length + '</span>' +
    '</div>' +
  '</div>';
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
