traction is common?","a":"For large-sized companies undergoing LBOs, it's normal to see minor multiple contractions. The reason is that as the company grows larger, the number of potential bidders that could afford to purchase the company grows smaller (i.e., a reduced pool of prospective buyers with sufficient capital). Since there's less competition, this usually leads to a lower purchase price. This company could undergo an IPO, but this would depend on the situation, and a minor contraction in the exit multiple would not impair returns to the fund, especially since the expanded size of the company implies there was revenue and EBITDA growth, as well as debt paydown.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What value does the company's products/services provide to their customers?","a":"Which factors make the company\u2019s revenue recurring? Are there any long-term customer contracts? Where does the team see new opportunities for growth or operational improvements?","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What is a management buyout (MBO)?","a":"A management buyout is a leveraged buyout where a significant portion of the post-LBO equity comes from the previous management team. The typical premise behind an MBO is that the management team believes it can operate the company better and create more value under their direction. An MBO usually coincides with recent underperformance and scrutiny from a company's shareholder base. Management will usually provide cash equity and rollover any existing equity. In addition, equity financing can also include financial sponsors or other investors. The debt financing portion of the MBO, other than the rollover amount, is similar to that of a traditional LBO.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What is rollover equity and why do private equity firms perceive it as a positive sign?","a":"The existing management team will occasionally rollover some (or all) of its equity into the newly acquired company and may even contribute additional capital alongside the financial sponsor. The rollover equity is an additional source of funds, and it reduces the amount of leverage needed to be raised and the equity contribution from the financial sponsor to complete the deal.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"When might a PE firm prefer to use term loans rather than subordinated notes in an LBO?","a":"Term loans are a cheaper form of debt with lower interest rates, and most PE firms will first maximize the amount that banks and institutional lenders will provide before raising riskier forms of financing. Since optional repayments are typically allowed with term loans, there's greater flexibility. In addition, if the company is expecting to be active in terms of M&A activity (e.g., add-ons, divestitures), the restrictive incurrence covenants associated with subordinated notes should be considered.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"Would a private equity firm prefer high growth or stability in revenue?","a":"The vast majority of traditional buyout firms would choose stability in revenue over rapid growth. Given the capital structure considerations and usage of high leverage, most buyout-focused PE firms would choose consistent, predictable revenue over high growth if the decision were mutually exclusive.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"Why might a higher average selling price (ASP) or average order value (AOV) not always be better?","a":"While pricing power is a lever for revenue growth, an overly expensive product decreases the number of potential buyers due to the product being out of their price range. Therefore, there must be a balance between having high pricing from product quality and being able to reach a large enough market for there to be opportunities for expansion and new customer acquisitions.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"When might customer concentration be considered being at a manageable level?","a":"An exception to the customer concentration risk will be if there are irrevocable contracts in place (i.e., longterm customer agreements). This contractual obligation between the company and the customer being served makes the concentration risk more tolerable but could still lead to a discount on the purchase price.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What does \u201cmultiple arbitrage\u201d in a roll-up acquisition scenario imply?","a":"One key reason add-ons are common in private equity is that the acquisition target will often be valued at a lower multiple than the acquirer and thus be an accretive transaction. After the transaction has closed, the newly acquired company's cash flows will be valued at the same multiple as the platform company before any operational improvements or integrations are made. A private equity firm has tripled its initial investment in five years, estimate the IRR?","cat":"lbo","diff":2,"src":"Redbook"},{"q":"If an LBO target had no existing debt on its closing balance sheet, would this increase the returns to the financial buyer?","a":"Upon completing an LBO, the firm has essentially wiped out the existing capital Since an LBO would structure and recapitalized it using the sources of funds raised. For the most part, involve the capital the pre-acquisition capital structure, therefore, has no impact because it doesn't structure of a target directly affect the primary return drivers. being replaced, any pre-LBO debt would The returns to a financial sponsor are based on 1) the initial equity contribution have no direct cash outflow and 2) all cash inflows received throughout the holding period such as impact on returns. dividends, monitoring fees, and most notably the exit proceeds. There are a few minor considerations such as the management team being inexperienced with running a company using leverage (and the lower margin of error). This might be brought up as a risk during debt financing, but it would be a relatively insignificant detail. Where do financial sponsors typically get their capital? Financial sponsors raise capital to fund their investments from insurance companies, pension funds, sovereign wealth funds, endowments, high net worth individuals, and financial institutions. In the private markets, what does \"dry powder\" mean? The term dry powder is defined as the amount of committed but unallocated capital a firm has on hand. This the available cash that's waiting to be deployed on the side-lines. Dry powder mounting at record-high levels signifies fewer investment opportunities in the market that fit private equity firms' criteria. The purchase multiples usually increase during these times as auction processes become more competitive.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What is a distribution waterfall schedule in private equity?","a":"The distribution waterfall is the allocation schedule that shows the distribution of proceeds from an investment to the various stakeholders in a systematic order based on their claims' priority. Each stakeholder would have a different claim on the pool of profits based on the security they hold. However, this is based on the relationship dynamics between the GPs and their LPs in the private equity industry. Classic PE Distribution Waterfall 1. The initial investment from the LPs will first be returned in full, along with any returns related to a fund\u2019s pre-determined minimum hurdle rate. 2. Then, 20% of the returns will be distributed to the GPs due to the catch-up clause. 3. The remaining excess proceeds would then be split 80% to the LP and 20% to the GP. The percentages can vary, but the 80/20 split is the industry standard. In the distribution waterfall in private equity, what is the catch-up clause? The catch-up clause will be outlined in the contract with the private equity fund's LPs. It states that once the LPs have received a specified return (usually their initial investment plus a hurdle rate), the GPs receive the majority (or all) of the profits until the return proportion outlined in the agreement is met so that the GPs' return will \u201ccatch-up\u201d to the original agreed-upon split since the LPs were paid first.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What is the difference between a recapitalization and an LBO?","a":"LBOs are accounted for as an acquisition, meaning assets are written-up, and goodwill is recognized. Recapitalizations are mechanically similar but are not accounted for as an acquisition \u2013 thus, the asset bases carryover and remain unchanged with no goodwill recognized. Since no goodwill is recognized, negative equity is often created because the offer price is often higher than the book value of equity.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What is the impact of the 2017 tax reform on the private equity industry?","a":"1. The most significant change was that corporate tax rates were reduced from 35% to 21%. There were also reductions to S Corporations/LLCs, but the impact is a bit murkier and minor. 2. Companies face limits on how much interest expense can be deducted for tax purposes. While the formula is a little more complicated, companies can roughly deduct interest up to 30% of their EBITDA. This offsets the lower tax rate benefits for highly levered companies. 3. Companies can now accelerate depreciation for tax purposes even more than they could before, which lowers upfront tax bills. This lowers taxes further for capital intensive businesses. 4. Companies can no longer carryback NOLs, but they can carryforward indefinitely instead of just 20 years. Also, companies can use NOLs to offset only 80% of current period income (before tax reform, NOLs could offset 100% of current period income). For private equity funds, the limited partnership is called a \u201cblind pool.\u201d What does this mean?","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What is the purpose of the \u201cSources & Uses\u201d section of an LBO model?","a":"The \u201cSources & Uses\u201d section outlines the amount of capital required to complete the transaction and how the proposed deal will be funded. Uses Side: The \u201cUses\u201d side answers, \u201cWhat does the firm need to buy, and how much will it cost?\u201d The most significant usage of funds in an LBO is the buyout of equity from the target\u2019s existing shareholders. Other uses include transaction fees paid to M&A advisors, financing fees, and the refinancing of existing debt (i.e., replacing the debt) if applicable. Sources Side: The \u201cSources\u201d side tells us, \u201cWhere is the funding coming from?\u201d The most common sources of funds are various debt instruments, the equity contribution from the financial sponsor, excess cash on the balance sheet, and sometimes management rollover. From the private equity firm's perspective, the key component being quantified is the amount of equity required to be contributed.","cat":"lbo","diff":3,"src":"Redbook"},{"q":"How would you measure the credit health of a pre-LBO target company?","a":"The two most common types of credit ratios used are leverage ratios and interest coverage ratios. The leverage ratio parameters will depend on the industry and the lending environment. However, the total leverage ratio (total debt/EBITDA) in an LBO ranges between 5.0x to 7.0x, with the senior debt ratio (senior debt/EBITDA) around 3.0x. For interest coverage ratio parameters, as a general rule of thumb: the higher the interest coverage ratio, the better. The interest coverage ratio should be at least 2.0x in the first year post-buyout.","cat":"lbo","diff":3,"src":"Redbook"},{"q":"Why is LBO analysis used as a floor valuation when analyzing company value using several valuation methodologies?","a":"In private equity, the \u201churdle rate\u201d is the rate of return that financial sponsors are An LBO is called a required to meet (and ideally exceed) to undertake an LBO. An LBO model provides \"floor valuation\" a floor valuation for an investment, as it's used to determine what a financial because it's used to sponsor can pay for the target while still realizing the minimum 15% to 25% IRR. determine the This is due to the risks associated with leverage and relatively short investment horizons, as well as the return expectations from their fund\u2019s LPs. These hurdle rates are usually higher than the cost of equity capital on the same business without those LBO-specific risks. Thus, the present value (or valuation) implied, given those higher hurdle rates, will be lower than the valuation of the company when analyzed through the traditional DCF and comps approaches. maximum purchase price the PE firm can pay to achieve the fund's minimum IRR threshold.","cat":"lbo","diff":3,"src":"Redbook"},{"q":"When analyzing the viability of undertaking an LBO, how do private equity firms estimate the company's value in the exit year?","a":"The most common approach is to assume that the private equity firm will exit at the same EV/EBITDA multiple at which the target company was acquired. For example, if sponsors are contemplating an LBO where the purchase price reflects a 10.0x EV/EBITDA multiple, the exit year assumption (usually 5-7 years from the LBO date) will probably be the same 10.0x multiple. Because of the importance of this assumption in determining the attractiveness of the deal to a financial sponsor (i.e., the deal\u2019s IRR), this exit multiple assumption is sensitized, and IRRs are presented in a range of various exit scenarios. If you had to choose two variables to sensitize in an LBO model, which ones would you pick? The two variables chosen would be the entry and exit multiple, as no other variables have the same level of impact on the returns in an LBO. The ideal scenario for a financial sponsor is to purchase the target at a lower multiple and then exit at a higher multiple, leading to profitable returns. Some other variables to include in the sensitivity tables are revenue growth, total leverage turns (the leverage multiple at purchase), and the EBITDA margin.","cat":"lbo","diff":3,"src":"Redbook"},{"q":"What are the capex and net working capital requirement considerations for a private equity firm looking at a potential investment?","a":"Lower capex and From the perspective of an LBO investor, high capex and net working capital are NWC requirements both viewed negatively as it implies the company requires more usage of cash to means that more fund operations and grow. Both capex and increases in NWC represent outflows of free cash flow can be cash, which means less free cash flow can be used to service interest payments, used to paydown paydown debt principal, and reinvest into the business. debt and reinvest into operations. For traditional buyout candidates, the capex needs should be limited, with most of the spending being related to maintenance. If a mature company has high capex and NWC requirements, it implies the company is in an industry with an unfavorable cost structure, meaning maintenance capex by itself is on the higher end and more cash is tied up in the operations through NWC. If management decides to rollover equity, how would you calculate their new ownership stake and proceeds received at exit? First, the management rollover amount would be either a hardcoded input of the contribution amount in dollars or as a percentage of the new equity. Rollover Equity = Total Equity \u00d7 Rollover Equity % The management\u2019s ownership stake in the post-LBO company will be calculated as the rollover equity amount divided by the new equity amount, plus the rollover equity amount. New Ownership Stake = Rollover Equity Amount (Rollover Equity Amount + New Equity) At exit, the amount of proceeds received by multiplying the exit equity value by the implied ownership by the management team that rolled over their equity. Alternatively, this could be based on a percentage of the excess value creation over the initial equity investment or structured with a liquidation preference in which management doesn't receive any proceeds unless a returns threshold is met. Rollover Equity Proceeds = Exit Equity Value \u00d7 Management Implied Ownership %","cat":"lbo","diff":3,"src":"Redbook"},{"q":"What are the two most common return metrics used by private equity firms?","a":"The two most common return metrics used in private equity are the IRR and MoM: 1. Internal Rate of Return (IRR): IRR estimates the rate of return an investment will yield. In other words, IRR is the effective compounded annual interest rate on an investment. The IRR accounts for the periods in which the proceeds are received (and thus \u201ctime-weighted\u201d). FV ( t ) Internal Rate of Return (IRR) = ( ) \u2013 1 PV 2. Multiple of Money (MoM): Otherwise referred to as the cash-on-cash return or multiple on invested capital (MOIC), the MoM is the total inflows divided by the total outflows from the investor's perspective. MoM compares the amount of equity the sponsor takes out relative to the initial equity contribution. MoM = Total Cash Inflows Total Cash Outflows If you're given the multiple of money (MoM) of an investment and the number of years the investment was held, what is the formula to calculate the internal rate of return (IRR)? The IRR can be calculated using the MoM and number of years (t) using the formula below: ( ) Internal Rate of Return (IRR) = MoM t \u2013 1","cat":"lbo","diff":3,"src":"Redbook"},{"q":"What levers have a positive/negative impact on the IRR of an investment?","a":"Positive IRR Levers Negative IRR Levers Earlier Extraction of Proceeds: Can be achieved Delayed Receipt of Proceeds: Often caused by a sale through a dividend recapitalization, an earlier than pushed back to a later date due to lack of buyer expected sale, the receipt of cash interest (as opposed interest or unfavorable market conditions, receipt of to PIK interest, for debt investors), and annual PIK interest (for debt investors) monitoring fees paid to the sponsor Increased FCFs: Results from strong revenue generation, EBITDA growth, and an improved margin profile \u2013 which all result in more debt being paid down throughout the holding period Decreased FCFs: Caused by falling short of initial forecasts or decreased profit margins from external factors (e.g., higher unit costs) \u2013 the result is less debt being paid down in total Multiple Expansion: Entails exiting at a higher multiple than the entry multiple Multiple Contraction: Investment is exited at a lower multiple than the purchase multiple","cat":"lbo","diff":3,"src":"Redbook"},{"q":"When measuring returns, why is it necessary to look at both the IRR and MoM?","a":"The MoM cannot be a standalone metric as it doesn't consider the time value of Over shorter time money, unlike the IRR calculation. For instance, a 3.0x multiple may be impressive if frames, the MoM is achieved in five years, but the multiple remains the same, whether it took five years more important or thirty years to receive those proceeds. than the IRR; however, over IRR is an imperfect standalone measure because it's highly sensitive to timing. For longer time frames, example, a private equity firm issuing itself a dividend soon after the acquisition achieving a higher increases the IRR, but the MoM may have been sub-par (making the IRR misleading IRR is more in this case). important. Tell me how you would calculate IRR in Excel. To determine the IRR of any investment, you need the magnitude of the cash outflows/inflows and their corresponding dates. Avoid stating the IRR Excel function would be used, as it only gives you the option to do annual periods. The IRR function assumes that each cell is separated by precisely twelve months, which would be unrealistic. Instead, use \u201c= XIRR (Range of CFs, Range of Timing),\u201d in which you'll drag the selection across the range of cash inflows/outflows and then across the corresponding dates. The initial cash outflow (i.e., the financial sponsor's equity contribution) needs to be negative since the investment is an outflow of cash. Then, cash inflows such as dividends, consulting fees, and exit proceeds are inputted as positives.","cat":"lbo","diff":3,"src":"Redbook"},{"q":"If a business that underwent an LBO has been operating as intended, why does the private equity firm not hold on to the investment for a longer duration (e.g., 10+ years)?","a":"The average holding of a private equity firm is about 5 to 7 years. Traditional private equity firms, unlike pension funds that target lower IRRs of around ~8-10%, cannot hold on to portfolio companies for longer durations since they raise capital in fund structures, and therefore have to return money to their limited partners (LPs) many times before fundraising for their next fund. Besides the need to return capital to investors in the current fund, IRR is one of the LPs' primary metrics to evaluate PE firms' performance. From a firm marketability perspective, it would also be beneficial to avoid holding onto an investment for too long as doing so decreases the fund\u2019s IRR. In the situation when a private equity firm has the option to exit within a 1 to 2-year time frame, why might the firm be reluctant to proceed with the sale? Unless the returns realized are an anomaly, PE firms want to avoid holding onto a company for only 1 to 2 years since the capital has to be redeployed. The decision will depend on the deal environment and opportunities present in the market as finding another suitable investment could take a long time. The opportunity cost of having to find a replacement deal will have to be weighed by the firm. In addition, the transaction costs would be another side consideration.","cat":"lbo","diff":3,"src":"Redbook"},{"q":"How would you calculate the levered free cash flow yield for private equity investment, and when would it be used?","a":"Although used far less often than the IRR and MoM, the levered free cash flow yield (FCFY) can be a useful metric for assessing a private equity investment's performance. 1. The first step to calculating the levered FCFY is to calculate the levered free cash flow. Recall, this investment is from a private equity firm's perspective, so we must deduct interest payments and mandatory debt pay down. Levered FCF = EBITDA \u2013 Taxes \u2013 Interest \u2013 Capex \u2013 Increase in NWC \u2212 Mandatory Debt Amortization 2. Now that we have the levered FCF, the only remaining calculation is to divide the levered FCF by the initial equity investment amount. Levered Free Cash Flow Yield (FCFY) = Levered Free Cash Flow Initial Equity Investment There is no set levered FCFY that PE firms target since it'll vary not only by industry but by other factors such as the financing mix, total ownership percentage, and required amortization by debt. However, the higher the levered FCFY, the better since this implies the company is generating cash that can be used to reinvest into the business or payout a special dividend. If a private equity firm wanted to see how its investment was performing, then the levered FCF yield is one metric they could use. So rather than the percentage amount, what matters more is the year-over-year growth (YoY). If the levered free cash flow becomes a larger proportion than the firm's initial equity contribution, it's a positive sign as that would signify downside protection above all else. If we had not deducted interest and the mandatory debt amortization in calculating the free cash flow above, what metric would we be measuring? If that were the case, we would have calculated the unlevered free cash flow. To get to the unlevered FCF yield, the denominator would be enterprise value to match the cash flows. Unlevered Free Cash Flow Unlevered Free Cash Flow Yield = Entry Enterprise Value The unlevered FCF yield would tell the investor how the overall company is performing on an operational level, and it can tell us how much FCF remains to reinvest into the business and pay a dividend to equity holders, as well as the amount that can be used to paydown debt.","cat":"lbo","diff":3,"src":"Redbook"},{"q":"How does the accounting treatment of financing fees differ from transaction fees in an LBO?","a":"Financing Fees: Financing fees are related to raising debt or issuing equity. These fees are capitalized and amortized over the debt's maturity (~5-7 years). Transaction Fees: Transaction fees refer to the M&A advisory fees paid to investment banks or business brokers, as well as the legal fees paid to lawyers. Unlike financing fees, transaction fees cannot be amortized and are classified as one-time expenses deducted from a company\u2019s retained earnings.","cat":"lbo","diff":3,"src":"Redbook"},{"q":"If an acquirer writes-up the value of the intangible assets of a target, how are goodwill and amortization impacted?","a":"During an LBO, intangible assets such as patents, copyrights, and trademarks are often written-up in value. Recall that goodwill is simply an accounting concept used to \u201cplug\u201d the difference between the purchase price and fair value of the assets in the closing balance sheet \u2013 so a higher write-up means the assets being purchased are actually worth more. Therefore, a higher write-up of intangible assets means less goodwill will be created on the transaction date. Publicly traded companies cannot amortize goodwill under US GAAP \u2013 however, private companies can opt to amortize goodwill for tax reporting purposes. This question is specifically regarding the purchase accounting on the closing date of the transaction.","cat":"lbo","diff":3,"src":"Redbook"},{"q":"What does a cash sweep refer to in LBO modeling?","a":"A cash sweep is when the excess free cash flow after revolver repayments is used to make optional repayments on debt, assuming the debt tranche allows early repayments. In most cases, this optionality to repay debt early comes with a prepayment penalty fee since the lender receives reduced interest payments.","cat":"lbo","diff":3,"src":"Redbook"},{"q":"What is the purpose of the minimum cash balance in an LBO model?","a":"Companies need a certain amount of cash for daily operations and meet their net working capital (NWC) requirements. The debt schedule will contain logical functions that ensure the cash balance never dips below this specified amount. The minimum cash balance will increase the amount of funding required since this cash on the company\u2019s balance sheet cannot help fund the transaction. For private equity interviews, the firm will almost certainly ask you to build an LBO model as either a standalone modeling test or as part of an investment case study. Each firm's recruitment structure varies each year based on the competitiveness of the process and urgency to secure the top candidates. There can be instances when candidates are given up to five hours to complete a full investment case study with a supporting model that'll be presented to members of the investment team, whereas in others, the only modeling test given is a simple one hour modeling test.","cat":"lbo","diff":3,"src":"Redbook"},{"q":"What is the difference between a bond and a leveraged loan?","a":"While some features of leveraged loans and bonds can overlap, the key difference is that that a loan is a private","cat":"lbo","diff":3,"src":"Redbook"},{"q":"What is the difference between investment-grade and speculative-grade debt?","a":"Investment-Grade Debt: Investment-grade debt (often called high-grade debt) has a credit rating above BBB/Baa. This category of debt is issued by companies with a strong credit profile. Investment-grade debt is considered safe, given the low risk of default. Speculative-Grade Debt: Speculative-grade debt has a credit rating below BB/Ba. These types of debt are issued by more leveraged companies with a riskier credit profile. Given this increased risk of default and bankruptcy, the interest rates on these riskier debts will be significantly higher to compensate investors for taking on the additional risk.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What does it mean when a debt tranche is denoted as 1st lien or 2nd lien?","a":"Lien is defined as the seniority and the priority of payment to a debt holder relative to the other tranches. A lien is a legal claim against the assets of a borrowing company (i.e., used as collateral) and the right to seize those assets first in forced liquidation/bankruptcy scenarios. 1st Lien Debt: The highest seniority, 1st lien, is fully secured by the company\u2019s assets and has the first claim to collateral in a liquidation/bankruptcy scenario (e.g., revolver, term loans). 2nd Lien Debt: Right below 1st lien loans sits 2nd lien where compensation is provided only if there's collateral value remaining once 1st lien lenders are repaid in full. These debt types are riskier and more expensive for borrowers (e.g., high-yield bonds, mezzanine financing). Tell me about the different classifications of term loans. Term Loan \u201cA\u201d: TLAs refer to secured loans syndicated to banks and are typically packaged alongside a revolving credit facility. TLAs have shorter terms (~5 years), carry higher amortization levels than other term loans, and are amortized evenly over their tenor (i.e., \u201cstraight-lined\u201d). Term Loan \u201cB,\u201d \u201cC,\u201d or \u201cD\u201d: An institutional term loan (B/C/D) is a loan facility syndicated to institutional, non-bank investors such as hedge funds, CLOs, mutual funds, Term Loans & and insurance companies. These term loans differ from TLAs in having longer terms Revolvers while requiring no principal amortization before maturity \u2013 instead, they involve nominal amortization with a bullet payment due at maturity. TL B/C/Ds are more prevalent in LBOs than TLAs, as B/C/Ds have less strict covenants, longer terms, and require less principal amortization each year. The \u201cB,\u201d \u201cC,\u201d or \u201cD\u201d designation is more indicative of the investor base than the priority rank.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is the difference between a secured and unsecured loan?","a":"Secured Loans: If a debt instrument is secured, that means the debt is backed by collateral. The assets of the borrower were pledged as collateral to get favorable financing terms. If the company were to go bankrupt, the lenders have a legal claim on the pledged collateral. Leveraged loans are secured by collateral and are the safest security class for a lender. Most term loans and revolvers in the leveraged loan market are syndicated to institutional investors such as hedge funds, CLOs, and mutual funds. Unsecured Loans: For unsecured loans, pension funds, mutual funds, insurance companies, hedge funds, and some banks are typically willing to invest in this relatively riskier type of debt for the higher yield.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"How are leveraged loans usually priced?","a":"Leveraged loans are usually priced off LIBOR plus a spread. In addition, loans often include a LIBOR floor, so an example would be a pricing of \u201cLIBOR + 3%\u201d (300 basis points) with a LIBOR floor of 2%, so the interest rate can never dip below 5%.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"How does the coupon on a bond differ from the yield?","a":"The coupon represents the annual interest rate paid based on the notional principal of the bond, while the yield is the annual return on the bond, including the coupon payment adjusted for the premium or discount of the purchase price when held to maturity. One difference is coupons are fixed for the bond's term, whereas yields move with the markets.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What does it mean when a bond is trading at a discount, par, or premium?","a":"Discount: Price < 100, Yield is Greater than Coupon Par: Price = 100, Yield is Equal to Coupon Premium: Price > 100, Yield Less Than Coupon","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is the difference between a fixed and floating interest rate?","a":"Fixed Interest Rate: A fixed interest rate means the interest expense to be paid is the same regardless of changes to the lending environment. A fixed interest rate is more common for riskier types of debt, such as high-yield bonds and mezzanine financing. Floating Interest Rate: A floating interest rate is tied to LIBOR plus a specified spread (i.e., LIBOR + 24%). This pricing type is seen more often for senior debt tranches (e.g., term loans, revolvers).","cat":"accounting","diff":2,"src":"Redbook"},{"q":"When would an investor prefer fixed rates over floating rates (and vice versa)?","a":"If interest rates are expected to fall in the near-term future, investors would prefer fixed rates. However, if interest rates are expected to increase, investors would prefer floating rates.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What are some different debt amortization schedules?","a":"The debt amortization schedule refers to the amount of principal the borrower must repay annually. Compliance with this payment schedule is mandatory and not optional for the borrower. Types of Debt Amortization Schedules: Bullet Maturity: The entire loan payment is due at the end of the loan\u2019s lifespan. Straight-Line Amortization: Principal payments must be repaid in equal installments until maturity. Minimum Amortization: Entails lesser amounts of annual payments (e.g., ~5-10% per year) \u2013 therefore, the entire principal will not have been paid off at maturity.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is a callable bond and how does it benefit the issuer or borrower?","a":"A callable bond can be redeemed by the issuer prior to its maturity, with the decision being at the issuer's discretion. A callable bond enables the issuing company to pay off the debt earlier if they have more free cash flow remaining in the period and can refinance at lower interest rates. From the investor's perspective, a callable bond gives more optionality to the issuer, so the debt holders are compensated with higher interest rates (compared to non-callable bonds).","cat":"accounting","diff":2,"src":"Redbook"},{"q":"When would the prepayment optionality of certain debt tranches be unattractive to lenders?","a":"Some debt instruments include provisions that enable the borrower to repay some principal ahead of the payment schedule without the incurrence of any financial penalties. However, other lenders may include a call protection feature that prohibits borrowers from prepayment until a pre-specified duration has passed. The reason being that certain lenders prefer to disallow prepayment as it implies the receipt of more interest payments in the future. For instance, if the borrower pays more principal off early, the annual interest payments (inflows to the lender) in the future are reduced since interest is based on the beginning and ending balance of the debt outstanding. A bond has a call protection clause of NC/2. What does this mean? Many HYBs will have call protection clauses that last two or three years (denoted as NC/2 and NC/3, respectively). Some are often NC/L, which means the bond is not callable for the term's entire duration. Once a bond becomes callable, the borrower may repay some (or all) of the debt balance and pay less interest. The caveat is that the prepayment penalties could offset those savings on interest \u2013 thus, HYB\u2019s classification as an expensive financing source. Therefore, NC/2 means the bond has call protection for two years. Once this two-year period has passed, the borrower can repay the debt along with the prepayment penalty fee.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is the undrawn commitment fee associated with revolvers?","a":"A revolver typically comes with a small < 1% fee, which is an annual fee paid out to the lender. The borrower is charged an annual fee on the unused amounts, called the undrawn commitment fee.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is the difference between an asset-based loan and a cash flow revolver?","a":"The maximum amount that can be drawn from an ABL revolver is based on the company\u2019s liquid assets. Thus, the amount is tied to borrowing-base lending formulas to limit borrowing to a certain percentage of the collateral \u2013 most often inventory and accounts receivable (e.g., 80% of A/R + 65% of Inventory) The maximum amount that can be borrowed for cash flow revolvers is tied to the borrower's historical and projected cash flow generation. Therefore, covenants are more restrictive due to the uncertainty around future cash flows. Unlike physical assets such as inventory, a company's future cash flows cannot be pledged as collateral or seized in bankruptcy, hence its less favorable terms.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"Why do revolvers normally not have a leverage test?","a":"In most cases, revolvers will only have an interest coverage ratio test (e.g., > 2.0x EBITDA/Cash Interest) and have the simplest covenant structure relative to other tranches of debt. This is because the revolver has the highest priority in the capital structure and has a priority claim to the borrower's assets. Therefore, the lender that provided the revolving credit line is unconcerned if the borrower raises additional debt, since this means the company has more cash available (on which the revolver has the first claim). In the scenario that the borrower undergoes bankruptcy, the revolver will almost certainly be made whole.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is unitranche debt and its benefits?","a":"Unitranche debt financing is a blended hybrid of senior debt and subordinated debt. The distinct characteristics of unitranche debt are that it's just one tranche of debt instead of two (as the name suggests), and the debt is priced at a blended interest rate. Traditionally, there would be 1st and 2nd lien debt, and the borrower would have to get financing from two (or more) different lenders, which could make securing financing packages a time-consuming process. But in recent years, non-bank institutional lenders began to provide the entire package and customize it based on negotiations. The main advantage to borrowers over traditional credit facilities is that it enables borrowers to have \u201conestop-shop\u201d financing (i.e., the convenience factor). The borrowers would have only one set of loan documents, one set of covenants, and a much simpler and faster process to close.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is the difference between a bond\u2019s coupon rate and the bond\u2019s current yield?","a":"The coupon rate (\u201cnominal yield\u201d) represents a bond\u2019s annual coupon divided by its face (par) value. The current yield on a bond equals the bond\u2019s coupon payment divided by the bond\u2019s price. For example, a bond trading at 90 with a $100 face value and a $6 coupon has a 6% coupon rate and a current yield of 6.7% ($6/90). While the coupon rate is always the same, the current yield fluctuates based on the market price of a bond.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is the difference between current yield and yield to maturity?","a":"The current yield on a bond equals the bond\u2019s coupon payment divided by the bond\u2019s price. The current yield is a way to discuss coupon rates when the bond price deviates from par. For example, a bond trading at 90 with a $100 face value and a $6 coupon has a 6% coupon rate and a current yield of 6.7% ($6/90). Unlike YTM, the current yield is not the true yield of a bond as it doesn't capture any yield associated with principal recovery, nor does it assume the reinvestment of coupon payments. The YTM is the internal rate of return of a bond. YTM considers coupon payments, principal recovery, assumes reinvestment at the same rate (an iterative process), and time to maturity.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"Could you define fixed income and name a few examples?","a":"Fixed-income securities provide their investors with a stream of fixed periodic interest payments and then the return of principal at the end of its term. The fixed amount of interest is paid in the form of coupon payments, usually semi-annually. While all bonds technically fall under fixed income, fixed income usually refers to lowreturn, low-risk bonds (as opposed to mezzanine financing and HYBs). Examples include treasury notes, treasury bonds, treasury bills, municipal bonds, money markets, and certificates of deposits (CDs).","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What does the money market refer to and what is the typical maturity range?","a":"The money market refers to the purchase and sale of large quantities of short-term bonds and other debt instruments overnight. The maximum maturity of these short-term bonds is 397 days (~13 months), and the investors are usually risk-averse with limited risk appetite.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What are the two main classifications of money market accounts?","a":"1. Government Money Market Funds: T-Bills, Discos (Agency Discount Notes, Reverse Repo) 2. Prime Money Market Funds: Short-Term Bonds, Commercial Paper, Certificates of Deposits","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is a municipal bond and what is the one distinct benefit it has for investors?","a":"A municipal bond is a debt instrument issued by a state, municipality, or county to finance its capital expenditures needs, including construction needs, road developments, parks, highways, and other public projects. \u201cMunis\u201d could be viewed as loans that investors make to local governments \u2013 and for doing so, these bonds are exempt from federal taxes and most state/local taxes.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is the difference between coupon bonds and discount bonds?","a":"Unlike coupon bonds, zero-coupon bonds (discount bonds) make no payments between issuance and maturity and are priced at a discount to their face value.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is the relationship between duration and the coupon?","a":"The duration of any coupon-bearing bond will be less than its years to maturity, as there are coupon payments between now and maturity. Lower Coupon \u2192 Longer Duration: The lower the coupon, the longer the duration is and closer the duration is to maturity. The impact of each coupon payment to shorten the payment is reduced. Higher Coupon \u2192 Shorter Duration: The higher the coupon, the shorter the duration. Each coupon payment has a higher cash flow, which shortens the duration.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is convexity used to measure?","a":"Convexity is a measure of the relationship between the price of a bond and its yield. Often, convexity is used to track the overall exposure risk on a portfolio of bond holdings. In general, a bond with higher convexity would have a higher price, and its addition to a portfolio should increase the systematic risk of the entire portfolio of bonds. Therefore, a high convexity portfolio would be more sensitive to interest rate fluctuations.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What are the three types of covenants found in lending agreements?","a":"Affirmative Covenants: These covenants require that the obligor (borrower) of the debt to perform certain specific tasks. Examples of affirmative covenants are meeting financial reporting requirements, paying taxes, being insured, maintaining licenses/permits, and legal compliance. Negative Covenants: These covenants restrict the obligor of the debt to refrain from certain specific tasks such as issuing dividends, raising debt, acquiring another company, or pledging assets as collateral. Financial Covenants: For financial covenants, there are two types: 1) maintenance and 2) incurrence covenants. Maintenance covenants are usually included in credit agreements (bank loans), while incurrence covenants are included in indentures (bonds).","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is the purpose of covenants in debt financing?","a":"Covenants are contractual agreements between lenders and borrowers meant to protect the interests of the lending parties. Failure to comply with these covenants or breaching a covenant can cause the borrower to be placed into default, allowing lenders to seize the borrower\u2019s assets. Debt-holders desire assurance of the full receipt of their due payments with a high level of certainty and restricting the borrower into making only risk-averse decisions and maintaining healthy credit statistics decreases the risk of not being paid back.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What are maintenance covenants and provide some examples?","a":"The objective of maintenance covenants is to ensure the borrower maintains sufficient profitability and cash flows to service debt payments. Compliance with maintenance covenants is tested each quarter. Examples of Maintenance Covenants Total Debt/EBITDA must remain below 5.0x Debt/Equity must never exceed 2.5x Interest Coverage Ratio cannot fall below 3.0x These parameters will change depending on the prevailing market conditions and be industry specific.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What are incurrence covenants and give some examples?","a":"The purpose of incurrence covenants is to prevent the borrower from taking specific actions that could put the lender\u2019s payback at risk. Compliance with incurrence covenants is tested when taking a specific action (e.g., new debt issuance, dividends, acquisition). Examples of Incurrence Covenants Restricted from making acquisitions or divesting one of its business segments (or major assets) Prevented from raising additional debt, especially if it has higher seniority than the covenant holder Cannot distribute dividends to equity shareholders without the approval of the lenders","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is one key difference between maintenance and incurrence covenants?","a":"Maintenance covenants differ from incurrence covenants in that they're subject to periodic tests, typically completed at the end of each quarter. The borrower must routinely prove its compliance with its maintenance covenants to avoid default. Incurrence covenants are tested only once a certain action or event \u201ctriggers\u201d it. Leveraged loans have become increasingly \u201ccovenant-lite,\u201d what does this entail? Secured 1st lien loans have shifted towards becoming \u201ccovenant-lite\u201d in recent times, meaning they're packaged with less restrictive incurrence covenants than traditional maintenance covenants. Compliance tests of covenant-lite loans are thus only required if the borrower takes a certain action (e.g., raises more debt, dividend issuance), rather than being tested periodically as they traditionally were. This trend is due to large banks needing to make their financing packages more attractive to borrowers to compete with newer types of institutional lenders that offer more flexibility (e.g., private credit funds, increased usage of unitranche debt).","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What are the characteristics of mezzanine financing?","a":"Mezzanine financing refers to the layer of financing that lies in between traditional debt and common equity. This category is the lowest form of debt in the capital structure and includes preferred stock, convertible debt, bonds coupled with warrants. All mezzanine debt is unsecured and will be of smaller magnitude relative to the other parts of the capital structure. The debt terms involved in mezzanine financing are highly negotiated, flexible, and tailored to meet the specific needs of both parties. The interest rates are the highest compared to other less risky tranches and debt, with the option for interest to be paid-in-cash or payment-in-kind (PIK). Also, the conversion feature that some of these securities carry provides the holder with the optionality to partake in the upside potential of the equity (and create dilution for common shareholders).","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is staple financing and which type of lender provides it?","a":"Staple financing is when the sell-side investment bank can provide some initial debt, but rather than holding onto the debt, they usually sell it to debt-oriented hedge funds or institutional investors. Staple financing is an option available when the sell-side advisor is a large, more institutionalized investment bank that has a balance sheet such as J.P. Morgan, Goldman Sachs, and Morgan Stanley. For clarification, the phrase \u201chas a balance sheet\u201d means the investment bank is diversified in terms of its sources of revenue and has a lending division, as opposed to purely offering M&A advisory services. This is an advantage that bulge bracket banks have over elite boutiques such as Evercore and Qatalyst Partners, where most of their revenue comes from M&A advisory \u2013 but this creates the potential for a conflict of interest since the firm serves both sides of the transaction (the seller and the buyer).","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is commercial paper and which types of companies issue them?","a":"Commercial paper is issued by large corporations with high credit ratings as short-term borrowing to finance their working capital needs. The typical commercial paper term is ~270 days, and the debt is issued at a discount (i.e., zero-coupon bond) as an unsecured promissory note. The minor concern associated with commercial paper is that they're unsecured, meaning they're not backed by any collateral. Therefore, only large corporations issue this type of debt as they have strong credit ratings. Besides market risk, name some other risks that bond investors face? Default Risk: Default risk means the borrower's creditworthiness has decreased from deteriorating financial performance, and most often, it coincides with a downgrade from a credit agency. The higher the credit rating, the lower the probability of default. Liquidity Risk: Next, liquidity risk refers to when the ability of the bond to be exchanged has unexpectedly decreased. This means that the number of potential buyers in the market has diminished (e.g., changing lending conditions, unexpected company-specific circumstances). Event Risk: Finally, event risk pertains to specific events such as M&A or legal investigations that could change the risk of holding a particular bond. For example, if the SEC announces they have started an investigation into a company for fraud, this would have an immediate negative effect on all stakeholders. Tell me about the debt lender and equity investor \u201cstory disconnect.\u201d This disconnect between debt lenders and equity investors is due to lenders being \u201cbackward-looking\u201d and focused on how the company has performed historically. Particular attention is paid to signs of cyclicality in the borrower's performance and how it was affected by the latest recession. This is because debt lenders are more concerned with the downside case. After all, even if the company performs well, the lenders don't get to participate in the upside alongside the equity investors. Thus, the continued generation of the borrower\u2019s cash flows to satisfy debt obligations is of the utmost highest importance to debt investors. In the best case scenario, lenders receive all interest payments and repayment of debt principal, whereas equity owners theoretically have unlimited upside.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"When a company is raising capital, why is the lender's case usually less optimistic than the projections shown to raise interest from equity investors?","a":"A distinction when dealing with lenders is that there's little incentive to show aggressive assumptions. Thus, lender case forecasts are lower than the base case for the debt covenants to be set off a lower base. While they must show that the company can meet the debt obligations to be approved for financing, there's no rational reason for a sponsor to stretch its assumptions beyond this. Debt covenants are usually based on this metric of EBITDA \u2013 thus, the EBITDA provided to lenders is the starting point. A higher EBITDA as the starting point means a higher EBITDA level is required to abide by the covenants. Then, future covenants will be based on quarterly projections of this initial EBITDA. Therefore, the borrower should desire a sufficient \u201ccushion\u201d to operate where, even if its EBITDA were to drop in an economic downturn, the covenant would still not be breached.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What does refinancing risk involve?","a":"Refinancing risk is the concern that a borrower cannot refinance its debt obligations at the same (or similar) rate as before. For example, the credit rating of the company may have been demoted, and lenders are no longer willing to refinance at the same rates. From the perspective of an investor, what is the interest rate risk in reference to? Interest rate risk becomes a consideration for bonds with longer maturities. For instance, the market rates constantly change, and the lending environment could turn more favorable (interest rates could decrease).","cat":"accounting","diff":2,"src":"Redbook"},{"q":"Give me an example of the drag-along provision in use?","a":"The drag-along provision protects the interests of the majority shareholders (usually the early, lead investors) by enabling them to force major decisions such as exiting the investment. This provision will prevent minority shareholders from holding back a particular decision or taking a specific action, just because a few shareholders with small stakes are opposed to it and refusing to do so. For example, suppose the stakeholders with majority ownership desire to sell the company to a strategic, but a few minority investors refuse to follow along (i.e., drag-along the process). In that case, this provision allows the majority owners to override their refusal and proceed onward with the sale.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What are the typical characteristics of preferred stock?","a":"Preferred stock can be best described as a hybrid between debt and equity \u2013 and sits right in between the two in the capital structure. Preferred stock has a higher claim on assets than common stock and receives dividends, which can be paid out as cash or \u201cPIK.\u201d Unlike common equity, the preferred stock class doesn't have voting rights but has seniority in the capital structure, but still has a lower claim than any debt holders. Sometimes preferred stock can be convertible into common equity, creating additional dilution.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is the difference between the pre-money and post-money valuation?","a":"Pre-Money Valuation: The pre-money valuation refers to the company's value prior to the first (or the next) financing round. Post-Money Valuation: The post-money valuation accounts for the new investment amount after the financing round. It can be calculated as simply the new financing amount added to pre-money valuation, or the formula below can be used: New Financing Amount Post Money Valuation = % of Equity Tell me about the difference between an up round vs. a down round. Prior to a new financing round, the pre-money valuation will first be determined. The difference captured between the starting valuation and then the ending valuation after the new round of financing determines whether the financing was an \u201cup round\u201d or a \u201cdown round.\u201d Up Round: An up round refers to financing in which the valuation of the company raising additional capital increases when compared to its prior valuation. Down Round: A down round refers to when the valuation of a company has decreased after a financing round when compared to the previous financing round.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"Can you give me an example of when dilution would be beneficial for a founder?","a":"As long as the startup\u2019s valuation has increased sufficiently (i.e., \u201cup round\u201d), dilution to the founder\u2019s ownership can be beneficial. For example, let\u2019s say that a founder owns 100% of a startup that's worth $5 million. In its seed-stage round, the valuation was $20 million, and a group of angel investors collectively want to own 20% of the company in total. The founder\u2019s stake will be reduced from 100% to 80%, while the value owned by the founder has increased from $5 million to $16 million post-financing despite the dilution.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"Can a startup recover from a down round?","a":"For certain, despite the dilution and potential internal conflict created from the unsuccessful new round of financing \u2013 the capital raised could have eliminated the risk of bankruptcy and given it enough money to turn the business around. This down round may have been the lifeline the startup needed to stay afloat and still have a chance at achieving its goals. While a down round is not a positive sign, it's not necessarily a sign that the end is near (although it may be more challenging to raise capital in the future unless clear improvements in performance are made).","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What are anti-dilution protection clauses?","a":"The purpose of anti-dilution protection clauses protects shareholders (usually the early investors) following a down round. In effect, their conversion ratio remains the same to shield their investment from potentially losing value due to the additional dilution created post-financing.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is a right of first refusal (ROFR) and is it an interchangeable term with a co-sale agreement?","a":"While a ROFR and co-sale agreement are both provisions intended to protect the interests of a certain group of stakeholders, the two terms are not synonymous. Right of First Refusal: The ROFR provision gives the company and/or the investor the option to purchase shares being sold by any shareholder before any other 3rd party. Co-sale Agreement: The co-sale agreement provides a group of shareholders the right to sell their shares when another group does so (and under the same conditions).","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is a full ratchet provision, and how does it differ from a weighted average provision?","a":"Full Ratchet Provision: A full ratchet is an anti-dilution provision that protects early investors and their preferred ownership stakes in the case of a down-round, the investor with the full ratchet's conversion price will be re-priced to the lowest price at which any new preferred stock is issued. In effect, the investor's ownership stake is maintained at the expense of substantial dilution to the management team, employees, and all other investors. Weighted Average: A similar anti-dilution provision used far more often is the weighted average method, which uses a weighted average calculation that adjusts the conversion ratio to account for any past share issuance and the prices they were raised. In effect, the conversion rate is lower than that of a full-ratchet strategy, making the dilutive impact far less severe.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is the difference between broad-based and narrow-based weighted average anti-dilution provisions?","a":"Both broad-based and narrow-based weighted average anti-dilution protections will include common and preferred shares. However, broad-based will also include options, warrants, and shares reserved for purposes such as option pools for incentives. Since more dilutive impact from shares is included in the broad-based formula, the magnitude of the anti-dilution adjustment is thereby lower.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is a capitalization table and what purpose does it serve to early-stage companies and their shareholders?","a":"A capitalization table (\u201ccap table\u201d) for any early-stage company tracks the equity ownership of a company in terms of number and type of shares (as well as series) along with any special terms such as liquidation preferences or protection clauses. For this reason, a cap table must be kept up-to-date to calculate the dilutive impact from each funding round, employee stock options, and issuances of new securities or convertible debt. Thus, all stakeholders can accurately calculate their share of the proceeds in a potential exit (i.e., liquidation event such as a sale to a strategic or IPO).","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is an option pool?","a":"An option pool is a reservation of a certain percentage of shares (usually between 5% and 20%) set aside for future issuance to key employees, investors, or advisors of a company. The option pool is often used to attract talented employees by a cash-strapped startup that cannot afford to pay out high salaries due to insufficient cash and provide an incentive to perform well for the options to vest. Another case an option pool is used is when a private equity firm performing an LBO allots a portion of equity as an incentive tool for the management team to reach their targets (called a \u201cmanagement option pool\u201d).","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is growth equity and how does it differ from earlier-stage venture capital investments?","a":"Growth equity involves taking minority equity stakes into high-growth companies that have moved beyond the initial startup stages. The investments made by growth equity firms are often called growth capital because they help the company advance into the next development stage. Since the growth equity firm doesn't have a majority stake, the investor has less influence on the portfolio company\u2019s strategy and operations. However, the objective is more related to riding the ongoing, positive momentum and taking part in the IPO ideally.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"How does the typical growth equity investment differ from traditional buyouts?","a":"Traditional buyout funds take majority stakes in stable growth, mature companies (usually ~90-100% equity ownership), whereas growth equity investors take minority stakes in high-growth companies attempting to disrupt a particular industry. For growth-oriented investors, differentiation is a key factor that's often the leading rationale for investing. To these investors, what makes a product worth investing in is the value it derives from its proprietary technology that's difficult to replicate or protected by patents. The end goal in growth equity investing is almost always an IPO.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"When growth equity investors pursue industries to invest in, how does it differ from industries targeted by traditional buyout firms?","a":"Growth equity is centered on disruption in \u201cwinner-takes-all\u201d industries; whereas traditional private equity is more about defensibility in revenue and free cash flows. In the industries that traditional buyouts take place, there's enough room for there to be multiple \u201cwinners.\" In addition, traditional buyouts typically rely heavily on the use of leverage in their investments, in contrast to growth equity firms, which may not use any debt, and usually are more focused on the pure growth of the equity in their investments.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What are the key differences between common and preferred stock?","a":"Common Stock: Common stock is often referred to as basic shares and represents ownership in a particular company. Usually, common shares come with voting rights, and the amount of voting power a common shareholder has is directly related to the number of shares owned. Preferred Stock: Preferred stock is a hybrid between bonds and common stock, which can be appealing to more risk-averse investors. Preferred stockholders are usually paid preferred dividends consistently, hence its comparison to bonds. But if dividends cannot be paid out to any equity investors, preferred shareholders have a higher claim on the distributions than equity shareholders \u2013 so no dividends can legally be paid to common shareholders without first paying the preferred shareholders. On the downside, preferred shareholders have no (or limited) voting rights in the company's corporate governance and are still below all debt holders in the capital structure. In the event of liquidation, the preferred shareholders will have a higher claim on the liquidated assets relative to common shareholders, assuming there's remaining collateral after the debt holders have received their share.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What are no-vote common shares and which headline IPO brought it into discussion?","a":"The mainstream IPO that included no-vote common shares was the IPO of Snap Inc. in 2017. While common shares with differing voting rights are frequently seen during IPOs, the no-vote common shares were a rarity. In Snap's IPO, most shareholders were not given voting rights, which was controversial, as investors would be completely hostage to management decisions under the proposed corporate governance. Even Snap\u2019s S-1 filing wrote that \u201cto our knowledge, no other company has completed an initial public offering of non-voting stock on a US stock exchange\u201d and acknowledged this decision could lead to a lower share price and fewer investors. In Snap\u2019s IPO, there were three classes of stock: Class A, Class B, and Class C. Class A would be the shares traded on the NYSE with no voting rights, Class B would be for early investors and executives of the company and come with one vote each, and Class C would be held only by Snap\u2019s two co-founders, CEO Evan Spiegel and CTO Bobby Murphy. The Class C shares would come with ten votes apiece, and the two holders would have a combined 88.5% of Snap\u2019s total voting power post-IPO. During an IPO, what is the role of the underwriter? The underwriter, most often an investment bank, will serve as an intermediary between the company issuing securities and the investing public. The underwriter will be tasked with handling the new issuance of stock and to ensure the public, primarily institutional investors (e.g., mutual funds, pension funds, hedge funds), commit to purchasing the issuance before actually becoming available for purchase in the open market. Some key obligations that the underwriter will have are to handle the roadshow strategy, generate interest from potential investors, and price the IPO optimally to maximize the value received.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is the purpose of a syndicate of underwriters?","a":"A group of investment banks, called a syndicate, will purchase the new issuance of securities for a negotiated price and then promote the securities to their network of investors in a process called a roadshow. Doing so spreads the risk across several underwriters instead of placing all the pressure on one underwriter, which maximizes the chance of the entire issuance being sold to the public (but mainly to institutional investors).","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What events take place during management roadshows?","a":"A roadshow is when the management of a company raising capital will travel around to give presentations to institutional investors such as large asset management firms, hedge funds, and pension funds. The reason for doing the roadshows is to generate interest from investors for an upcoming issuance of equity or debt.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"Why is there a lockup period associated with IPOs?","a":"The 180-day lockup period associated with IPOs prevents insiders from selling their shares immediately once the company has undergone an IPO. The sudden increase in selling volume could cause the share price to drop significantly, as many early investors might want to liquidate their positions as soon as possible.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is a direct listing and how does it differ from the traditional IPO?","a":"An alternative to the traditional IPO is a direct listing, which involves the company selling shares directly to the public market without the advising of an investment bank. Companies that decide to proceed with this route can avoid the lock-up period associated with IPOs, minimize the dilutive impact, and save a significant amount of money by not having to pay fees to investment banks. This option is riskier, however, since the process is relatively new, and there's no assurance that the shares will be priced correctly or enough shares will be sold. Direct listings come with fewer transaction costs (paid to investment banks) and the ability to avoid the lockup period but are not viewed as a \u201creplacement\u201d for an IPO because they're not ideal for a company that wants to raise capital. However, the SEC recently announced a rule change that companies undergoing a direct listing can now raise capital, making direct listing a more compelling alternative to IPOs. One of the first companies to do a direct listing was Spotify in 2018, as well as Slack in 2019. Two of the most prominent IPOs in 2020, Palantir Technologies and Asana Inc, both opted to go public under the non-traditional direct listing. In the past couple of years, IPOs have increasingly been scrutinized for leaving \u201cmoney on the table.\" Could you explain what this criticism is regarding? Following an IPO, the shares often surge and the market capitalization of the company can jump in excess of $50-$80 million on the 1st day of trading. This has led to criticism, including from prominent VC Bill Gurley, one of the leading critics of the underpricing of IPOs by investment banks for \u201cleaving money on the table.\u201d In defense of investment banks, this underpricing can be attributed to how their priority is to sell all the shares being listed, which often requires pricing it lower than some would pay. However, many investment banks are still accused of having conflicts of interest to serve both the company going public and institutional investors. For example, imagine an unrealistic scenario where shares were priced to \u201cperfection\u201d and the share price didn't budge once listed, meaning no share appreciation for the investors. Therefore, this discounted feature of IPO pricing could be seen as a way to establish long-term relationships with investors because if they achieve a high return from an IPO, they'll be more likely to invest in the next IPO managed by the same investment bank. A syndicate in an IPO has exercised the greenshoe option. What does this mean? The greenshoe option (or \u201cover-allotment\u201d) is a clause outlined in the underwriting agreement of an IPO that allows the underwriting syndicate to purchase up to an additional 15% of the shares at the offering price. The option can be exercised, and more shares can be sold if demand from the public exceeded expectations, and the shares are trading above the offering price, which allows the issuing company to raise more capital. Alternatively, the underwriters are granted this right to buy more shares from investors to stabilize the price and decrease the supply if the share price dropped.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is a special purpose acquisition company (SPAC)?","a":"A special purpose acquisition company (SPAC), often referred to as a \u201cblank check company,\u201d is a shell company formed strictly to raise capital through an initial public offering to acquire an existing company or merge multiple companies. Prior to having a specific target, the SPAC raises funds through an IPO of the SPAC\u2019s equity securities, with the sponsor retaining ~20% of the post-IPO SPAC. The invested capital is moved into an escrow until the target to be acquired is determined, or else the capital will be returned to investors. While SPACs have been around for a while, 2020 has been a record year for this type of investment vehicle. From the company's perspective, SPACs have quickly become a popular method to go public in a simple, timeefficient manner (usually ~4-6 months). Arguably, it's even more convenient than a reverse merger with added benefits such as involving significantly less work than the traditional IPO. Most of the strenuous work involved in an IPO, such as making investors interested and raising capital, has already been done by the SPAC sponsor. The capital has already been raised, so all that remains is for the company to agree to a valuation. Here, the valuations paid technically have more accuracy (or at least are more straight-forward) since a SPAC deal is more like an M&A negotiation with buyers rather than an underwriter telling you what the market might pay. Thus, SPAC acquisitions come with a certainty of pricing aspect and less risk of \u201cleaving money on the table\u201d because there's no risk of failing to issue all the shares (hence no need for a discount). SPACs provide many advantages for companies looking to go public compared to a traditional IPO or direct listing, such as simplicity, faster timeframe, better valuation, and well incentivized long-term partners. As a side benefit, most SPAC sponsors are reputable individuals and asset management firms; otherwise, they would not have been able to secure the capital in the first place.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is a private placement?","a":"A private placement is when a company raising capital issues shares to only a select few institutional investors. In contrast to a public issuance, the securities are not made available for sale to the open market and are not required to be registered with the SEC. A private placement is a more direct approach to selling to a group of accredited investors, consisting of institutional firms, mutual funds, and pension funds. Both public and privately held companies can partake in private placements.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What are the characteristics of a shelf offering?","a":"Filed with the SEC, a shelf offering provision (S-3 registration) enables a company to make an issuance in a three-year period, rather than selling it all in one sale. This can be beneficial as the market conditions could turn more favorable, and it gives the company raising capital more flexibility with the timing of the sales. Hence, many shares will be \u201con the shelf\u201d until the company sells them.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What does it mean when the Fed is engaging in open market operations?","a":"Open market operations are when the central bank purchases or sells short-term government securities (e.g., treasuries) in the open market to influence the money supply and impact short-term interest rates. If the money supply circulating in the system is increased, it becomes easier for businesses and consumers to get loans at low-interest rates, which has a positive impact on economic activity. Alternatively, the selling of securities from the central bank\u2019s balance sheet will remove money from the system. This reduction makes loans more difficult to be approved for (i.e., more demand from borrowers, less supply of money) and, as a result, makes interest rates on these loans increase.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is the relationship between bond prices and interest rates?","a":"There is an inverse relationship between bond price and interest rates. If market interest rates go up (due to a Fed interest rate hike or other market conditions), this has the impact of making the interest being offered by currently outstanding debt seem less attractive given the availability of comparable investments with now higher interest rates, all else being equal. The price of outstanding bonds would thus drop in this scenario.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is the federal funds rate?","a":"The federal funds rate represents the target interest rate set by the Federal Open Market Committee (FOMC) for short-term loans. The fed funds rate target has historically been one rate (e.g., 1.5%) but is now a range (1.5% to 1.75%). Based on the agreed-upon Federal funds rate, commercial banks and institutions will borrow and lend their excess reserves to one other (usually completed overnight) at this rate. This is the rate that banks charge other banks for overnight loans to cover their reserve requirements. Banks with excess reserves can lend to banks with insufficient reserves. The federal funds rate affects the lending market because banks and many institutional lenders tie their lending rates (e.g., Prime, LIBOR) to the fed funds rate. As a result, any adjustments will flow throughout the entire market, including short-term US treasuries.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is the federal discount rate?","a":"The federal discount rate refers to the interest rate that the Federal Reserve charges commercial banks and other financial intuitions for short-term loans through the discount window loan process. In contrast to the federal funds rate, the federal discount rate is the rate charged to banks to borrow funds from them, whereas the federal funds rate is the rate that banks lend to each other. Compared to the fed funds target rate, the federal discount rate is typically 50 bps higher.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What would happen if interest rates turned negative?","a":"In an environment with negative interest rates, the payment of interest flips between the borrower and lender. The borrower is being paid interest by the lender, rather than the other way around. Central banks use this drastic monetary policy tool to incentivize commercial bank lenders to make loans rather than sit on the funds. From shortest to longest maturity, list treasury notes, treasury bonds, and treasury bills. 1. Treasury Bills: T-bills mature within one year of issuance 2. Treasury Notes: T-notes mature between two and ten years 3. Treasury Bonds: T-bonds mature in twenty to thirty years","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is the money market yield?","a":"The money market yield is defined as the interest rate earned from holding securities of higher liquidity and short maturities (< one year). Examples of securities included would be certificates of deposit (CDs), US Treasury bills, and municipal bonds. Money Market Yield = [ (Final \u2013 Initial Cash Flow) ]\u00d7( ) ( Initial Cash Flow) Actual Days","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What are treasury inflated protected securities (TIPS)?","a":"A treasury inflated protected securities (\"TIPS\") are issued by the US Treasury and protect bondholders from the risk of inflation. Periodically, TIPS adjust the par value (and the coupon) by the inflation rate for the bondholder to receive the originally expected return. Based on changes in inflation, the principal amount will be adjusted, which would then affect the coupon paid.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"When does a liquidity trap occur?","a":"A liquidity trap refers to when short-term interest rates are close to zero, which leaves the central bank unable to lower them further to stimulate economic activity. In effect, a l
