iquidity trap makes monetary policy ineffective and restricts the options available to the Fed. Because of the near-zero interest rates, consumers hoard cash rather than invest it into bonds under the belief that the economy is headed in a negative trajectory.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What has earnings per share (EPS) been historically, and how has it been trending in recent years?","a":"Question each of your assumptions carefully from the perspective that your thesis might be flawed, as doing so will help solidify your pitch as you understand the counter-arguments. By identifying the weaker areas of your pitch, you can defend your viewpoints better since you've looked at the investment from both perspectives with an open mind, as opposed to looking for what confirms your pre-existing beliefs.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"Explain the merger arbitrage investment strategy?","a":"The merger arbitrage investment strategy is when an investor purchases the shares of a company undergoing an M&A deal. The investor can take advantage of inefficiencies in pricing surrounding M&A, as it often takes time for the market to digest the recent information and settle on a valuation. The investor can profit from the uncertainty that exists as the market evaluates an announced acquisition. The overarching aim is to profit from the spread between the current market price and the announced acquisition price.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is the event-driven turnaround investment strategy?","a":"The goal is to capitalize on a particular event, ranging from a regulatory change to a full operational turnaround. The ideal investment characteristics are underperformance vs. peers with a strong, aligned management team. The right team is of high importance because they execute the turnaround strategy. The investor would examine the management team's track record and see if they have any relevant history in turnaround situations and what makes them the right leaders for the job.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What does convertible bond arbitrage mean?","a":"The convertible bond arbitrage strategy is when an investor will take a long position on a convertible bond and then short the underlying stock. The investor would then benefit from the difference in pricing between the convertible bond and the share price.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is momentum investing, and how does it differ from GARP?","a":"Richard Driehaus, of Driehaus Capital Management, is often credited as being the father of momentum investing. The general theme of momentum investing is: \u201cbuy high, sell higher.\u201d The momentum investing strategy strives to capitalize on the continuance of ongoing trends in the market \u2013 hoping the trend persists. The difference from GARP investing is that momentum investing relies more on technical indicators to decide trades, rather than being value-oriented and looking for high-growth but still undervalued companies. The holding period is shorter in momentum investing as it intends to take advantage of trends that are often driven by human emotion, which coincides with overvaluations of certain equities.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"Could you explain what a short squeeze is?","a":"A short squeeze occurs when there's much short interest on a particular stock, and then positive news comes out. Many short sellers simultaneously attempt to cover their short positions at once, which causes a rapid increase in the share price. A short squeeze accelerates a share price\u2019s upward movement as short-sellers attempt to buy back the stock and cut their losses. List some characteristics of an ideal short. Complacent incumbents facing a threat from innovative new entrants \u2013 must assess the management\u2019s willingness to adapt and the likelihood of a proper reaction (e.g., Nokia\u2019s failure to adjust). Companies focused on consumer euphoria \u2013 significant short-term interest in a consumer-oriented product (i.e., the demand is driven by a consumer-led \u201cfad\u201d). Incumbents that are unlikely to exist in the future (e.g., physical newspaper business) and don't appear to be making any effort to adjust to the changing environment. Signs of accounting fraud or allegations made by credible sources","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What does it mean when a security has a sufficient margin of safety?","a":"A margin of safety is one of the fundamental concepts of value investing in which a security is purchased only when the share price is significantly below its intrinsic value. The margin of safety serves as an investor\u2019s downside risk protection and can be thought of as the difference between the estimated intrinsic value and the current share price. Said another way, the margin of safety is the buffer that value investors place into their investment decision making to protect them against downside risk if the share price drops post-investment. Rather than shorting stocks or purchasing puts, many value investors view this as their primary method to mitigate investment risk. Current Share Price ) Intrinsic Value Often, many value investors will not invest in a security unless the margin of safety is ~20-30%. If the MOS hurdle is 20%, the investor will only purchase a security if the current share price is 20% below the intrinsic value based on their valuation. Margin of Safety (MOS) = 1 \u2212 (","cat":"accounting","diff":2,"src":"Redbook"},{"q":"Why does Warren Buffett dislike the EBITDA metric?","a":"Warren Buffett and Charlie Munger are both known for having a particular distaste for management teams and equity research analysts using the EBITDA metric. In Berkshire Hathaway\u2019s 2000 shareholder letter, Buffett famously wrote, \u201cReferences to EBITDA make us shudder \u2013 does management think the tooth fairy pays for capital expenditures? We're very suspicious of any accounting methodology that's vague or unclear since too often that means management wishes to hide something.\u201d Given how EBITDA neglects capex, Buffett doesn't believe EBITDA is a true representation of a company\u2019s financial performance. Failing to account for capex would particularly apply to capital-intensive industries such as manufacturing.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"Explain the growth at a reasonable price (GARP) investment strategy?","a":"Growth at a reasonable price (GARP) is a hybrid investment strategy that combines growth investing and value investing. GARP could be best described as profiting from a company trading at a material discount on an earnings basis but not to the same extent as traditional value investments. The GARP investment strategy is based on finding high-quality companies with a sustainable competitive advantage, above-market consistent earnings growth, and large market potential. Then, the NPV of the cash flows will be determined with the growth potential incorporated to see if the company is undervalued. While this is not necessarily pure value investing, it's a reasonable compromise that many investors have adopted.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is the indicative cross size?","a":"The indicative cross size calculates the number of shares that can connect buyers with sellers at a specific price point. The closing price would be the price with the highest cross size (i.e., the price at which you can get the maximum number of buyers and sellers to exchange shares). List some key volume indicators used by traders. Volume: The total number of shares that are traded within a day. A stock with a higher average daily volume means you can trade more shares before moving the price. VWAP: VWAP stands for the \u201cvolume-weighted average price.\u201d This indicator measures the average price based on actual trading volumes. Depth: The depth reflects the total buy and sell orders currently on the order book and is used to measure how much one could purchase in terms of volume without \u201cmoving markets.\u201d","cat":"accounting","diff":2,"src":"Redbook"},{"q":"How does an order get routed?","a":"There are multiple venues for a sales trader to send an order to: Order to the Floor: The exchange (NYSE or NASDAQ) where the stock is listed. Internalization: The bank executing the trade could provide the other side, offsetting the trade flow with their trade flows. Electronic Communication Network: ECN is a computerized stock exchange that connects buyers with sellers. Stocks are not listed on an ECN, but the ECN pays rebates taken out of the bid-offer spread to participants, which provides liquidity to the ECN. Smart Order Routing (SOR): Alternatively, SOR algorithms can scan the market and spread the order through multiple trading venues.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What are some examples of off-exchange trading platforms?","a":"Block Trades: A large number of shares are traded off the exchange, reporting requirements to FINRA (ticker, size, and the price paid), and typically traded after the market close. Dark Pools: Platforms to allow large trades to be executed without moving prices. Has reporting requirements similar to block trades, lower execution fees than exchanges, and flexibility in order types. OTCBB/Pink Sheets: Over-the-Counter Market (not exchange-traded) can be used by smaller companies that don't meet the exchange listing requirements but still need to file with the SEC.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is the difference between the initial margin vs. the variation margin?","a":"Initial Margin A fixed amount you need to pay to cover your credit risk, set by the Clearing Bank\u2019s Risk Department, which may allow offsetting positions Varies based on the volatility of the underlying product Covers the cure period risk of a clearing client not making their variation margin Variation Margin (or Maintenance Margin) The Market-to-Market gain or loss you have on your position Cash or collateral is received if your position is in-the-money, but you pay cash or collateral if your position is out-of-the-money","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What are collateralized debt obligations (CDOs)?","a":"A collateralized debt obligation (CDO) is a structured-financial instrument backed by a collateral pool, which can include loans and other assets. These underlying assets are offered as collateral in case the loan defaults. Often put together by investment banks, the bankers will collect cash flow-generative assets (e.g., mortgages, bonds, debt) and then repackage them into a pool and customize it based on the level of credit risk the investor is comfortable taking on. The most well-known example of a CDO would be mortgage-backed securities (MBS), a type of asset-backed security (ABS) secured by a collection of mortgages. MBS that consisted of subprime loans played a central role in the housing financial crisis and revealed one weakness of the securitization process: the lack of transparency in the assets pooled. Many felt the combination of collateral concealed the lack of quality to make the MBS appear less risky. In addition, securitization allowed for mortgage originators to originate new, low-quality mortgages and then quickly offload them through an MBS offering.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"How does the spot exchange rate and forward exchange rate differ?","a":"Spot Exchange Rate: The spot exchange rate is the exchange ratio of one currency into another currency on a particular day. The key characteristics of spot exchange rates are that they're reported on a real-time basis and determined by the supply/demand of that currency relative to the same supply/demand dynamics of the other currency (i.e., set by the market). Forward Exchange Rates: In forward exchange rates, two parties will exchange currency at a specific date in the future. These deals are executed to hedge against foreign exchange risk, to which many multinational companies are exposed. Forward exchange rates can be quoted for limited durations (e.g., 30 days, 60 days, 90 days, 180 days). Distinction: The key distinction is that the rate is negotiated and agreed upon by the two parties for forward exchange rates (rather than letting the market determine the rate).","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is the difference between a warrant and a stock option?","a":"Warrants: A warrant gives the holder the right, but not the obligation, to purchase common shares of stock directly from the issuing company at a fixed price for a pre-determined period. The key distinction is that the warrant is issued directly by a company to an investor. Therefore, if the warrant is exercised, the shares required to fulfill the agreement are issued, so warrants have more of a dilutive impact when exercised because the company will actually issue new stock. Stock Options: A stock option gives the holder the right, but not the obligation, to purchase or sell shares at a pre-specified price for a defined period. Options are commonly traded amongst investors. The exercising of a stock option has less of a dilutive impact because no new shares are issued since options are derivatives based on an underlying asset (i.e., the pre-existing common shares of the company).","cat":"accounting","diff":2,"src":"Redbook"},{"q":"Could you provide some examples of how swaps can hedge fixed income risks?","a":"Swaps are financial agreements that can hedge a variety of fixed income risks, including: Interest Rate Risk: Interest rate swaps are derivatives that enable investors to convert floating rate cash flows into fixed-rate cash flows. The swap protects against the potential bond price decline caused by when bank deposit rates rise and investors want more yield to own bonds (i.e., yields rise, prices decline). An interest rate swap refers to a forward contract that usually involves the exchange of a fixed and floating rate between two parties. The contract is agreed upon by the two borrowers having different preferences for interest rates based on their specific needs (and speculations). Credit Default Risk: Credit default risk swaps are used when investors are concerned about the bond being repaid in full and demand more yield to own bonds (yields rise, prices decline) Foreign Exchange Risk: FX swaps come into play when the bond issuer pays coupons and the bond principal in a different currency \u2013 therefore, this is used to hedge against the possibility the currency's value might fall","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is a credit default swap (CDS), and why are they used?","a":"A credit default swap (\u201cCDS\u201d) is a derivative instrument that enables an investor to \u201cswap\u201d their credit risk with another investor. Essentially, a CDS serves as an insurance policy whereby, upon the occurrence of a credit event, the credit protection buyer will be compensated by the seller. The buyer of a CDS is said to be buying protection (i.e., benefits if the company becomes less creditworthy and cost increases, similar to buying puts). On the other side, the seller of a CDS sells this protection, speculating that the credit will improve and can thus keep the sale price for the CDS. Later, if there's a default that must be paid out to the buyer of protection (similar to selling puts on a stock), the seller loses money.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"How does the CDS market differ from the options market?","a":"The credit default swap market (\u201cCDS\u201d) is similar to the options market, in which investors buy or sell options in anticipation of a share price going up or down, usually to hedge an underlying position. The difference lies in how the investor is speculating that the company\u2019s perceived creditworthiness will increase or decrease, rather than share price movement.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"If an option has more time until expiration and greater implied volatility, would you expect the premium to be greater or smaller?","a":"The option premium would be greater since there's more time for the price of the underlying asset to increase, and more volatility means a greater likelihood of price movement in either direction.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is the difference between American options and European options?","a":"The major distinction is that American-style options can be exercised before the expiration date, whereas European-style options can only be exercised on the date of expiration. For this reason, the ability to exercise an option contract before expiration makes American options more valuable than European options, all else being equal. However, whether an early exercise would have been the most profitable choice would depend on the time premium remaining on the option and the potential for events in the future that can affect its value (which cannot be predicted).","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What effect does having high operating leverage have on the scalability of a business?","a":"The operating leverage represents the proportion of a company's cost structure that consists of fixed costs, as opposed to variable costs. Thus, companies with a higher proportion of fixed costs in their costs structure have greater operating leverage. High Operating Leverage: If the company has high operating leverage, each","cat":"accounting","diff":2,"src":"Redbook"},{"q":"When might having high operating leverage not benefit a company?","a":"Companies with high operating leverage have the potential to earn more profits on each incremental sale as the business scales. The caveat being, if sales and customer volume turn out lower than anticipated, the company can end up in financial ruin, given the initial investment spent and fixed cost structure. This means companies with high operating leverage have more business risk (i.e., higher risk of insufficient profitability) because the break-even point has been moved higher. If sales were to decrease, a business with a variable cost structure could easily reduce costs, but a company with a fixed cost structure has very limited flexibility.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What are some examples of barriers to entry that can help protect a company's profit margins?","a":"Network Effects: Network effects are the incremental benefits from more Consistent profits users joining a platform and once a platform has attained critical mass in users that can be (i.e., reached the inflection point of product adoption), it becomes very difficult sustained over the to take market share away. long-term require Economies of Scale: Improved cost structures from the increased scale can be differentiation in an a barrier to entry that deters competitors, as the existing incumbents have a industry with high clear advantage in profitability and thus have more cash flows to reinvest into barriers to entry. the business. Since the unit costs of a product decline as the volume increases, new entrants would come in with a significant cost disadvantage right away. Proprietary Technology: By having a differentiated offering that nobody else has, competition would be non-existent (or minimal), especially if there are patents involved. High Capex Requirements: Capital requirements related to infrastructure, machinery, and R&D to get a business started can deter new entrants. Switching Costs: Unless the new entrant has a significantly better product/service than the current offerings, switching costs can serve as a barrier (i.e., the switching costs outweigh the benefits). Regulatory Hurdles: The government and regulatory requirements can serve as barriers to entry, especially in highly regulated areas such as healthcare. These requirements to receive approval to enter a market can deter new entrants but benefit existing incumbents.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"Why has Apple shifted its focus from hardware to software?","a":"Computing hardware sales peaked in 2011 and have seen a contraction in growth every year since, and it has become increasingly challenging for Apple to provide an incentive for customers to upgrade to newer models. Since hardware products are periodic one-time purchases, rather than recurring revenue sources, Apple has shifted its focus to building out its software and related services. Software-based services have a larger total addressable market (TAM) and lead to higher customer retention rates (i.e., product \u201cstickiness\u201d), thus Apple has shifted its focus on strengthening its online service offerings and further integrating the Apple ecosystem (e.g., iOS App Store, iCloud, iTunes, Apple Music, Macs). Once a customer enters this ecosystem, it becomes more difficult to leave. Many of Apple\u2019s products are intentionally not compatible with other competitors\u2019 products (e.g., cannot download Apple apps on a Windows laptop; only the web-based versions are available).","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is enterprise collaboration software?","a":"Enterprise collaboration software provides teams with tools to share information, coordinate activities, manage projects, and communicate. The collaboration market consists of many submarkets \u2013 for instance, employee communication applications (real-time chat, video-conferencing), file sharing and content collaboration, and project management. The global workplace collaboration software market is expected to exceed ~$18 billion within the next few years as the adoption of integrated collaboration and communication software increases. Amid the recent global coronavirus crisis, collaboration software applications have become an increasingly integral part of how businesses' workflow is organized and carried out. As enterprises were forced to function remotely, executives deployed new collaboration tools company-wide to connect physically distant teams. Zoom (ZM) is considered a primary beneficiary of the coronavirus outbreak, as many employers and schools were left with no other option but to use remote video-conferencing software. Tell me about a few of the ongoing trends in the enterprise collaboration software industry. Platform Vendors vs. Specialist Players: As the market matures, collaboration solutions that offer a suite of offerings under a unified platform will have a key competitive advantage. Third-Party Application Integrations: To compete with larger established vendors, specialized singleapplication companies must include more third-party application integration within the collaboration ecosystem to increase end-user satisfaction. Upcoming Consolidation Phase: The market remains highly fragmented with a low barrier to entry, making it ripe for M&A activity (e.g., productivity apps, note-taking apps, time management apps, employee tracking, and scheduling apps). Thus, more enterprise software providers will include social software and collaboration into their product mix. Shift Towards Remote Work: Before COVID, approximately ~70% of the global workforce worked remotely at least once a week. In 2020, remote work became completely normalized in our society, and many large corporations have stated they intend to continue working remotely for the foreseeable future. Security \u2192 Customer Trust: Privacy and security concerns will be a major topic of discussion in the future \u2013 earlier in 2020, Zoom came under scrutiny after major security flaws and platform deficiencies were uncovered. Thus, Zoom rolled out more encryption offerings and acquired Keybase to strengthen its security and regain users' trust. There are two distinct groups in enterprise collaboration software, platform vendors and specialist players. Could you tell me how they differ? 1. Platform Vendors: Platform vendors have an existing portfolio of software products, an established brand name, and a trusted customer base. For example, Microsoft is a trusted brand with established security infrastructures and a loyal customer following - therefore, their strategic focus is integrating Teams into Office 365 and onboarding existing customers. 2. Specialist Players: Specialist players are new entrant, high-growth companies with one service offering (e.g., Zoom). While platform vendors can afford to offer free option plans over the long-term, specialist players must urgently acquire new customers and monetize them. For specialist players, the acquisition of new customers is the focus \u2013 whereas platform vendors can leverage their existing user base that's already familiar with using their products and have gained their trust.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What are the five types of virtualization?","a":"Virtualization refers to running multiple operating systems on a single system simultaneously, resulting in reduced IT expenses and increased efficiency for businesses. 1. Desktop Virtualization: Desktop virtualization is when a desktop operating system can run as a virtual machine on a physical server with other virtual desktops. 2. Application Virtualization: Application virtualization packages several applications into a single application, which is then separated from the operating system to run in a \u201csandbox.\u201d 3. Server Virtualization: Server virtualization enables many virtual machines to run on one physical server, which leads to more efficient utilization of the physical server. 4. Storage Virtualization: Storage virtualization is physical storage being grouped to have a single storage device in a virtual format. 5. Network Virtualization: Network virtualization combines hardware appliances and software to enable management from a single external virtual network (i.e., aggregate various physical networks into one network).","cat":"accounting","diff":2,"src":"Redbook"},{"q":"How have the acquisitions of Time Warner and DirectTV by AT&T performed to date?","a":"In the past five years, AT&T has spent billions to position itself well for the streaming wars. Its M&A spending spree began with its acquisition of DirecTV in 2015 in a $49 billion deal, which appeared to be a well-planned, strategic acquisition when media companies were benefiting from a surge in online video consumption from consumers. Then the hugely controversial merger with Time Warner took place in 2018. Since then, AT&T\u2019s streaming ambitions have appeared overzealous, and it currently owns many seemingly redundant streaming brands such as HBO Go, HBO Now, AT&T Now, AT&T TV, AT&T WatchTV, AT&T U-verse, and DirecTV. By the end of the fiscal year 2019, AT&T carried more than $150 billion in debt on its balance sheet \u2013 which flowed down to its customers through increased pricing. In its FY 2019 annual report, AT&T not only lost traditional TV service customers but internet video platform users. Initially, AT&T had expected to benefit from the influx of new subscribers acquired from DirecTV and use this leverage in negotiations with programmers. Then, by merging with Time Warner and the acquisition of HBO, AT&T would have access to original programming and be the most well-rounded premium service offering in both quality and quantity. While the original grand vision was to create a media conglomerate; instead, it saddled AT&T with massive debt, higher pricing plans than its competitors, and a lagging market position despite all their spending. The questionable M&A strategy of AT&T gave them a seat at the table for the streaming wars and made them a more modern, diversified company, but it came with such significant expenses that to this day \u2013 it's not yet clear whether those acquisitions were the right decisions (or if they were all necessary).","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What does the LTV: CAC ratio represent and why is it an important metric to track?","a":"The first and arguably most important metric for evaluating software businesses is the ratio of customer lifetime value (\"LTV\") over customer acquisition costs (\"CAC\"). The LTV is the total value that a single customer will generate for a business over its lifetime, whereas CAC is the total cost incurred to make the customer purchase the products and/or services being offered. LTV: CAC Ratio = Customer Lifetime Value Customer Acquisition Cost The LTV: CAC ratio matters because how much a company spends to acquire a customer should be a function of how much value it receives in return. Put together, the LTV: CAC Ratio ratio effectively shows what the lifetime value of a customer is to a company relative to the costs associated with the acquisition of that customer. The question being answered here is: \"Is the company deriving enough value from their customers to justify the costs spent to acquire them?\"","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What are bookings and are they recognized as revenue under GAAP?","a":"Bookings represent the value of a contract a customer has contractually committed to spend, usually agreed to on an annual or multi-year basis. Although not recognized as revenue under GAAP yet, it's a key indicator of the company's prospects and is used for forecasting purposes as it indicates the direction the business is heading in terms of growth and momentum. For software companies, why are bookings a better proxy than revenue to measure growth? Bookings are a more useful proxy to measure a SaaS company's growth because it's a forward-looking indicator that doesn't understate the true value of customer contracts the way accrual-based revenue does. For this reason, bookings are more useful when evaluating a company's sales & marketing performance and one of the main metrics used to portray projected performance when raising venture funding.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"Why would it be a mistake to use bookings and deferred revenue interchangeably?","a":"Many mistakenly use the terms bookings and deferred revenue interchangeably. Bookings represent the contractual commitment of customers to use their products or services. The difference with deferred revenue is the customer has neither received nor paid for the products or services. For deferred revenue, the revenue is similarly unearned, but payment was received upfront. In SaaS, what are billings and how does it differ from bookings? Billings are the invoices due for payment from a customer. For example, if a company secured an annual contract of $12,000 with billings agreed to be on a quarterly basis, the total billings for the first month would be $3,000 while the remaining bookings would be $9,000. An early-stage startup has a very low churn rate. Why might this be misleading? Many newer, growth-stage companies will have very low customer churn rates, but this can be misleading. The reason being an \"early adopter\" is the least likely customer type to churn, as most are passionate about testing out the latest technologies and innovations. Thus, the low churn rate would not be an accurate proxy for their churn rates later on because initial adopters are closer to \"product testers\" than real customers. In the SaaS industry, what is a reasonable customer churn rate? Within the software industry, a churn rate of ~5% annually is the norm. However, this rate must be compared to its closest competitors to understand the end-users and understand the expected churn.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What are monthly recurring revenue and annual recurring revenue used to measure?","a":"Monthly recurring revenue (\"MRR\") is a measure of the recurring, predictable revenue generated on a monthly basis by subscription SaaS companies. MRR should include monthly recurring revenue from subscription fees, upgrades, up-selling, and cross-selling, as well as revenue lost from downgrades, discounts, and churn. MRR is equal to the monthly recurring revenue at the end of each month and is computed by taking the MRR from the previous month and adding net new MRR. In contrast, annual recurring revenue (\"ARR\") is just MRR annualized and calculated as ARR = MRR \u00d7 12.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What are the flaws of the annual recurring revenue (ARR) metrics?","a":"ARR is used to estimate revenue for the upcoming year, based on the most recent MRR. Implicit in its assumptions is that there'll be no customer churn, upselling, or downgrades. And that the latest month is the best indicator of its future performance.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What are some ways that software companies can grow their recurring revenue?","a":"New Customers Acquisitions: Increase sales & marketing spend, enter new channels/markets Higher Average Selling Price (ASPs): Requires pricing power over their customer base More Cross-Selling: Easier to sell complementary products/services to existing customers Increase Upsell Rate: Benefits from the additional revenue derived from existing customers","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What is CMRR, and how does it compare to MRR?","a":"Committed Monthly Recurring Revenue (CMRR) is calculated with MRR as the base metric, and then it accounts for new committed signed contracts, expansion opportunities, customer downgrades, and expected churn. CMRR = MRR + New Bookings + Upsell Bookings \u2212 Downgrade Bookings \u2212 Churn Unlike MRR, CMRR is a forward-looking metric with more discretion on what to include and the amount. CMRR is, therefore, more speculative as it tries to forecast changes in recurring revenue, but is arguably a better approximation of how a company might perform in the future. In the SaaS industry, how would you measure sales efficiency? The various sales efficiency metrics and \"magic number\" are all variations of comparing new recurring revenue generated during a given period due to sales & marketing spend. As a broad generalization, these sales efficiency metrics are answering: \"For each dollar spent on sales and marketing (S&M), what was the amount of new revenue generated as a result?\" 1. Gross Sales Efficiency: Simply divides Gross New ARR (doesn't account for churn) by the S&M spend. Gross Sales Efficiency = Gross New ARR Current Quarter Total Sales & Marketing Expense Prior Quarter 2. Net Sales Efficiency: Net Sales Efficiency accounts for both new sales and lost customers To calculate the net sales efficiency, the Net New ARR is first calculated. The Net New ARR calculation begins with the Net ARR from new customers, adds the Expansion ARR from existing customers, and then deducts the Churned ARR from lost customers. Net New ARR = Net ARR + Expansion ARR \u2212 Churned ARR Then, you'll divide the Net ARR as of the current quarter and divide by the S&M spend of the previous quarter. Net Sales Efficiency = Net ARR Current Quarter Sales & Marketing Spend Prior Quarter For SaaS companies, what is the \"magic number\" and why is it used? The main weakness with the net sales efficiency metric was that not all public companies disclose the necessary figures required for the calculation. To bypass this, Scale Venture Partners developed its own \"Magic Number\" to enable meaningful comparison amongst companies. Net New ARR is replaced with the difference between the two most recent quarterly GAAP revenue figures and then annualizes it. Magic Number = [(GAAP Revenue Current Quarter \u2212 GAAP Revenue Previous Quarter ) \u00d7 4] (Sales & Marketing Previous Quarter ) A Magic Number <0.75 is considered inefficient, between 0.75 to 1 is efficient, and >1.0 is very efficient.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"How do you calculate ARPA?","a":"The average revenue per account (ARPA) is a measure of the revenue generated per active account, typically on a per month basis. This metric is often used interchangeably by the average revenue per user (ARPU). An ARPA that's growing is a positive sign that more value is being derived from each account as the business scales. MRR Average Revenue Per Account (ARPA) = Total Number of Accounts Alternatively, ARR can be used instead of MRR to convert ARPA to a yearly metric.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What is the difference between gross margin and contribution margin?","a":"Gross Margin: Measure of how expensive it's to develop a product, consisting of both fixed and variable product direct costs. Gross Margin ($) = Revenue \u2013 Cost of Goods Sold Contribution Margin: Calculated on a per unit basis, contribution margin measures profit per unit without considering fixed costs. The contribution margin enables you to list out the different product lines of a business to identify which ones are the most profitable on a per-unit basis. Contribution Margin ($) = Unit Revenue \u2013 Unit Variable Costs","cat":"lbo","diff":2,"src":"Redbook"},{"q":"How are the financials of a bank different from a traditional company?","a":"For a non-bank, traditional company, revenues, cost of goods sold, and SG&A typically represent the main elements of operating income, while non-operating items like interest expense and income, other gains and losses, and taxes are presented below operating income. Separating revenues vs. non-operating items like interest income and expense is not feasible for a bank since its core revenue comes from generating interest income while its primary operating expense is interest expense. A bank\u2019s income statement is driven by the size and returns of its assets (loans) and the cost of capital of its liabilities (deposits) in a far more direct way than traditional companies.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"How do you value a commercial bank?","a":"There are significant differences between the valuation of a non-bank and a bank. The most common valuation models employed to value a bank include: Levered Discounted Cash Flow Analysis Dividend Discount Model (DDM) Residual Income Model (RI) Comps with Equity Value Multiples (e.g., P/B, P/E) All these valuation approaches are levered approaches that value the equity directly. That\u2019s because disentangling operating value from nonoperating value for banks is impossible, seeing that the core operations are fundamentally tied to generating debt-related interest income, net of interest expense. For this reason, multiples used for comps analysis must be equity multiples like P/B and P/E, as opposed to the EV/EBITDA, EV/Revenues, and EV/EBIT multiples (which you would use for non-banks).","cat":"lbo","diff":2,"src":"Redbook"},{"q":"Walk me through a bank valuation using the residual income model. Why is it arguably better than the DCF or DDM?","a":"The residual income valuation approach works around a significant shortcoming of the DDM \u2013 namely, its sensitivity to terminal value. The residual income valuation calculates a company\u2019s equity value as the sum of two components: Book Value of Equity + Present Value of Residual Income. The present value of the residual income is estimated by looking at the extra equity value above the company's book value. For example, if a bank with a 10% cost of equity and $1 billion book value of equity is expected to generate $150 million in net income next year, the residual income for that year will be $50 million ($150 million \u2013 [$1 billion x 10%]). Conceptually, this represents excess returns above the cost of capital, and all excess returns are added to the book value of equity to arrive at the fair value of equity. By the terminal value period, the assumption is that excess returns go away, which leads to a terminal value of 0. This avoids the terminal value issue in the DDM and DCF approaches, which commingle value creation and value preservation.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What multiples are appropriate for valuing a bank?","a":"Price Per Share/Book Value Per Share (P/B) Price Per Share/Earnings Per Share (P/E) Price Per Share/Tangible Book Value Per Share (P/TBV)","cat":"lbo","diff":2,"src":"Redbook"},{"q":"Why is the unlevered DCF approach inappropriate for banks?","a":"The unlevered DCF approach would not be feasible for banks because it attempts to calculate cash flows on an unlevered basis (i.e., before the effects of debt and leverage). That would not be a plausible option, as it's unreasonable because most of a bank\u2019s revenue and cost of goods sold comes in the form of interest income and interest expense, respectively. While it's useful to separate operating earnings from interest income and expense in a non-bank, it's a pointless exercise for banks.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"How would you forecast the revenue of a boutique investment bank?","a":"Since this is a boutique investment bank, its primary revenue sources will be from fees from mergers & acquisitions advisory and/or helping companies raise debt or equity financing. One approach to forecast revenue would be to use revenue per employee as the main driver. Investment banking is a relationship-driven business, thus the amount of deal flow is a function of their senior bankers' ability to bring in and close deals. The other assumptions needed would be the average revenue per employee and growth in employee count. As a sanity check, the implied annual deal count can be backed out of using the forecasted revenue and an assumption for the average deal size and the average fee structure (i.e., % transaction fee). This could be done to ensure the deal count is reasonably in-line with the past deal flow. Other considerations would be the industry or product group focus, as these influence the potential deal count, growth rates, and cyclicality in revenue. Understanding a bank's trajectory, how it ranks compared to its competitors, the area it specializes in, and the quality of its employees is required to create an accurate forecast. This is why when large investment banks acquire boutiques, the acquirer is paying for the senior bankers' client relationships, their industry reputation/track record, and expected deal flow to be generated by the new additions to the team. Hence, earnouts are often structured to prevent senior partners from leaving and to align incentives.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"How does a passively managed fund generate revenue?","a":"The amount of revenue generated by an asset management firm is a function of its total AUM. The management fee, which is charged as a percentage of AUM, is intended to cover the fees to oversee the portfolio and cover all operational expenses. The percentage would increase the more active the asset manager is in the investment selection process and the amount of specialization required. Often called the management expense ratio (\"MER\"), this metric represents the fee charged to manage the capital invested in a mutual fund. MER is the total of a fund\u2019s management fee, operating expenses, and taxes for a specific year, divided by the fund's total AUM. Thus, MER is expressed as a percentage of the average dollar amount of a fund investment.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"How would you value an actively managed alternative investment management firm?","a":"Alternative asset management firms such as hedge funds and private equity firms generate two types of cash flows: management fees and performance fees. From investing in riskier alternative asset classes, these types of funds can charge higher management fees traditionally around ~2% with an incentive fee in which ~20% of returns past a pre-specified threshold go directly to the GPs of the firm. Each has different risk profiles and thus merit a sum of the parts approach. 1. Management Fees: The first type of cash flow, and the easier one to model, is related to management fees. Most charge management fees of 1-2% on total capital raised. The most common valuation approach is to apply a market multiple to the current or next year's forecast for management fees. 2. Performance Fees: The second cash flow comes from less predictable performance fees (often called \"carried interest\"), which tend to be around 15-20% of the returns. Since these fees are realized upon exiting investments, they tend to be lumpy and difficult to forecast. The typical approach here is to apply a multiple on these cash flows, but a much lower multiple than the multiple applied to management fees.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What types of multiples are used to value asset management firms?","a":"The most common multiples used to value asset management firms are the standard P/E and EV/EBITDA multiples. EV/AUM is occasionally used as well, however, this metric would only be useful if peer group is closely related to one another. For example, EV/AUM cannot be used to compare a passive asset manager and an actively managed equity mutual fund since the expected returns and fees as a percentage of AUM vary.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What are the three main types of securities lending models?","a":"1. Direct Lenders: Some investors have the scale to build their securities lending operation \u2013 this would include large asset managers such as Vanguard and Blackrock. 2. Custodian: Bundled option of custody, fund administration, and securities lending \u2013 custodians manage large pools of assets for several investors (i.e., pool collateral investment). 3. 3rd Party Lending: Either linked to a prime brokerage or specializes in securities lending, these separate custodians can operate a third option for assets not held in their custodian operation.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What multiples would you use to value a FinTech company?","a":"In FinTech, the most commonly used multiples appear to be EV/Revenue, EV/EBITDA, and P/E. For sectors with higher-growth, their LTM multiples will often not be meaningful and will thus be accompanied by oneyear and two-year forward multiples. Besides the leading companies in the industry, EV/Revenue is used the most often as many FinTech companies are unprofitable or barely profitable. Industry Specific Multiples Digital Banking and Payments: EV/Total Payment Volume (TPV), EV/Total # of Peer-to-Peer Transfers, EV/Total # of Premium Users Transfer Services and Marketplaces: EV/Gross Transaction Volume (GTV), EV/Total Origination Volume, EV/Average Revenue Per Transaction Stock Brokerages: EV/Daily Average Revenue Trades (DARTS), EV/Total # of Premium Subscriptions","cat":"lbo","diff":2,"src":"Redbook"},{"q":"How do most FinTech start-ups generate revenue?","a":"The business model most commonly seen in FinTech start-ups is a brokerage-type structure, in which the amount a company makes is fee-based (i.e., a small percentage of each transaction). This categorization would include start-ups in verticals such as digital banking, payments, online money transfer services, stock brokerages, and lending marketplace. For example, a P2P online money transfer service platform may charge a 2-4% fee for international transfers of a particular size. Other business models can include service fees such as Robo-advisors in which a flat subscription fee is paid each month or interest payments in the case of direct lenders that lend off their balance sheet. Tell me about the trend of challenger banks. Challenger banks are branchless, digital banks \u2013 over the past few years, these startups have acquired millions of banking customers, with many of them attaining unicorn status in terms of VC funding. The name \u201cchallenger\u201d is due to competing against the traditional incumbent banks that many consumers criticize for slow processing speeds, hidden fees, and lack of transparency. The leading challenger banks include Chime, N26, Current, Revolut, and Varo. From the consumer perspective, what is the benefit of a challenger bank over a traditional bank? The primary appeal of challenger banks is their online presence and mobile app development that resonates with digitally native consumers. Their rapid adoption could also be due to the easy setup process of an account (can often take only a few minutes), transparent fee structure and no hidden fees, lower rates for premium services and features, and an overall better online experience. Many challenger banks such as Chime have an immediate crediting of paychecks, forgoing the typical two to three-day float period that traditional banks have.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"Why might consumer FinTech start-ups appear to be struggling to monetize their user base?","a":"The majority of FinTech start-ups struggle to generate revenue because their focus is neither on revenue growth nor profitability, but user base growth. How these FinTech companies plan to monetize their users and become a sustainable business remains unknown. Many start-ups have begun to launch premium, pay-to-use services, but leading FinTech start-ups such as Monzo and Revolut have revealed deepening losses, employee layoffs/pay cuts, and complaints from customers about lower-quality service. One explanation for their struggles is that the primary appeal of these FinTech apps for many consumers is that these applications offer greater control, visibility, and convenience \u2013 all while being free. For financial services applications such as N26, Revolut, M1, Brex, and Chime, the reason many of these users (heavily skewed towards the younger demographic) signed up was because of the free pricing, the sign-up process can take less than an hour, and the interface was simple and easy to use. To use challenger banks as an example, many expected to become profitable through the interchange income it receives when customers use their debit cards, but this type of business model has proven to be difficult. In addition, many of these customers don't actually use these neo/challenger banks as their primary banking service, but rather as a side application. Tell me about the current state of the banking services start-up scene. Consumer digital banking services, one of the most well-funded areas in FinTech, has quickly become overcrowded and concerns regarding how users will be monetized are now more apparent. The need to generate more revenue (and profits) has begun to show as increasingly more banking start-ups are restricting their free options, charging for usage past a certain level, and aggressively pushing for premium plans sign-ups. Certain challenger banks have even started charging overdraft fees, fees for replacement cards, and higher withdrawal fees, which contradicts the original consumer-friendly marketing pitch. The reason being many traditional banks have adapted well to the changing environment. To make matters worse, Big Tech and large corporations have gradually been moving into the space as well. Google appears to have doubled-down on its FinTech ambition when it revealed Plex, a mobile-first savings and checking bank account integrated into Google Pay. Similar to many challenger banks, Plex has no monthly fees, overdraft charges, or minimum balance requirements, and Google has partnered with 11 banks to launch this service. 2021 will likely be a \"make or break\" year for many FinTech start-ups and shake out many well-funded players as seen by the bankruptcy of Monedo. As user growth becomes more difficult and the pressure to produce more revenue and profitability increases, it's likely we'll see increased mergers between FinTech start-ups, partnerships to integrate various services, or exits to larger companies.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"Does open banking harm traditional financial institutions?","a":"It would be the contrary. The trend of integrating 3rd party offerings with traditional banking systems has been in the works for a long time due to regulatory hurdles delaying the process. But now that open banking has taken off, the refusal of a traditional bank would cause their customers to move to other providers that are more modern. These 3rd party integrations are complementary to banking services and give them more opportunities for growth and additional revenue. The inability to have integrations available would cause a bank to fall behind its competitors \u2013 thus, there's an incentive to race to have as many integrations as possible.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What does peer-to-peer (P2P) lending involve?","a":"Often referred to as \u201csocial lending,\u201d P2P lending is alternative debt financing without an official financial institution serving as an intermediary. P2P lending enables consumers to get loans directly from one another, most often through mobile phones. In most cases, the lending is facilitated by a P2P platform, where an automated system will match lenders with borrowers. As most of these platforms have lower overhead costs and operations are run online, their costs will be significantly lower. However, the highest volume count of P2P transactions occurs via transfer apps (e.g., Venmo, Cash App, Apple Pay) that enable one to send money conveniently through mobile after connecting their bank account to the application.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What is a payday loan, and how does the process work?","a":"A payday loan is a very controversial, short-term loan that will rarely last more than a couple of weeks. These loans are usually provided by lenders operating from storefronts, but the payment industry\u2019s shift online has affected this small lending niche. Payday loans are meant for an emergency, short-term need, and the application can often be completed within a matter of minutes. Once a payday loan is approved, the funds will be deposited into the verified bank account. But the payday loan lender would require the borrower to write a post-dated check in payment of both the principal loan amount and the high amount of interest charged. The post-dated check ensures the lender will be paid back on the agreed-upon scheduled date. These borrowers will accept the post-dated check arrangement in a troubled situation, since their credit history was not rejected and/or even reviewed by the payday lenders.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What is the function of blockchain technology?","a":"Blockchain technology is a secure, digital ledger that shows every single record of transactions. Each block contains data detailing each transaction, such as date, time, and dollar amount \u2013 and is theoretically designed to be impossible to alter. Each proceeding block is structured through links called a chain, and they're often used in cryptocurrencies \u2013 most notably, Bitcoin.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What is the purpose of a FinTech sandbox?","a":"A FinTech sandbox enables a company to test their newly developed technologies within an environment that mimics the actual real-life use case. However, there are safeguards in place to ensure there are no consequences to failure. The sandbox is essentially a testing ground to experiment and try out their new offering before becoming licensed and bringing the product to market when there are higher stakes and serious repercussions for failures (i.e., pilot testing).","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What are the main differences between biotech and other types of pharma companies?","a":"Broadly put, biotech companies use living organisms to create their drugs, whereas the other life sciences categories develop their drugs using chemical compounds. Biotech companies are typically very high growth and based around one product/therapeutic area. Other sub-sectors in the life sciences industry, such as large pharma, are far more diversified with more product lines across several therapeutic areas (e.g., Pfizer, Merck).","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What would the basic drivers of revenue be?","a":"For the typical pharmaceutical company, the most basic drivers of revenue growth would be the current number of patients using their drugs, the average price of the drug, and the average dosage of the medication recommended by the physician/medical professional.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What assumption would you look at to value a clinical-stage biotechnology company?","a":"A biotech company typically consists of a portfolio of different experimental drug candidates. Because each experimental drug candidate is unique and specific, we must value them separately. We must determine the annual free cash flow of each experimental drug candidate, then use discounting principles to determine the net present value of each unique product. Biotech companies are very cash-dependent, so the company\u2019s current cash balance is also crucial when determining the full equity value of a biotech company. Model Assumptions 1. Number of Products in Pipeline/Development Stage: In the first assumption, the number of products under development and the current development phase for each must be identified. Then, it must be determined whether the company has a discovery platform of pre-clinical models and research. 2. Peak Opportunity: Determining the potential peak revenue opportunity within a therapeutic area is often the most important assumption. Sales will grow modestly after the company has achieved peak revenue until patent expiry or loss of exclusivity. Loss of exclusivity means that a brand name drug will lose its exclusive rights to sell in a certain geography. 3. Indication: The indication refers to the use of that drug for treating a particular disease/condition. More specifically, an indication is a specific, identifiable condition that the FDA has cleared a therapeutic drug to treat and can be thought of as a subcategory to a broader therapeutic area. 4. Estimated Time for Completion: The estimated time for completion refers to how long it'll take for the biotechnology company to complete all necessary clinical trials. 5. Launch Date: Once you have determined the estimated time for completion, you can estimate a launch date for the drug. Once the product has officially launched, you can apply an uptake curve that grows each year until the estimated peak revenue is achieved.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"How would you build a revenue model for a recently launched generic drug company?","a":"Revenue Model Process 1. To begin, the two main revenue drivers would be recent product launches and the current pipeline. 2. For a generics drug, pricing and annual sales data on the branded drug before the patent expired will be looked to have a benchmark to reference. The branded annual sales can help estimate the total market size for the drug, and this proxy can project how the generic drug will perform (i.e., demand sizing). 3. In most cases, the revenue build will be a top-down model. The total market volume with the average quantity of capsules in each bottle and the estimated price for the bottle will be gathered. Then, the market growth will be projected based on historical growth rates, but this will usually be on the lower end, and most models will assume minimal annual growth YoY in line with population growth. 4. In the next step, the estimated generic market volume as a percentage of the total market will be calculated for each. Initially, the branded drug will retain some market share, but then gradually, this hold on the market will fade as PBMs drive the conversions to generics. Keep in mind, this is the capture rate by all generic companies, rather than just the company being valued. The assumption should be on the higher end (~85%) and then gradually increase each year once the patent has expired. 5. Next, the key variable, the competition, must be accounted for in the forecast. The question that needs to be answered is: \"How many generics companies will there be in the market?\" This will determine the estimated revenue for the target company and its specific market share. Thus, there should be a line item for the total number of generic companies that will compete with the company being valued. As more competitors enter each year, the revenue should decline from lower quantity and price declines. But once a certain number of competitors have entered the space, it no longer becomes profitable, and the number of new entrants will stagnate close to zero. A reasonable assumption is that when a new competitor enters the market, the price will drop by ~10%. 6. A simplifying assumption is that the market share will be evenly split between all competitors, but this will be driven by the contracts with the retail pharmacies. So generic companies with a history of being well-supplied and reliable can secure favorable contracts and grab more market share. 7. Lastly, now that we have the sale volume (% of total market share) of the company being valued and estimated drug price from sites such as GoodRx or the negotiated price with the pharmacies if publicly available, we can multiply the two to arrive at the revenue for the product. On average, how does the pricing of generics compare to branded drugs? Typically, the prices on generic drugs will be ~15-20% of the branded price.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"How would projecting revenue from drugs in the pipeline differ from recently launched generics?","a":"For pipeline products, it may be appropriate to apply a risk-weight to project revenue. The risk-weight will be based on the percentage likelihood that the product will make it through the development and receive FDA bioequivalence approval. This is intended to account for the risk the product may face manufacturing issues or run into quality control difficulties, especially if the particular drug is complex (e.g., extended-release, injected).","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What is a medical service organization (MSO)?","a":"A medical service organization (MSO) provides management, administrative, and operational tasks on behalf of medical practices. While not licensed to practice medicine, MSOs encourage integration between hospitals and physicians by performing time-consuming responsibilities on their behalf. Some areas in which MSOs assist are financial/billing management, human resources (HR) management, recruiting, and regulatory compliance.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What unit economics drive revenue in the consumer goods industry?","a":"For the consumer & retail sector, most companies that fall under this industry classification have revenue drivers, split broadly into volume and price. Volume Drivers: The volume drivers section could include the number of stores, the average number of daily customers visiting the store, the average number of products in each order, and the average number of customer transactions per day. Price Drivers: On the other side, the price per product sold will be a function of the product quality, brand reputation, and how it stands relative to its competitors. There are often significant constraints, and most retailers have very little pricing power (i.e., have to set near market rate). Excluding premium retailers, most companies in the consumer sector will have a growth strategy oriented around achieving volume growth \u2013 this can be achieved by a better sales/marketing strategy, store count increase, and geographic expansion.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"How does pricing power in retail differ from other industries such as manufacturing?","a":"Pricing power arises from emotion-driven intangibles that are often unquantifiable with typical metrics, unlike what is necessary to gain pricing power for commercial and industrial products. Therefore, many companies emphasize nurturing customer trust in their branding and emotional appeal to their customers. For products in a technical industry such as manufacturing, the highest-quality product will come out on top over time. But in retail, a well-marketed low-quality product with more brand appeal can outsell a higher quality product.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What are the most common reasons for a company to become distressed?","a":"Liquidity Problems: The catalyst for most restructuring is from the debtor defaulting on its debt obligations, meaning that an interest payment or principal repayment was missed. The reason for this diminished liquidity is most often due to an unexpected deterioration in financial performance. Accelerated Payments: Certain high yield or straight debt instruments come with accelerated payment provisions, designed to compensate the investor for the entire principal, applicable premium, and interest prior to first call/maturity. The enforceability of so-called \"make-whole\" provisions has been a controversial topic, but the terms were specified in the indenture and meant to protect the lenders' yield. Failed LBO: Another reason for bankruptcies is failed leveraged buyouts (LBOs), which are associated with a company being over-levered and financial underperformance, leading to the inability to support the debt load. A recent example would be Toys \u201cR\u201d Us when it filed for Chapter 11 in 2017. Missed Suppliers and Vendors Payment: A non-debt related example would be the inability to pay suppliers or vendors. Suppliers and vendors are typically more accommodating to help keep the company afloat, albeit they can discontinue working with the debtor if they feel it's a lost cause. Covenant Violation (and Forced Call): A breached covenant could also force a borrower to declare bankruptcy, as the creditors have an agreement stating that failure to comply with the debt covenants would trigger a forced liquidation (e.g., cannot receive a downgrade from a credit rating agency). Industry Disruption: Structural shifts in an industry can lead to traditional products/services becoming obsolete (e.g., the OTT trend led by Netflix causing Blockbuster's downfall and bankruptcy). Black Swan Event: Unforeseeable events with significant macroeconomic impacts that could trigger mass bankruptcies. Examples include the subprime mortgage crisis and most recently, the COVID-19 pandemic that led to the bankruptcies of companies such as J. Crew, Brooks Brothers, and Ruby Tuesday.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What are a few typical signs that a debtor is planning to file for bankruptcy soon?","a":"A debtor that's aware it'll eventually have to file soon will attempt to time the filing date to conserve cash and give themselves as much flexibility as possible. Oftentimes, the filing will be done right before a large payment has come due. Some common indications that a debtor intends to file soon are the revolving credit line will have been drawn to maximum capacity, debt covenants have already been breached (or will be soon), and payments to suppliers or vendors have been delayed. Other than declaring bankruptcy, what alternatives does a company have to stay afloat? Straight Refinancing: For the distressed company to replace the old debt issuance with a new issue would be an ideal scenario, but unrealistic as it'll be difficult for a lender to refinance the debt. Another consideration is, the additional debt may help them in the short-term, but then once again, they haven't solved the problem. Instead, the company has just delayed it (or maybe even worsened it) unless they have a turnaround plan bound to work. Raise Additional Equity: Another option would be to raise capital through share issuances, but very few equity investors would purchase the stock of a company nearing bankruptcy. In the case the company declares bankruptcy, equity holders would receive nothing until debt holders are paid in full (e.g., a recent example was when car-rental company, Hertz, attempted to raise new equity after filing for bankruptcy, which was approved before being suspended shortly after; and now de-listed from the exchange). Out of Court Restructuring: The most practical option is to re-negotiate the debt terms with existing creditors and work something out out-of-court. The new arrangement could involve temporarily delayed payment dates, extending the maturity of debt (and reducing the due coupon amounts), or switching to PIK interest. Sometimes, the creditors may agree to a \u201cbondholder haircut\u201d in which the debt principal and interest are reduced so that the company can continue operating and avoid filing for bankruptcy. As a company nears becoming distressed, how might its accounts receivable, deferred revenue, and accounts payable balances change? Deferred Revenue: For companies with business models based around long-term contracts or subscriptions, deferred revenue tends to increase as the debtor tries to get some much-needed liquidity in return for delivery of a good or service on a later date (often with steep discounts). Accounts Payable: Days payable outstanding (DPO) will often extend significantly due to the company being incapable of paying the suppliers, even if the company wanted to make the payments. Accounts Receivable: The inability to collect A/R might be one of the reasons for the lack of liquidity. Regardless, since A/R is a part of the borrowing base, a company nearing distress may provide more services on credit to increase its borrowing base. Customers that are aware of the situation may take advantage of this by intentionally delaying payments in case the company goes bankrupt.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What does operational restructuring involve?","a":"Once becoming distressed, many companies see no chance in an achievable turnaround and are simply liquidated. But others often have a short period to get in front of this problem and try to solve the underlying issues. During operational restructuring, the company will try to improve its operations through cost-cutting, improving working capital management, and headcount reduction. One of the main parts of operational restructuring is asset restructuring, which is the sale of unproductive, non-core assets (or divisions) to re-focus on the core business. If it's an option, the company's management team may retain restructuring advisors to help them navigate through these operational issues or hire 3rd party consultants.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What is the difference between a voluntary and involuntary petition?","a":"In most cases, bankruptcy begins when the debtor files a petition themselves (called a \u201cvoluntary petition\u201d). Being the filer provides certain advantages, such as selecting the jurisdiction. Thus, the debtor almost always ends up filing preemptively. Although a rare occurrence, bankruptcies could be initiated if creditors file a \u201cnonvoluntary petition.\u201d This is when the creditors themselves force the distressed company into Chapter 11 bankruptcy, often done due to a technical default (e.g., broken covenants, violation of terms). Contrast an out of court restructuring with an in-court restructuring. Out of Court Restructuring An out of court restructuring is the process in which a company negotiates with creditors (both lenders and trade claims) without a court overseeing the process. In an out of court restructuring, all creditors must agree to any modifications to contracts and agreements, and nothing can be imposed on creditors. An out of court restructuring's primary benefit is that it can be done more quickly and is less costly than a formal bankruptcy. The process can also remain private, thus mitigating the disruption to the operations of the business related to the bankruptcy's negative publicity. For example, one risk of declaring formal bankruptcy is that vendors will require immediate cash on delivery and stop accepting delayed payments, creating even more stress on the distressed company.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"Can a decline in a company's share price and valuation cause it to become distressed?","a":"By itself, a decline in a company's share price and valuation cannot lead to the company becoming distressed. But the decline reflects the market's anticipation of the company becoming distressed, which may be justified.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What information is contained in a plan of reorganization (POR)?","a":"Once a debtor files for bankruptcy, the priority is an emergence from bankruptcy via an agreed-upon plan of reorganization (POR) between the company and all relevant claim holders. A POR is a document detailing what will happen to the debtor\u2019s assets, liabilities, and equity upon exit from bankruptcy. Most notably, the expected recoveries and the form of consideration for the claims are all identified in the plan of reorganization.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"What are the four tests representing the minimum standards of fairness for a POR to be approved?","a":"1. Best Interests of Creditor Test: Recoveries under the POR must be proven to be greater than under Chapter 7 liquidation. 2. Good Faith Test: POR is required to have been prepared and proposed in \u201cgood faith.\u201d 3. Feasibility Test: Ensures the POR will not result in further restructuring or subsequent liquidation. 4. Consent or Cram-Down: Even if an impaired class votes to reject the plan, the proponent may ask the court to adopt the plan despite the objection.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"How does valuation play a role in bankruptcies?","a":"Valuation often plays a contentious role in bankruptcies because it's subjective but carries very real implications on the recoveries by the claim holders. Example Bankruptcy Scenario Imagine a bankruptcy with $300 million in face value secured claims, $200 million in unsecured claims, and the POR submitted to the court by the company proposes to have the $300 million in debt of the secured creditors reinstated. In contrast, all unsecured claims get their claims converted to equity.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"What is the relationship between a liquidation analysis and the \"best interests\" test?","a":"One of the main reasons a liquidation analysis is completed is to compare it to the recoveries received in a proposed plan of reorganization (POR). In other words, for the POR to pass the \"best interests\" test, it must provide greater recovery to creditors under its proposed Chapter 11 turnaround solution than a Chapter 7 liquidation. So the liquidation analysis essentially sets the floor for the recovery amount of the creditors (i.e., if the recoveries to the creditors are above this floor, the POR is in their best interests). During Chapter 11 restructuring, what does the cash flow test require? For a company to emerge from Chapter 11 restructuring, the cash flow test must be passed (i.e., the \"feasibility test\"). The cash flow test represents the debtor's projected future financial solvency under the proposed POR. In the forecast, it must be demonstrated the new capital structure post-emergence will be sustainable. Even if the plan benefits all stakeholders, the Court may reject the plan if the company will eventually have to be liquidated or require further restructuring in the foreseeable future. The test will consist of a projection model of a company's cash flows, a debt schedule under the new capital structure and debt terms, and the ending balance of cash for each period. To receive approval, this test must show the company will remain solvent not only in the base case but even if it underperforms.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"When using the traditional valuation methodologies, why might valuing a distressed and nondistressed business differ?","a":"The key distinction is regarding the going concern assumption, as much of the total valuation will come mostly from earlier years in the forecast than the terminal value. To calculate the terminal value (TV), the forecasted perpetuity growth assumption will be very low or may even be a negative rate. A negative perpetual growth rate implies the company will eventually progress towards liquidation each year until dissolving. If using the exit multiple approach to calculate TV, the exit multiple assumption would be on the very bottom-tier of the comparable universe. While the standard valuation methodologies will be used, there'll be a heavy bias towards being conservative in the financial projections to account for the distressed company's current risks. For example, the discount rates used in restructuring scenarios are higher (15% to 25%+), and relative valuation will use the lower range of the multiples derived from the peer group to reflect the higher risk.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"Would you rather own bank debt or bonds in a bankruptcy?","a":"That depends. Assuming the bank debt is secured, and bonds are not, the secured bank debt will get higher priority when determining recoveries. Secured creditors often get full recoveries, while unsecured creditors get only partial recovery. If neither claim is secured, in theory, they'll both be treated equally (pari passu).","cat":"valuation","diff":2,"src":"Redbook"},{"q":"Could you explain the purpose of the TWCF model in restructuring?","a":"The thirteen-week cash flow model (\"TWCF\") is a required submission in a bankruptcy process to track the liquidity of a company vulnerable to bankruptcy. The TWCF is used in turnaround situations once a company enters or is on the verge of becoming financially distressed. The model provides visibility into the company\u2019s short-term liquidity to assess its options for short-term cash management. While quarterly and annual models will be created for the troubled company, the priority is to ensure the company can stay afloat in the short-term \u2013 hence, the TWCF's importance. Besides the transparency to creditors and its usage as a tool by management to make critical decisions, the TWCF is used to determine the borrowing needs during the reorganization period. If the ending cash balance falls to a level too low, a drawdown of the revolver or DIP financing will be necessary.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"How does the TWCF model differ from typical financial models?","a":"Cash-Based Accounting: TWCF is a cash-basis analysis, meaning it uses cash flow accounting instead of accrual-based accounting. This direct method for cash flow accounting is more insightful for the restructuring advisors, as the real cash balance matters and represents a more accurate portrayal of the company's liquidity. The company\u2019s cash inflows/(outflows) are projected carefully in a weekly and monthly cash flow budget to provide the highest transparency level for management and creditors. Weekly Rolling Forecast: Notably, TWCF models are based on rolling forecasts and updated continuously by Rx bankers weekly, enabling granular comparisons between the projected numbers vs. the actual numbers. The variance can also be assessed to better understand the company's financial health and the borrowing needs (DIP) during the reorganization period.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"What is an \u201camend and extend\u201d agreement?","a":"An \u201camend and extend\u201d is when the debtor has come to an agreement with the lending parties for the debt to remain in place, but with the maturity extended to a later date. In return for the extension, the cost to the borrower is usually an increased interest rate, an amendment fee, a different amortization schedule, or other newly negotiated debt terms that favor the lender.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"What is the difference between consent and a waiver?
