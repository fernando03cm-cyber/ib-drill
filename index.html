<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="IB Drill">
<title>IB Technicals Drill</title>
<style>
/* System fonts only - no external dependencies */
:root {
  --bg: #0d0d14;
  --card: #161622;
  --card2: #1e1e2e;
  --gold: #c9a84c;
  --gdim: #7a6030;
  --cream: #f0e8d0;
  --dim: #8a7f6a;
  --red: #d95f5f;
  --green: #4aad7a;
  --blue: #5a88d8;
  --border: rgba(201,168,76,0.15);
  --font: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  --mono: 'SF Mono', 'Courier New', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background: var(--bg);
  color: var(--cream);
  font-family: var(--font);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.5;
}

/* HEADER */
#header {
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}
.logo {
  font-size: 20px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: -0.03em;
}
.logo em { color: var(--cream); font-style: normal; }
.subtitle { font-size: 10px; color: var(--dim); margin-top: 2px; letter-spacing: 0.05em; }
.stats { display: flex; gap: 14px; font-size: 10px; color: var(--dim); text-align: center; }
.stat-n { font-size: 16px; font-weight: 600; display: block; }
.stat-n.g { color: var(--green); }
.stat-n.r { color: var(--red); }
.stat-n.s { color: var(--gold); }

/* PROGRESS */
#pbar { height: 2px; background: var(--card2); }
#pfill { height: 100%; background: var(--gold); transition: width 0.3s; width: 0%; }

/* CONTROLS */
#controls {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.ctrl-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.ctrl-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; min-width: 40px; }

/* PILLS */
.pill {
  font-family: var(--mono);
  font-size: 10px;
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--dim);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  letter-spacing: 0.05em;
}
.pill:hover { border-color: var(--gdim); color: var(--cream); }
.pill.active { background: var(--gold); border-color: var(--gold); color: #000; font-weight: 600; }
.pill.mode-active { background: var(--card2); border-color: var(--gold); color: var(--gold); }

/* MAIN CARD */
#main { padding: 16px; }
#card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  position: relative;
}
#card::before {
  content: '';
  position: absolute;
  top: 0; left: 20px; right: 20px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.4;
}

/* QUESTION META */
.q-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  gap: 8px;
  flex-wrap: wrap;
}
.q-tag {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.tag-accounting { border-color: #5a88d8; color: #5a88d8; }
.tag-valuation  { border-color: #c9a84c; color: #c9a84c; }
.tag-ma         { border-color: #a06fd8; color: #a06fd8; }
.tag-lbo        { border-color: #d86fa0; color: #d86fa0; }
.tag-dcf        { border-color: #4aad7a; color: #4aad7a; }
.tag-ev         { border-color: #d8a06f; color: #d8a06f; }
.tag-brain      { border-color: #999;    color: #999; }

.q-right { display: flex; align-items: center; gap: 8px; }
.q-diff { display: flex; gap: 3px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--card2); border: 1px solid var(--gdim); }
.dot.lit { background: var(--gold); border-color: var(--gold); }
.q-counter { font-size: 10px; color: var(--dim); font-family: var(--mono); }
.q-src { font-size: 9px; color: var(--gdim); font-family: var(--mono); }

/* QUESTION TEXT */
.q-text {
  font-size: 17px;
  font-weight: 500;
  line-height: 1.5;
  color: var(--cream);
  margin-bottom: 20px;
}

/* ANSWER AREA */
.answer-box {
  background: var(--card2);
  border-left: 3px solid var(--gold);
  border-radius: 0 8px 8px 0;
  padding: 16px;
  font-size: 14px;
  line-height: 1.75;
  color: #b8ac96;
  display: none;
  margin-top: 4px;
}
.answer-box.show { display: block; }

/* BUTTONS */
.btn-reveal {
  width: 100%;
  padding: 14px;
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
  font-family: var(--mono);
}
.btn-reveal:hover, .btn-reveal:active { background: var(--gold); color: #000; }

.grade-row {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}
.btn-grade {
  flex: 1;
  padding: 14px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid;
}
.btn-got { border-color: var(--green); color: var(--green); background: rgba(74,173,122,0.08); }
.btn-got:active { background: var(--green); color: #000; }
.btn-missed { border-color: var(--red); color: var(--red); background: rgba(217,95,95,0.08); }
.btn-missed:active { background: var(--red); color: #000; }

.btn-next {
  width: 100%;
  margin-top: 12px;
  padding: 14px;
  background: var(--gold);
  border: none;
  color: #000;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.05em;
}
.btn-next:active { background: #e8c060; }
.btn-next:disabled { opacity: 0.3; cursor: default; }

/* MULTIPLE CHOICE */
.mc-opt {
  width: 100%;
  text-align: left;
  padding: 14px;
  margin-bottom: 8px;
  background: var(--card2);
  border: 1px solid rgba(201,168,76,0.1);
  border-radius: 10px;
  color: #b8ac96;
  font-size: 13px;
  line-height: 1.5;
  cursor: pointer;
  transition: all 0.15s;
  font-family: var(--font);
}
.mc-opt:hover:not(.locked) { border-color: var(--gdim); color: var(--cream); }
.mc-opt.correct { border-color: var(--green); background: rgba(74,173,122,0.12); color: var(--green); }
.mc-opt.wrong   { border-color: var(--red);   background: rgba(217,95,95,0.12);  color: var(--red); }
.mc-opt.reveal  { border-color: var(--green); background: rgba(74,173,122,0.07); color: var(--green); }
.mc-opt.locked  { cursor: default; }

.expl-box {
  background: var(--card2);
  border-left: 3px solid var(--blue);
  border-radius: 0 8px 8px 0;
  padding: 14px;
  font-size: 13px;
  line-height: 1.7;
  color: #9aaccc;
  display: none;
  margin-bottom: 12px;
}
.expl-box.show { display: block; }
.mc-status { font-size: 13px; font-weight: 600; margin-bottom: 10px; }

/* EMPTY STATE */
.empty-msg {
  text-align: center;
  padding: 40px 20px;
  color: var(--dim);
  font-size: 15px;
  line-height: 1.6;
}

/* SWIPE HINT */
.hint {
  text-align: center;
  font-size: 10px;
  color: var(--gdim);
  padding: 10px;
  letter-spacing: 0.05em;
}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div>
    <div class="logo">IB <em>Technicals</em></div>
    <div class="subtitle">583 QUESTIONS &middot; 400Q (M&amp;I) &middot; WSP REDBOOK &middot; JPM/FE</div>
  </div>
  <div class="stats">
    <div><span class="stat-n g" id="sc">0</span>correct</div>
    <div><span class="stat-n r" id="sw">0</span>missed</div>
    <div><span class="stat-n" id="st">0</span>total</div>
    <div><span class="stat-n s" id="ss">&#8212;</span>streak</div>
  </div>
</div>

<!-- PROGRESS BAR -->
<div id="pbar"><div id="pfill"></div></div>

<!-- CONTROLS -->
<div id="controls">
  <!-- Mode -->
  <div class="ctrl-row">
    <span class="ctrl-label">Mode</span>
    <button class="pill mode-active" id="btn-fc" onclick="setMode('fc')">Flashcard</button>
    <button class="pill" id="btn-mc" onclick="setMode('mc')">Multiple Choice</button>
  </div>
  <!-- Category -->
  <div class="ctrl-row" id="cat-row">
    <span class="ctrl-label">Topic</span>
    <button class="pill active" onclick="setCat('all',this)">All</button>
    <button class="pill" onclick="setCat('accounting',this)">Accounting</button>
    <button class="pill" onclick="setCat('valuation',this)">Valuation</button>
    <button class="pill" onclick="setCat('dcf',this)">DCF</button>
    <button class="pill" onclick="setCat('ma',this)">M&amp;A</button>
    <button class="pill" onclick="setCat('lbo',this)">LBO</button>
    <button class="pill" onclick="setCat('ev',this)">EV / Equity</button>
  </div>
  <!-- Difficulty -->
  <div class="ctrl-row">
    <span class="ctrl-label">Level</span>
    <button class="pill active" onclick="setDiff('all',this)">All</button>
    <button class="pill" onclick="setDiff('1',this)">Easy</button>
    <button class="pill" onclick="setDiff('2',this)">Medium</button>
    <button class="pill" onclick="setDiff('3',this)">Hard</button>
  </div>
</div>

<!-- MAIN CARD -->
<div id="main">
  <div id="card">
    <div id="cc"><div class="empty-msg">Loading questions...</div></div>
  </div>
  <div class="hint">Tap &#8220;Got It&#8221; or &#8220;Missed&#8221; to track your score</div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
var QS = [{"q":"What individual items on the statements, like Goodwill, Other Intangibles and","a":"Shareholders\u2019 Equity, actually mean. The questions below will cover all these concepts.","cat":"accounting","diff":1,"src":"400Q"},{"q":"Walk me through the 3 financial statements.","a":"\u201cThe 3 major financial statements are the Income Statement, Balance Sheet and Cash Flow Statement. The Income Statement gives the company\u2019s revenue and expenses, and goes down to Net Income, the final line on the statement. The Balance Sheet shows the company\u2019s Assets \u2013 its resources \u2013 such as Cash, Inventory and PP&E, as well as its Liabilities \u2013 such as Debt and Accounts Payable \u2013 and Shareholders\u2019 Equity. Assets must equal Liabilities plus Shareholders\u2019 Equity. The Cash Flow Statement begins with Net Income, adjusts for non-cash expenses and working capital changes, and then lists cash flow from investing and financing activities; at the end, you see the company\u2019s net change in cash.\u201d","cat":"accounting","diff":1,"src":"400Q"},{"q":"Can you give examples of major line items on each of the financial statements? Income Statement: Revenue; Cost of Goods Sold; SG&A (Selling, General & Administrative Expenses); Operating Income; Pretax Income; Net Income.","a":"Balance Sheet: Cash; Accounts Receivable; Inventory; Plants, Property & Equipment (PP&E); Accounts Payable; Accrued Expenses; Debt; Shareholders\u2019 Equity. Cash Flow Statement: Net Income; Depreciation & Amortization; Stock-Based Compensation; Changes in Operating Assets & Liabilities; Cash Flow From Operations; Capital Expenditures; Cash Flow From Investing; Sale/Purchase of Securities; Dividends Issued; Cash Flow From Financing.","cat":"accounting","diff":1,"src":"400Q"},{"q":"How do the 3 statements link together?","a":"\u201cTo tie the statements together, Net Income from the Income Statement flows into Shareholders\u2019 Equity on the Balance Sheet, and into the top line of the Cash Flow Statement. Changes to Balance Sheet items appear as working capital changes on the Cash Flow Statement, and investing and financing activities affect Balance Sheet items such as PP&E, Debt and Shareholders\u2019 Equity. The Cash and Shareholders\u2019 Equity items on the Balance Sheet act as \u201cplugs,\u201d with Cash flowing in from the final line on the Cash Flow Statement.\u201d","cat":"accounting","diff":1,"src":"400Q"},{"q":"If I were stranded on a desert island, only had 1 statement and I wanted to review the overall health of a company \u2013 which statement would I use and why?","a":"You would use the Cash Flow Statement because it gives a true picture of how much cash the company is actually generating, independent of all the non-cash expenses you might have. And that\u2019s the #1 thing you care about when analyzing the overall financial health of any business \u2013 its cash flow.","cat":"accounting","diff":1,"src":"400Q"},{"q":"Let\u2019s say I could only look at 2 statements to assess a company\u2019s prospects \u2013 which 2 would I use and why?","a":"You would pick the Income Statement and Balance Sheet, because you can create the Cash Flow Statement from both of those (assuming, of course that you have \u201cbefore\u201d and \u201cafter\u201d versions of the Balance Sheet that correspond to the same period the Income Statement is tracking).","cat":"accounting","diff":1,"src":"400Q"},{"q":"If Depreciation is a non-cash expense, why does it affect the cash balance?","a":"Although Depreciation is a non-cash expense, it is tax-deductible. Since taxes are a cash expense, Depreciation affects cash by reducing the amount of taxes you pay.","cat":"accounting","diff":1,"src":"400Q"},{"q":"Where does Depreciation usually show up on the Income Statement?","a":"It could be in a separate line item, or it could be embedded in Cost of Goods Sold or Operating Expenses \u2013 every company does it differently. Note that the end result for accounting questions is the same: Depreciation always reduces Pre-Tax Income.","cat":"accounting","diff":1,"src":"400Q"},{"q":"What happens when Accrued Compensation goes up by $10?","a":"For this question, confirm that the accrued compensation is now being recognized as an expense (as opposed to just changing non-accrued to accrued compensation). Assuming that\u2019s the case, Operating Expenses on the Income Statement go up by $10, Pre-Tax Income falls by $10, and Net Income falls by $6 (assuming a 40% tax rate). On the Cash Flow Statement, Net Income is down by $6, and Accrued Compensation will increase Cash Flow by $10, so overall Cash Flow from Operations is up by $4 and the Net Change in Cash at the bottom is up by $4. On the Balance Sheet, Cash is up by $4 as a result, so Assets are up by $4. On the Liabilities & Equity side, Accrued Compensation is a liability so Liabilities are up by $10 and Retained Earnings are down by $6 due to the Net Income, so both sides balance.","cat":"accounting","diff":1,"src":"400Q"},{"q":"What happens when Inventory goes up by $10, assuming you pay for it with cash?","a":"No changes to the Income Statement. On the Cash Flow Statement, Inventory is an asset so that decreases your Cash Flow from Operations \u2013 it goes down by $10, as does the Net Change in Cash at the bottom. On the Balance Sheet under Assets, Inventory is up by $10 but Cash is down by $10, so the changes cancel out and Assets still equals Liabilities & Shareholders\u2019 Equity.","cat":"accounting","diff":1,"src":"400Q"},{"q":"Why is the Income Statement not affected by changes in Inventory?","a":"This is a common interview mistake \u2013 incorrectly stating that Working Capital changes show up on the Income Statement. In the case of Inventory, the expense is only recorded when the goods associated with it are sold \u2013 so if it\u2019s just sitting in a warehouse, it does not count as a Cost of Good Sold or Operating Expense until the company manufactures it into a product and sells it.","cat":"accounting","diff":1,"src":"400Q"},{"q":"Let\u2019s say Apple is buying $100 worth of new iPod factories with debt. How are all 3 statements affected at the start of \u201cYear 1,\u201d before anything else happens? At the start of \u201cYear 1,\u201d before anything else has happened, there would be no changes on Apple\u2019s Income Statement (yet).","a":"On the Cash Flow Statement, the additional investment in factories would show up under Cash Flow from Investing as a net reduction in Cash Flow (so Cash Flow is down by $100 so far). And the additional $100 worth of debt raised would show up as an addition to Cash Flow, canceling out the investment activity. So the cash number stays the same. On the Balance Sheet, there is now an additional $100 worth of factories in the Plants, Property & Equipment line, so PP&E is up by $100 and Assets is therefore up by $100. On the other side, debt is up by $100 as well and so both sides balance.","cat":"accounting","diff":1,"src":"400Q"},{"q":"Now let\u2019s go out 1 year, to the start of Year 2. Assume the debt is high-yield so no principal is paid off, and assume an interest rate of 10%. Also assume the factories depreciate at a rate of 10% per year. What happens?","a":"After a year has passed, Apple must pay interest expense and must record the depreciation. Operating Income would decrease by $10 due to the 10% depreciation charge each year, and the $10 in additional Interest Expense would decrease the Pre-Tax Income by $20 altogether ($10 from the depreciation and $10 from Interest Expense). Assuming a tax rate of 40%, Net Income would fall by $12. On the Cash Flow Statement, Net Income at the top is down by $12. Depreciation is a non-cash expense, so you add it back and the end result is that Cash Flow from Operations is down by $2. That\u2019s the only change on the Cash Flow Statement, so overall Cash is down by $2. On the Balance Sheet, under Assets, Cash is down by $2 and PP&E is down by $10 due to the depreciation, so overall Assets are down by $12. On the other side, since Net Income was down by $12, Shareholders\u2019 Equity is also down by $12 and both sides balance. Remember, the debt number under Liabilities does not change since we\u2019ve assumed none of the debt is actually paid back. 80 14. At the start of Year 3, the factories all break down and the value of the equipment is written down to $0. The loan must also be paid back now. Walk me through the 3 statements. After 2 years, the value of the factories is now $80 if we go with the 10% depreciation per year assumption. It is this $80 that we will write down in the 3 statements. First, on the Income Statement, the $80 write-down shows up in the Pre-Tax Income line. With a 40% tax rate, Net Income declines by $48. On the Cash Flow Statement, Net Income is down by $48 but the write-down is a noncash expense, so we add it back \u2013 and therefore Cash Flow from Operations increases by $32. There are no changes under Cash Flow from Investing, but under Cash Flow from Financing there is a $100 charge for the loan payback \u2013 so Cash Flow from Investing falls by $100. Overall, the Net Change in Cash falls by $68. On the Balance Sheet, Cash is now down by $68 and PP&E is down by $80, so Assets have decreased by $148 altogether. On the other side, Debt is down $100 since it was paid off, and since Net Income was down by $48, Shareholders\u2019 Equity is down by $48 as well. Altogether, Liabilities & Shareholders\u2019 Equity are down by $148 and both sides balance.","cat":"accounting","diff":1,"src":"400Q"},{"q":"Now let\u2019s look at a different scenario and assume Apple is ordering $10 of additional iPod inventory, using cash on hand. They order the inventory, but they have not manufactured or sold anything yet \u2013 what happens to the 3 statements?","a":"No changes to the Income Statement. Cash Flow Statement \u2013 Inventory is up by $10, so Cash Flow from Operations decreases by $10. There are no further changes, so overall Cash is down by $10. On the Balance Sheet, Inventory is up by $10 and Cash is down by $10 so the Assets number stays the same and the Balance Sheet remains in balance. 81 16. Now let\u2019s say they sell the iPods for revenue of $20, at a cost of $10. Walk me through the 3 statements under this scenario. Income Statement: Revenue is up by $20 and COGS is up by $10, so Gross Profit is up by $10 and Operating Income is up by $10 as well. Assuming a 40% tax rate, Net Income is up by $6. Cash Flow Statement: Net Income at the top is up by $6 and Inventory has decreased by $10 (since we just manufactured the inventory into real iPods), which is a net addition to cash flow \u2013 so Cash Flow from Operations is up by $16 overall. These are the only changes on the Cash Flow Statement, so Net Change in Cash is up by $16. On the Balance Sheet, Cash is up by $16 and Inventory is down by $10, so Assets is up by $6 overall. On the other side, Net Income was up by $6 so Shareholders\u2019 Equity is up by $6 and both sides balance.","cat":"accounting","diff":1,"src":"400Q"},{"q":"Could you ever end up with negative shareholders\u2019 equity? What does it mean?","a":"Yes. It is common to see this in 2 scenarios:","cat":"accounting","diff":1,"src":"400Q"},{"q":"What is working capital? How is it used?","a":"Working Capital = Current Assets \u2013 Current Liabilities. If it\u2019s positive, it means a company can pay off its short-term liabilities with its shortterm assets. It is often presented as a financial metric and its magnitude and sign (negative or positive) tells you whether or not the company is \u201csound.\u201d Bankers look at Operating Working Capital more commonly in models, and that is defined as (Current Assets \u2013 Cash & Cash Equivalents) \u2013 (Current Liabilities \u2013 Debt).","cat":"accounting","diff":1,"src":"400Q"},{"q":"What does negative Working Capital mean? Is that a bad sign?","a":"Not necessarily. It depends on the type of company and the specific situation \u2013 here are a few different things it could mean:","cat":"accounting","diff":1,"src":"400Q"},{"q":"Walk me through a $100 \u201cbailout\u201d of a company and how it affects the 3","a":"statements. First, confirm what type of \u201cbailout\u201d this is \u2013 Debt? Equity? A combination? The most common scenario here is an equity investment from the government, so here\u2019s what happens: No changes to the Income Statement. On the Cash Flow Statement, Cash Flow from Financing goes up by $100 to reflect the government\u2019s investment, so the Net Change in Cash is up by $100. On the Balance Sheet, Cash is up by $100 so Assets are up by $100; on the other side, Shareholders\u2019 Equity would go up by $100 to make it balance.","cat":"accounting","diff":1,"src":"400Q"},{"q":"If cash collected is not recorded as revenue, what happens to it?","a":"Usually it goes into the Deferred Revenue balance on the Balance Sheet under Liabilities. Over time, as the services are performed, the Deferred Revenue balance \u201cturns into\u201d real revenue on the Income Statement.","cat":"accounting","diff":1,"src":"400Q"},{"q":"What\u2019s the difference between accounts receivable and deferred revenue?","a":"Accounts receivable has not yet been collected in cash from customers, whereas deferred revenue has been. Accounts receivable represents how much revenue the company is waiting on, whereas deferred revenue represents how much it is waiting to record as revenue.","cat":"accounting","diff":1,"src":"400Q"},{"q":"How long does it usually take for a company to collect its accounts receivable balance?","a":"Generally the accounts receivable days are in the 40-50 day range, though it\u2019s higher for companies selling high-end items and it might be lower for smaller, lower transactionvalue companies.","cat":"accounting","diff":1,"src":"400Q"},{"q":"What\u2019s the difference between cash-based and accrual accounting?","a":"Cash-based accounting recognizes revenue and expenses when cash is actually received or paid out; accrual accounting recognizes revenue when collection is reasonably certain (i.e. after a customer has ordered the product) and recognizes expenses when they are incurred rather than when they are paid out in cash. Most large companies use accrual accounting because paying with credit cards and lines of credit is so prevalent these days; very small businesses may use cash-based accounting to simplify their financial statements.","cat":"accounting","diff":1,"src":"400Q"},{"q":"Let\u2019s say a customer pays for a TV with a credit card. What would this look like under cash-based vs. accrual accounting?","a":"In cash-based accounting, the revenue would not show up until the company charges the customer\u2019s credit card, receives authorization, and deposits the funds in its bank account \u2013 at which point it would show up as both Revenue on the Income Statement and Cash on the Balance Sheet. In accrual accounting, it would show up as Revenue right away but instead of appearing in Cash on the Balance Sheet, it would go into Accounts Receivable at first. Then, once the cash is actually deposited in the company\u2019s bank account, it would \u201cturn into\u201d Cash.","cat":"accounting","diff":1,"src":"400Q"},{"q":"How do you decide when to capitalize rather than expense a purchase?","a":"If the asset has a useful life of over 1 year, it is capitalized (put on the Balance Sheet rather than shown as an expense on the Income Statement). Then it is depreciated (tangible assets) or amortized (intangible assets) over a certain number of years. Purchases like factories, equipment and land all last longer than a year and therefore show up on the Balance Sheet. Employee salaries and the cost of manufacturing products (COGS) only cover a short period of operations and therefore show up on the Income Statement as normal expenses instead.","cat":"accounting","diff":1,"src":"400Q"},{"q":"Why do companies report both GAAP and non-GAAP (or \u201cPro Forma\u201d) earnings?","a":"These days, many companies have \u201cnon-cash\u201d charges such as Amortization of Intangibles, Stock-Based Compensation, and Deferred Revenue Write-down in their Income Statements. As a result, some argue that Income Statements under GAAP no 86 longer reflect how profitable most companies truly are. Non-GAAP earnings are almost always higher because these expenses are excluded.","cat":"accounting","diff":1,"src":"400Q"},{"q":"Normally Goodwill remains constant on the Balance Sheet \u2013 why would it be impaired and what does Goodwill Impairment mean?","a":"Usually this happens when a company has been acquired and the acquirer re-assesses its intangible assets (such as customers, brand, and intellectual property) and finds that they are worth significantly less than they originally thought. It often happens in acquisitions where the buyer \u201coverpaid\u201d for the seller and can result in a large net loss on the Income Statement (see: eBay/Skype). It can also happen when a company discontinues part of its operations and must impair the associated goodwill.","cat":"accounting","diff":1,"src":"400Q"},{"q":"Under what circumstances would Goodwill increase?","a":"Technically Goodwill can increase if the company re-assesses its value and finds that it is worth more, but that is rare. What usually happens is 1 of 2 scenarios:","cat":"accounting","diff":1,"src":"400Q"},{"q":"What are deferred tax assets/liabilities and how do they arise?","a":"They arise because of temporary differences between what a company can deduct for cash tax purposes vs. what they can deduct for book tax purposes. Deferred Tax Liabilities arise when you have a tax expense on the Income Statement but haven\u2019t actually paid that tax in cold, hard cash yet; Deferred Tax Assets arise when you pay taxes in cash but haven\u2019t expensed them on the Income Statement yet. The most common way they occur is with asset write-ups and write-downs in M&A deals \u2013 an asset write-up will produce a deferred tax liability while a write-down will produce a deferred tax asset (see the Merger Model section for more on this).","cat":"accounting","diff":3,"src":"400Q"},{"q":"Walk me through how you create a revenue model for a company. There are 2 ways you could do this: a bottoms-up build and a tops-down build. \u2022","a":"Bottoms-Up: Start with individual products / customers, estimate the average sale value or customer value, and then the growth rate in sales and sale values to tie everything together. 89 \u2022 Tops-Down: Start with \u201cbig-picture\u201d metrics like overall market size, then estimate the company\u2019s market share and how that will change in coming years, and multiply to get to their revenue. Of these two methods, bottoms-up is more common and is taken more seriously because estimating \u201cbig-picture\u201d numbers is almost impossible.","cat":"accounting","diff":3,"src":"400Q"},{"q":"Walk me through how you create an expense model for a company.","a":"To do a true bottoms-up build, you start with each different department of a company, the # of employees in each, the average salary, bonuses, and benefits, and then make assumptions on those going forward. Usually you assume that the number of employees is tied to revenue, and then you assume growth rates for salary, bonuses, benefits, and other metrics. Cost of Goods Sold should be tied directly to Revenue and each \u201cunit\u201d produced should incur an expense. Other items such as rent, Capital Expenditures, and miscellaneous expenses are either linked to the company\u2019s internal plans for building expansion plans (if they have them), or to Revenue for a more simple model.","cat":"accounting","diff":3,"src":"400Q"},{"q":"Let\u2019s say we\u2019re trying to create these models but don\u2019t have enough information or the company doesn\u2019t tell us enough in its filings \u2013 what do we do?","a":"Use estimates. For the revenue if you don\u2019t have enough information to look at separate product lines or divisions of the company, you can just assume a simple growth rate into future years. For the expenses, if you don\u2019t have employee-level information then you can just assume that major expenses like SG&A are a percent of revenue and carry that assumption forward.","cat":"accounting","diff":3,"src":"400Q"},{"q":"Walk me through the major items in Shareholders\u2019 Equity. Common items include:","a":"\u2022 \u2022 \u2022 \u2022 \u2022 Common Stock \u2013 Simply the par value of however much stock the company has issued. Retained Earnings \u2013 How much of the company\u2019s Net Income it has \u201csaved up\u201d over time. Additional Paid in Capital \u2013 This keeps track of how much stock-based compensation has been issued and how much new stock employees exercising options have created. It also includes how much over par value a company raises in an IPO or other equity offering. Treasury Stock \u2013 The dollar amount of shares that the company has bought back. Accumulated Other Comprehensive Income \u2013 This is a \u201ccatch-all\u201d that includes other items that don\u2019t fit anywhere else, like the effect of foreign currency exchange rates changing.","cat":"accounting","diff":3,"src":"400Q"},{"q":"Walk me through what flows into Retained Earnings.","a":"Retained Earnings = Old Retained Earnings Balance + Net Income \u2013 Dividends Issued If you\u2019re calculating Retained Earnings for the current year, take last year\u2019s Retained Earnings number, add this year\u2019s Net Income, and subtract however much the company paid out in dividends.","cat":"accounting","diff":3,"src":"400Q"},{"q":"Walk me through what flows into Additional Paid-In Capital (APIC).","a":"APIC = Old APIC + Stock-Based Compensation + Stock Created by Option Exercises If you\u2019re calculating it, take the balance from last year, add this year\u2019s stock-based compensation number, and then add in however much new stock was created by employees exercising options this year.","cat":"accounting","diff":3,"src":"400Q"},{"q":"What is the Statement of Shareholders\u2019 Equity and why do we use it?","a":"This statement shows everything we went through above \u2013 the major items that comprise Shareholders\u2019 Equity, and how we arrive at each of them using the numbers elsewhere in the statement. You don\u2019t use it too much, but it can be helpful for analyzing companies with unusual stock-based compensation and stock option situations. 91 10. What are examples of non-recurring charges we need to add back to a company\u2019s EBIT / EBITDA when looking at its financial statements? \u2022 \u2022 \u2022 \u2022 \u2022 \u2022 \u2022 Restructuring Charges Goodwill Impairment Asset Write-Downs Bad Debt Expenses Legal Expenses Disaster Expenses Change in Accounting Procedures Note that to be an \u201cadd-back\u201d or \u201cnon-recurring\u201d charge for EBITDA / EBIT purposes, it needs to affect Operating Income on the Income Statement. So if you have one of these charges \u201cbelow the line\u201d then you do not add it back for the EBITDA / EBIT calculation. Also note that you do add back Depreciation, Amortization, and sometimes Stock-Based Compensation for EBITDA / EBIT, but that these are not \u201cnon-recurring charges\u201d because all companies have them every year \u2013 these are just non-cash charges.","cat":"accounting","diff":3,"src":"400Q"},{"q":"How do you project Balance Sheet items like Accounts Receivable and Accrued Expenses in a 3-statement model? Normally you make very simple assumptions here and assume these are percentages of revenue, operating expenses, or cost of goods sold. Examples: \u2022 \u2022 \u2022 \u2022","a":"Accounts Receivable: % of revenue. Deferred Revenue: % of revenue. Accounts Payable: % of COGS. Accrued Expenses: % of operating expenses or SG&A. Then you either carry the same percentages across in future years or assume slight changes depending on the company.","cat":"accounting","diff":3,"src":"400Q"},{"q":"How should you project Depreciation & Capital Expenditures? The simple way: project each one as a % of revenue or previous PP&E balance.","a":"The more complex way: create a PP&E schedule that splits out different assets by their useful lives, assumes straight-line depreciation over each asset\u2019s useful life, and then assumes capital expenditures based on what the company has invested historically.","cat":"accounting","diff":3,"src":"400Q"},{"q":"How do Net Operating Losses (NOLs) affect a company\u2019s 3 statements?","a":"The \u201cquick and dirty\u201d way to do this: reduce the Taxable Income by the portion of the NOLs that you can use each year, apply the same tax rate, and then subtract that new Tax number from your old Pretax Income number (which should stay the same). The way you should do this: create a book vs. cash tax schedule where you calculate the Taxable Income based on NOLs, and then look at what you would pay in taxes without the NOLs. Then you book the difference as an increase to the Deferred Tax Liability on the Balance Sheet. This method reflects the fact that you\u2019re saving on cash flow \u2013 since the DTL, a liability, is rising \u2013 but correctly separates the NOL impact into book vs. cash taxes.","cat":"accounting","diff":3,"src":"400Q"},{"q":"What\u2019s the difference between capital leases and operating leases?","a":"Operating leases are used for short-term leasing of equipment and property, and do not involve ownership of anything. Operating lease expenses show up as operating expenses on the Income Statement. Capital leases are used for longer-term items and give the lessee ownership rights; they depreciate and incur interest payments, and are counted as debt. A lease is a capital lease if any one of the following 4 conditions is true:","cat":"accounting","diff":3,"src":"400Q"},{"q":"Why would the Depreciation & Amortization number on the Income Statement be different from what\u2019s on the Cash Flow Statement?","a":"This happens if D&A is embedded in other Income Statement line items. When this happens, you need to use the Cash Flow Statement number to arrive at EBITDA because otherwise you\u2019re undercounting D&A. 94","cat":"accounting","diff":3,"src":"400Q"},{"q":"Why do we look at both Enterprise Value and Equity Value?","a":"Enterprise Value represents the value of the company that is attributable to all investors; Equity Value only represents the portion available to shareholders (equity investors). You look at both because Equity Value is the number the public-at-large sees, while Enterprise Value represents its true value.","cat":"ev","diff":1,"src":"400Q"},{"q":"When looking at an acquisition of a company, do you pay more attention to Enterprise or Equity Value?","a":"Enterprise Value, because that\u2019s how much an acquirer really \u201cpays\u201d and includes the often mandatory debt repayment.","cat":"ev","diff":1,"src":"400Q"},{"q":"What\u2019s the formula for Enterprise Value?","a":"EV = Equity Value + Debt + Preferred Stock + Minority Interest - Cash (This formula does not tell the whole story and can get more complex \u2013 see the Advanced Questions. Most of the time you can get away with stating this formula in an interview, though).","cat":"ev","diff":1,"src":"400Q"},{"q":"Why do you need to add Minority Interest to Enterprise Value?","a":"Whenever a company owns over 50% of another company, it is required to report the financial performance of the other company as part of its own performance. So even though it doesn\u2019t own 100%, it reports 100% of the majority-owned subsidiary\u2019s financial performance. In keeping with the \u201capples-to-apples\u201d theme, you must add Minority Interest to get to Enterprise Value so that your numerator and denominator both reflect 100% of the majority-owned subsidiary. 95 5. How do you calculate fully diluted shares? Take the basic share count and add in the dilutive effect of stock options and any other dilutive securities, such as warrants, convertible debt or convertible preferred stock. To calculate the dilutive effect of options, you use the Treasury Stock Method (detail on this below).","cat":"ev","diff":1,"src":"400Q"},{"q":"Why do you subtract cash in the formula for Enterprise Value? Is that always accurate?","a":"The \u201cofficial\u201d reason: Cash is subtracted because it\u2019s considered a non-operating asset and because Equity Value implicitly accounts for it. The way I think about it: In an acquisition, the buyer would \u201cget\u201d the cash of the seller, so it effectively pays less for the company based on how large its cash balance is. Remember, Enterprise Value tells us how much you\u2019d really have to \u201cpay\u201d to acquire another company. It\u2019s not always accurate because technically you should be subtracting only excess cash \u2013 the amount of cash a company has above the minimum cash it requires to operate.","cat":"ev","diff":1,"src":"400Q"},{"q":"Is it always accurate to add Debt to Equity Value when calculating Enterprise Value?","a":"In most cases, yes, because the terms of a debt agreement usually say that debt must be refinanced in an acquisition. And in most cases a buyer will pay off a seller\u2019s debt, so it is accurate to say that any debt \u201cadds\u201d to the purchase price. However, there could always be exceptions where the buyer does not pay off the debt. These are rare and I\u2019ve personally never seen it, but once again \u201cnever say never\u201d applies.","cat":"ev","diff":1,"src":"400Q"},{"q":"Could a company have a negative Enterprise Value? What would that mean?","a":"Yes. It means that the company has an extremely large cash balance, or an extremely low market capitalization (or both). You see it with:","cat":"ev","diff":1,"src":"400Q"},{"q":"Could a company have a negative Equity Value? What would that mean?","a":"No. This is not possible because you cannot have a negative share count and you cannot have a negative share price.","cat":"ev","diff":1,"src":"400Q"},{"q":"Why do we add Preferred Stock to get to Enterprise Value?","a":"Preferred Stock pays out a fixed dividend, and preferred stock holders also have a higher claim to a company\u2019s assets than equity investors do. As a result, it is seen as more similar to debt than common stock.","cat":"ev","diff":1,"src":"400Q"},{"q":"How do you account for convertible bonds in the Enterprise Value formula?","a":"If the convertible bonds are in-the-money, meaning that the conversion price of the bonds is below the current share price, then you count them as additional dilution to the Equity Value; if they\u2019re out-of-the-money then you count the face value of the convertibles as part of the company\u2019s Debt.","cat":"ev","diff":1,"src":"400Q"},{"q":"A company has 1 million shares outstanding at a value of $100 per share. It also has $10 million of convertible bonds, with par value of $1,000 and a conversion price of $50. How do I calculate diluted shares outstanding?","a":"This gets confusing because of the different units involved. First, note that these convertible bonds are in-the-money because the company\u2019s share price is $100, but the conversion price is $50. So we count them as additional shares rather than debt. Next, we need to divide the value of the convertible bonds \u2013 $10 million \u2013 by the par value \u2013 $1,000 \u2013 to figure out how many individual bonds we get: $10 million / $1,000 = 10,000 convertible bonds. Next, we need to figure out how many shares this number represents. The number of shares per bond is the par value divided by the conversion price: $1,000 / $50 = 20 shares per bond. So we have 200,000 new shares (20 * 10,000) created by the convertibles, giving us 1.2 million diluted shares outstanding. We do not use the Treasury Stock Method with convertibles because the company is not \u201creceiving\u201d any cash from us.","cat":"ev","diff":1,"src":"400Q"},{"q":"What\u2019s the difference between Equity Value and Shareholders\u2019 Equity? Equity Value is the market value and Shareholders\u2019 Equity is the book value. Equity Value can never be negative because shares outstanding and share prices can never be","a":"negative, whereas Shareholders\u2019 Equity could be any value. For healthy companies, Equity Value usually far exceeds Shareholders\u2019 Equity. 99","cat":"ev","diff":1,"src":"400Q"},{"q":"Are there any problems with the Enterprise Value formula you just gave me? Yes \u2013 it\u2019s too simple. There are lots of other things you need to add into the formula with real companies: \u2022 \u2022 \u2022 \u2022 \u2022 \u2022","a":"Net Operating Losses \u2013 Should be valued and arguably added in, similar to cash. Long-Term Investments \u2013 These should be counted, similar to cash. Equity Investments \u2013 Any investments in other companies should also be added in, similar to cash (though they might be discounted). Capital Leases \u2013 Like debt, these have interest payments \u2013 so they should be added in like debt. (Some) Operating Leases \u2013 Sometimes you need to convert operating leases to capital leases and add them as well. Pension Obligations \u2013 Sometimes these are counted as debt as well. So a more \u201ccorrect\u201d formula would be Enterprise Value = Equity Value \u2013 Cash + Debt + Preferred Stock + Minority Interest \u2013 NOLs \u2013 Investments + Capital Leases + Pension Obligations\u2026 In interviews, usually you can get away with saying \u201cEnterprise Value = Equity Value \u2013 Cash + Debt + Preferred Stock + Minority Interest\u201d I mention this here because in more advanced interviews you might get questions on this topic.","cat":"ev","diff":3,"src":"400Q"},{"q":"Should you use the book value or market value of each item when calculating Enterprise Value? Technically, you should use market value for everything. In practice, however, you usually use market value only for the Equity Value portion, because it\u2019s almost","a":"impossible to establish market values for the rest of the items in the formula \u2013 so you just take the numbers from the company\u2019s Balance Sheet.","cat":"ev","diff":3,"src":"400Q"},{"q":"What percentage dilution in Equity Value is \u201ctoo high?\u201d","a":"There\u2019s no strict \u201crule\u201d here but most bankers would say that anything over 10% is odd. If your basic Equity Value is $100 million and the diluted Equity Value is $115 million, you might want to check your calculations \u2013 it\u2019s not necessarily wrong, but over 10% dilution is unusual for most companies. 101","cat":"ev","diff":3,"src":"400Q"},{"q":"When would you not use a DCF in a Valuation?","a":"You do not use a DCF if the company has unstable or unpredictable cash flows (tech or bio-tech startup) or when debt and working capital serve a fundamentally different role. For example, banks and financial institutions do not re-invest debt and working capital is a huge part of their Balance Sheets \u2013 so you wouldn\u2019t use a DCF for such companies.","cat":"valuation","diff":1,"src":"400Q"},{"q":"What other Valuation methodologies are there? Other methodologies include: \u2022","a":"\u2022 \u2022 Liquidation Valuation \u2013 Valuing a company\u2019s assets, assuming they are sold off and then subtracting liabilities to determine how much capital, if any, equity investors receive Replacement Value \u2013 Valuing a company based on the cost of replacing its assets LBO Analysis \u2013 Determining how much a PE firm could pay for a company to hit a \u201ctarget\u201d IRR, usually in the 20-25% range 102 \u2022 \u2022 \u2022 Sum of the Parts \u2013 Valuing each division of a company separately and adding them together at the end M&A Premiums Analysis \u2013 Analyzing M&A deals and figuring out the premium that each buyer paid, and using this to establish what your company is worth Future Share Price Analysis \u2013 Projecting a company\u2019s share price based on the P / E multiples of the public company comparables, then discounting it back to its present value","cat":"valuation","diff":1,"src":"400Q"},{"q":"When would you use a Liquidation Valuation?","a":"This is most common in bankruptcy scenarios and is used to see whether equity shareholders will receive any capital after the company\u2019s debts have been paid off. It is often used to advise struggling businesses on whether it\u2019s better to sell off assets separately or to try and sell the entire company.","cat":"valuation","diff":1,"src":"400Q"},{"q":"When would you use Sum of the Parts?","a":"This is most often used when a company has completely different, unrelated divisions \u2013 a conglomerate like General Electric, for example. If you have a plastics division, a TV and entertainment division, an energy division, a consumer financing division and a technology division, you should not use the same set of Comparable Companies and Precedent Transactions for the entire company. Instead, you should use different sets for each division, value each one separately, and then add them together to get the Combined Value.","cat":"valuation","diff":1,"src":"400Q"},{"q":"When do you use an LBO Analysis as part of your Valuation?","a":"Obviously you use this whenever you\u2019re looking at a Leveraged Buyout \u2013 but it is also used to establish how much a private equity firm could pay, which is usually lower than what companies will pay. It is often used to set a \u201cfloor\u201d on a possible Valuation for the company you\u2019re looking at.","cat":"valuation","diff":1,"src":"400Q"},{"q":"What are the most common multiples used in Valuation? The most common multiples are EV/Revenue, EV/EBITDA, EV/EBIT, P/E (Share Price / Earnings per Share), and P/BV (Share Price / Book Value).","a":"9. What are some examples of industry-specific multiples? Technology (Internet): EV / Unique Visitors, EV / Pageviews Retail / Airlines: EV / EBITDAR (Earnings Before Interest, Taxes, Depreciation, Amortization & Rent) Energy: P / MCFE, P / MCFE / D (MCFE = 1 Million Cubic Foot Equivalent, MCFE/D = MCFE per Day), P / NAV (Share Price / Net Asset Value) Real Estate Investment Trusts (REITs): Price / FFO, Price / AFFO (Funds From Operations, Adjusted Funds From Operations) Technology and Energy should be straightforward \u2013 you\u2019re looking at traffic and energy reserves as value drivers rather than revenue or profit. For Retail / Airlines, you often remove Rent because it is a major expense and one that varies significantly between different types of companies. For REITs, Funds From Operations is a common metric that adds back Depreciation and subtracts gains on the sale of property. Depreciation is a non-cash yet extremely large expense in real estate, and gains on sales of properties are assumed to be non-recurring, so FFO is viewed as a \u201cnormalized\u201d picture of the cash flow the REIT is generating.","cat":"valuation","diff":1,"src":"400Q"},{"q":"When you\u2019re looking at an industry-specific multiple like EV / Scientists or EV / Subscribers, why do you use Enterprise Value rather than Equity Value?","a":"You use Enterprise Value because those scientists or subscribers are \u201cavailable\u201d to all the investors (both debt and equity) in a company. The same logic doesn\u2019t apply to everything, though \u2013 you need to think through the multiple and see which investors the particular metric is \u201cavailable\u201d to.","cat":"valuation","diff":1,"src":"400Q"},{"q":"Would an LBO or DCF give a higher valuation? Technically it could go either way, but in most cases the LBO will give you a lower valuation.","a":"Here\u2019s the easiest way to think about it: with an LBO, you do not get any value from the cash flows of a company in between Year 1 and the final year \u2013 you\u2019re only valuing it based on its terminal value. With a DCF, by contrast, you\u2019re taking into account both the company\u2019s cash flows in between and its terminal value, so values tend to be higher. Note: Unlike a DCF, an LBO model by itself does not give a specific valuation. Instead, you set a desired IRR and determine how much you could pay for the company (the valuation) based on that.","cat":"valuation","diff":1,"src":"400Q"},{"q":"How would you present these Valuation methodologies to a company or its investors?","a":"Usually you use a \u201cfootball field\u201d chart where you show the valuation range implied by each methodology. You always show a range rather than one specific number. As an example, see page 10 of this document (a Valuation done by Credit Suisse for the Leveraged Buyout of Sungard Data Systems in 2005):","cat":"valuation","diff":1,"src":"400Q"},{"q":"How would you value an apple tree?","a":"The same way you would value a company: by looking at what comparable apple trees are worth (relative valuation) and the value of the apple tree\u2019s cash flows (intrinsic valuation). Yes, you could do a DCF for anything \u2013 even an apple tree.","cat":"valuation","diff":1,"src":"400Q"},{"q":"Why can\u2019t you use Equity Value / EBITDA as a multiple rather than Enterprise Value / EBITDA? EBITDA is available to all investors in the company \u2013 rather than just equity holders. Similarly, Enterprise Value is also available to all shareholders so it makes sense to pair them together.","a":"Equity Value / EBITDA, however, is comparing apples to oranges because Equity Value does not reflect the company\u2019s entire capital structure \u2013 only the part available to equity investors.","cat":"valuation","diff":1,"src":"400Q"},{"q":"When would a Liquidation Valuation produce the highest value?","a":"This is highly unusual, but it could happen if a company had substantial hard assets but the market was severely undervaluing it for a specific reason (such as an earnings miss or cyclicality). As a result, the company\u2019s Comparable Companies and Precedent Transactions would likely produce lower values as well \u2013 and if its assets were valued highly enough, Liquidation Valuation might give a higher value than other methodologies.","cat":"valuation","diff":1,"src":"400Q"},{"q":"Let\u2019s go back to 2004 and look at Facebook back when it had no profit and no revenue. How would you value it?","a":"You would use Comparable Companies and Precedent Transactions and look at more \u201ccreative\u201d multiples such as EV/Unique Visitors and EV/Pageviews rather than EV/Revenue or EV/EBITDA. You would not use a \u201cfar in the future DCF\u201d because you can\u2019t reasonably predict cash flows for a company that is not even making money yet. This is a very common wrong answer given by interviewees. When you can\u2019t predict cash flow, use other metrics \u2013 don\u2019t try to predict cash flow anyway!","cat":"valuation","diff":1,"src":"400Q"},{"q":"What would you use in conjunction with Free Cash Flow multiples \u2013 Equity Value or Enterprise Value?","a":"Trick question. For Unlevered Free Cash Flow, you would use Enterprise Value, but for Levered Free Cash Flow you would use Equity Value. Remember, Unlevered Free Cash Flow excludes Interest and thus represents money available to all investors, whereas Levered already includes Interest and the money is therefore only available to equity investors. Debt investors have already \u201cbeen paid\u201d with the interest payments they received. 106 18. You never use Equity Value / EBITDA, but are there any cases where you might use Equity Value / Revenue? Never say never. It\u2019s very rare to see this, but sometimes large financial institutions with big cash balances have negative Enterprise Values \u2013 so you might use Equity Value / Revenue instead. You might see Equity Value / Revenue if you\u2019ve listed a set of financial and nonfinancial companies on a slide, you\u2019re showing Revenue multiples for the non-financial companies, and you want to show something similar for the financials. Note, however, that in most cases you would be using other multiples such as P/E and P/BV with banks anyway.","cat":"valuation","diff":1,"src":"400Q"},{"q":"How do you apply the 3 valuation methodologies to actually get a value for the company you\u2019re looking at?","a":"Sometimes this simple fact gets lost in discussion of Valuation methodologies. You take the median multiple of a set of companies or transactions, and then multiply it by the relevant metric from the company you\u2019re valuing. Example: If the median EBITDA multiple from your set of Precedent Transactions is 8x and your company\u2019s EBITDA is $500 million, the implied Enterprise Value would be $4 billion. To get the \u201cfootball field\u201d valuation graph you often see, you look at the minimum, maximum, 25th percentile and 75th percentile in each set as well and create a range of values based on each methodology.","cat":"valuation","diff":1,"src":"400Q"},{"q":"What do you actually use a valuation for?","a":"Usually you use it in pitch books and in client presentations when you\u2019re providing updates and telling them what they should expect for their own valuation. It\u2019s also used right before a deal closes in a Fairness Opinion, a document a bank creates that \u201cproves\u201d the value their client is paying or receiving is \u201cfair\u201d from a financial point of view. Valuations can also be used in defense analyses, merger models, LBO models, DCFs (because terminal multiples are based off of comps), and pretty much anything else in finance.","cat":"valuation","diff":1,"src":"400Q"},{"q":"Why would a company with similar growth and profitability to its Comparable Companies be valued at a premium? This could happen for a number of reasons: \u2022 \u2022","a":"The company has just reported earnings well-above expectations and its stock price has risen recently. It has some type of competitive advantage not reflected in its financials, such as a key patent or other intellectual property. 108 \u2022 \u2022 It has just won a favorable ruling in a major lawsuit. It is the market leader in an industry and has greater market share than its competitors.","cat":"valuation","diff":1,"src":"400Q"},{"q":"What are the flaws with public company comparables? \u2022 \u2022 \u2022","a":"No company is 100% comparable to another company. The stock market is \u201cemotional\u201d \u2013 your multiples might be dramatically higher or lower on certain dates depending on the market\u2019s movements. Share prices for small companies with thinly-traded stocks may not reflect their full value.","cat":"valuation","diff":1,"src":"400Q"},{"q":"Do you ALWAYS use the median multiple of a set of public company comparables or precedent transactions?","a":"There\u2019s no \u201crule\u201d that you have to do this, but in most cases you do because you want to use values from the middle range of the set. But if the company you\u2019re valuing is distressed, is not performing well, or is at a competitive disadvantage, you might use the 25th percentile or something in the lower range instead \u2013 and vice versa if it\u2019s doing well.","cat":"valuation","diff":1,"src":"400Q"},{"q":"You mentioned that Precedent Transactions usually produce a higher value than Comparable Companies \u2013 can you think of a situation where this is not the case?","a":"Sometimes this happens when there is a substantial mismatch between the M&A market and the public market. For example, no public companies have been acquired recently but there have been a lot of small private companies acquired at extremely low valuations. For the most part this generalization is true but keep in mind that there are exceptions to almost every \u201crule\u201d in finance. 109 27. What are some flaws with precedent transactions? \u2022 \u2022 Past transactions are rarely 100% comparable \u2013 the transaction structure, size of the company, and market sentiment all have huge effects. Data on precedent transactions is generally more difficult to find than it is for public company comparables, especially for acquisitions of small private companies.","cat":"valuation","diff":1,"src":"400Q"},{"q":"Why does Warren Buffett prefer EBIT multiples to EBITDA multiples?","a":"Warren Buffett once famously said, \"Does management think the tooth fairy pays for capital expenditures?\u201d He dislikes EBITDA because it excludes the often sizable Capital Expenditures companies make and hides how much cash they are actually using to finance their operations. In some industries there is also a large gap between EBIT and EBITDA \u2013 anything that is very capital-intensive, for example, will show a big disparity.","cat":"valuation","diff":1,"src":"400Q"},{"q":"The EV / EBIT, EV / EBITDA, and P / E multiples all measure a company\u2019s profitability. What\u2019s the difference between them, and when do you use each one?","a":"P / E depends on the company\u2019s capital structure whereas EV / EBIT and EV / EBITDA are capital structure-neutral. Therefore, you use P / E for banks, financial institutions, and other companies where interest payments / expenses are critical. EV / EBIT includes Depreciation & Amortization whereas EV / EBITDA excludes it \u2013 you\u2019re more likely to use EV / EBIT in industries where D&A is large and where capital expenditures and fixed assets are important (e.g. manufacturing), and EV / EBITDA in industries where fixed assets are less important and where D&A is comparatively smaller (e.g. Internet companies).","cat":"valuation","diff":1,"src":"400Q"},{"q":"How do you value a private company? You use the same methodologies as with public companies: public company comparables, precedent transactions, and DCF. But there are some differences: \u2022","a":"\u2022 \u2022 \u2022 You might apply a 10-15% (or more) discount to the public company comparable multiples because the private company you\u2019re valuing is not as \u201cliquid\u201d as the public comps. You can\u2019t use a premiums analysis or future share price analysis because a private company doesn\u2019t have a share price. Your valuation shows the Enterprise Value for the company as opposed to the implied per-share price as with public companies. A DCF gets tricky because a private company doesn\u2019t have a market capitalization or Beta \u2013 you would probably just estimate WACC based on the public comps\u2019 WACC rather than trying to calculate it.","cat":"valuation","diff":1,"src":"400Q"},{"q":"Let\u2019s say we\u2019re valuing a private company. Why might we discount the public company comparable multiples but not the precedent transaction multiples?","a":"There\u2019s no discount because with precedent transactions, you\u2019re acquiring the entire company \u2013 and once it\u2019s acquired, the shares immediately become illiquid. But shares \u2013 the ability to buy individual \u201cpieces\u201d of a company rather than the whole thing \u2013 can be either liquid (if it\u2019s public) or illiquid (if it\u2019s private). Since shares of public companies are always more liquid, you would discount public company comparable multiples to account for this.","cat":"valuation","diff":1,"src":"400Q"},{"q":"Can you use private companies as part of your valuation?","a":"Only in the context of precedent transactions \u2013 it would make no sense to include them for public company comparables or as part of the Cost of Equity / WACC calculation in a DCF because they are not public and therefore have no values for market cap or Beta. 112","cat":"valuation","diff":1,"src":"400Q"},{"q":"How do you value banks and financial institutions differently from other companies? You mostly use the same methodologies, except: \u2022","a":"\u2022 \u2022 You look at P / E and P / BV (Book Value) multiples rather than EV / Revenue, EV / EBITDA, and other \u201cnormal\u201d multiples, since banks have unique capital structures. You pay more attention to bank-specific metrics like NAV (Net Asset Value) and you might screen companies and precedent transactions based on those instead. Rather than a DCF, you use a Dividend Discount Model (DDM) which is similar but is based on the present value of the company\u2019s dividends rather than its free cash flows. You need to use these methodologies and multiples because interest is a critical component of a bank\u2019s revenue and because debt is part of its business model rather than just a way to finance acquisitions or expand the business.","cat":"valuation","diff":3,"src":"400Q"},{"q":"Walk me through an M&A premiums analysis.","a":"The purpose of this analysis is to look at similar transactions and see the premiums that buyers have paid to sellers\u2019 share prices when acquiring them. For example, if a company is trading at $10.00/share and the buyer acquires it for $15.00/share, that\u2019s a 50% premium.","cat":"valuation","diff":3,"src":"400Q"},{"q":"Walk me through a future share price analysis.","a":"The purpose of this analysis is to project what a company\u2019s share price might be 1 or 2 years from now and then discount it back to its present value.","cat":"valuation","diff":3,"src":"400Q"},{"q":"Both M&A premiums analysis and precedent transactions involve looking at previous M&A transactions. What\u2019s the difference in how we select them? \u2022 \u2022","a":"\u2022 All the sellers in the M&A premiums analysis must be public. Usually we use a broader set of transactions for M&A premiums \u2013 we might use fewer than 10 precedent transactions but we might have dozens of M&A premiums. The industry and financial screens are usually less stringent. Aside from those, the screening criteria is similar \u2013 financial, industry, geography, and date.","cat":"valuation","diff":3,"src":"400Q"},{"q":"Walk me through a Sum-of-the-Parts analysis.","a":"In a Sum-of-the-Parts analysis, you value each division of a company using separate comparables and transactions, get to separate multiples, and then add up each division\u2019s value to get the total for the company. Example: We have a manufacturing division with $100 million EBITDA, an entertainment division with $50 million EBITDA and a consumer goods division with $75 million EBITDA. We\u2019ve selected comparable companies and transactions for each division, and the 115 median multiples come out to 5x EBITDA for manufacturing, 8x EBITDA for entertainment, and 4x EBITDA for consumer goods. Our calculation would be $100 * 5x + $50 * 8x + $75 * 4x = $1.2 billion for the company\u2019s total value.","cat":"valuation","diff":3,"src":"400Q"},{"q":"How do you value Net Operating Losses and take them into account in a valuation?","a":"You value NOLs based on how much they\u2019ll save the company in taxes in future years, and then take the present value of the sum of tax savings in future years. Two ways to assess the tax savings in future years:","cat":"valuation","diff":3,"src":"400Q"},{"q":"I have a set of public company comparables and need to get the projections from equity research. How do I select which report to use?","a":"This varies by bank and group, but two common methods:","cat":"valuation","diff":3,"src":"400Q"},{"q":"I have a set of precedent transactions but I\u2019m missing information like EBITDA for a lot of the companies \u2013 how can I find it if it\u2019s not available via public sources?","a":"1. Search online and see if you can find press releases or articles in the financial press with these numbers.","cat":"valuation","diff":3,"src":"400Q"},{"q":"How far back and forward do we usually go for public company comparable and precedent transaction multiples?","a":"Usually you look at the TTM (Trailing Twelve Months) period for both sets, and then you look forward either 1 or 2 years. You\u2019re more likely to look backward more than 1 year and go forward more than 2 years for public company comparables; for precedent transactions it\u2019s odd to go forward more than 1 year because your information is more limited.","cat":"valuation","diff":3,"src":"400Q"},{"q":"I have one company with a 40% EBITDA margin trading at 8x EBITDA, and another company with a 10% EBITDA margin trading at 16x EBITDA. What\u2019s the problem with comparing these two valuations directly?","a":"There\u2019s no \u201crule\u201d that says this is wrong or not allowed, but it can be misleading to compare companies with dramatically different margins. Due to basic arithmetic, the 40% margin company will usually have a lower multiple \u2013 whether or not its actual value is lower. In this situation, we might consider screening based on margins and remove the outliers \u2013 you would never try to \u201cnormalize\u201d the EBITDA multiples based on margins.","cat":"valuation","diff":3,"src":"400Q"},{"q":"Walk me through how we might value an oil & gas company and how it\u2019s different from a \u201cstandard\u201d company. You use the same methodologies, except: \u2022 \u2022","a":"You look at industry-specific multiples like P / MCFE and P / NAV in addition to the more standard ones. You need to project the prices of commodities like oil and natural gas, and also the company\u2019s reserves to determine its revenue and cash flows in future years. 117 \u2022 Rather than a DCF, you use a NAV (Net Asset Value) model \u2013 it\u2019s similar, but everything flows from the company\u2019s reserves rather than simple revenue growth / EBITDA margin projections. In addition to all of the above, there are also some accounting complications with energy companies and you need to think about what a \u201cproven\u201d reserve is vs. what is more speculative.","cat":"valuation","diff":3,"src":"400Q"},{"q":"Walk me through a DCF.","a":"\u201cA DCF values a company based on the Present Value of its Cash Flows and the Present Value of its Terminal Value. First, you project out a company\u2019s financials using assumptions for revenue growth, expenses and Working Capital; then you get down to Free Cash Flow for each year, which you then sum up and discount to a Net Present Value, based on your discount rate \u2013 usually the Weighted Average Cost of Capital. Once you have the present value of the Cash Flows, you determine the company\u2019s Terminal Value, using either the Multiples Method or the Gordon Growth Method, and then also discount that back to its Net Present Value using WACC. Finally, you add the two together to determine the company\u2019s Enterprise Value.\u201d","cat":"dcf","diff":1,"src":"400Q"},{"q":"Walk me through how you get from Revenue to Free Cash Flow in the projections.","a":"Subtract COGS and Operating Expenses to get to Operating Income (EBIT). Then, multiply by (1 \u2013 Tax Rate), add back Depreciation and other non-cash charges, and subtract Capital Expenditures and the change in Working Capital. Note: This gets you to Unlevered Free Cash Flow since you went off EBIT rather than EBT. You might want to confirm that this is what the interviewer is asking for.","cat":"dcf","diff":1,"src":"400Q"},{"q":"What\u2019s an alternate way to calculate Free Cash Flow aside from taking Net Income, adding back Depreciation, and subtracting Changes in Operating Assets / Liabilities and CapEx?","a":"Take Cash Flow From Operations and subtract CapEx \u2013 that gets you to Levered Cash Flow. To get to Unlevered Cash Flow, you then need to add back the tax-adjusted Interest Expense and subtract the tax-adjusted Interest Income.","cat":"dcf","diff":1,"src":"400Q"},{"q":"Why do you use 5 or 10 years for DCF projections?","a":"That\u2019s usually about as far as you can reasonably predict into the future. Less than 5 years would be too short to be useful, and over 10 years is too difficult to predict for most companies.","cat":"dcf","diff":1,"src":"400Q"},{"q":"What do you usually use for the discount rate?","a":"Normally you use WACC (Weighted Average Cost of Capital), though you might also use Cost of Equity depending on how you\u2019ve set up the DCF.","cat":"dcf","diff":1,"src":"400Q"},{"q":"How do you calculate WACC?","a":"The formula is: Cost of Equity * (% Equity) + Cost of Debt * (% Debt) * (1 \u2013 Tax Rate) + Cost of Preferred * (% Preferred). In all cases, the percentages refer to how much of the company\u2019s capital structure is taken up by each component. For Cost of Equity, you can use the Capital Asset Pricing Model (CAPM \u2013 see the next question) and for the others you usually look at comparable companies/debt issuances and the interest rates and yields issued by similar companies to get estimates.","cat":"dcf","diff":1,"src":"400Q"},{"q":"How do you calculate the Cost of Equity?","a":"Cost of Equity = Risk-Free Rate + Beta * Equity Risk Premium The risk-free rate represents how much a 10-year or 20-year US Treasury should yield; Beta is calculated based on the \u201criskiness\u201d of Comparable Companies and the Equity Risk Premium is the % by which stocks are expected to out-perform \u201crisk-less\u201d assets. Normally you pull the Equity Risk Premium from a publication called Ibbotson\u2019s. Note: This formula does not tell the whole story. Depending on the bank and how precise you want to be, you could also add in a \u201csize premium\u201d and \u201cindustry 120 premium\u201d to account for how much a company is expected to out-perform its peers is according to its market cap or industry. Small company stocks are expected to out-perform large company stocks and certain industries are expected to out-perform others, and these premiums reflect these expectations.","cat":"dcf","diff":1,"src":"400Q"},{"q":"How do you get to Beta in the Cost of Equity calculation?","a":"You look up the Beta for each Comparable Company (usually on Bloomberg), un-lever each one, take the median of the set and then lever it based on your company\u2019s capital structure. Then you use this Levered Beta in the Cost of Equity calculation. For your reference, the formulas for un-levering and re-levering Beta are below: Un-Levered Beta = Levered Beta / (1 + ((1 - Tax Rate) x (Total Debt/Equity))) Levered Beta = Un-Levered Beta x (1 + ((1 - Tax Rate) x (Total Debt/Equity)))","cat":"dcf","diff":1,"src":"400Q"},{"q":"Why do you have to un-lever and re-lever Beta?","a":"Again, keep in mind our \u201capples-to-apples\u201d theme. When you look up the Betas on Bloomberg (or from whatever source you\u2019re using) they will be levered to reflect the debt already assumed by each company. But each company\u2019s capital structure is different and we want to look at how \u201crisky\u201d a company is regardless of what % debt or equity it has. To get that, we need to un-lever Beta each time. But at the end of the calculation, we need to re-lever it because we want the Beta used in the Cost of Equity calculation to reflect the true risk of our company, taking into account its capital structure this time.","cat":"dcf","diff":1,"src":"400Q"},{"q":"Would you expect a manufacturing company or a technology company to have a higher Beta? A technology company, because technology is viewed as a \u201criskier\u201d industry than manufacturing.","a":"11. Let\u2019s say that you use Levered Free Cash Flow rather than Unlevered Free Cash Flow in your DCF \u2013 what is the effect? Levered Free Cash Flow gives you Equity Value rather than Enterprise Value, since the cash flow is only available to equity investors (debt investors have already been \u201cpaid\u201d with the interest payments).","cat":"dcf","diff":1,"src":"400Q"},{"q":"If you use Levered Free Cash Flow, what should you use as the Discount Rate?","a":"You would use the Cost of Equity rather than WACC since we\u2019re not concerned with Debt or Preferred Stock in this case \u2013 we\u2019re calculating Equity Value, not Enterprise Value.","cat":"dcf","diff":1,"src":"400Q"},{"q":"How do you calculate the Terminal Value?","a":"You can either apply an exit multiple to the company\u2019s Year 5 EBITDA, EBIT or Free Cash Flow (Multiples Method) or you can use the Gordon Growth method to estimate its value based on its growth rate into perpetuity. The formula for Terminal Value using Gordon Growth is: Terminal Value = Year 5 Free Cash Flow * (1 + Growth Rate) / (Discount Rate \u2013 Growth Rate).","cat":"dcf","diff":1,"src":"400Q"},{"q":"Why would you use Gordon Growth rather than the Multiples Method to calculate the Terminal Value?","a":"In banking, you almost always use the Multiples Method to calculate Terminal Value in a DCF. It\u2019s much easier to get appropriate data for exit multiples since they are based on Comparable Companies \u2013 picking a long-term growth rate, by contrast, is always a shot in the dark. However, you might use Gordon Growth if you have no good Comparable Companies or if you have reason to believe that multiples will change significantly in the industry several years down the road. For example, if an industry is very cyclical you might be better off using long-term growth rates rather than exit multiples.","cat":"dcf","diff":1,"src":"400Q"},{"q":"What\u2019s an appropriate growth rate to use when calculating the Terminal Value?","a":"Normally you use the country\u2019s long-term GDP growth rate, the rate of inflation, or something similarly conservative. For companies in mature economies, a long-term growth rate over 5% would be quite aggressive since most developed economies are growing at less than 5% per year.","cat":"dcf","diff":1,"src":"400Q"},{"q":"How do you select the appropriate exit multiple when calculating Terminal Value?","a":"Normally you look at the Comparable Companies and pick the median of the set, or something close to it. As with almost anything else in finance, you always show a range of exit multiples and what the Terminal Value looks like over that range rather than picking one specific number. So if the median EBITDA multiple of the set were 8x, you might show a range of values using multiples from 6x to 10x.","cat":"dcf","diff":1,"src":"400Q"},{"q":"Which method of calculating Terminal Value will give you a higher valuation?","a":"It\u2019s hard to generalize because both are highly dependent on the assumptions you make. In general, the Multiples Method will be more variable than the Gordon Growth method because exit multiples tend to span a wider range than possible long-term growth rates.","cat":"dcf","diff":1,"src":"400Q"},{"q":"What\u2019s the flaw with basing terminal multiples on what public company comparables are trading at?","a":"The median multiples may change greatly in the next 5-10 years so it may no longer be accurate by the end of the period you\u2019re looking at. This is why you normally look at a wide range of multiples and do a sensitivity to see how the valuation changes over that range. This method is particularly problematic with cyclical industries (e.g. semiconductors).","cat":"dcf","diff":1,"src":"400Q"},{"q":"How do you know if your DCF is too dependent on future assumptions? The \u201cstandard\u201d answer: if significantly more than 50% of the company\u2019s Enterprise Value comes from its Terminal Value, your DCF is probably too dependent on future assumptions.","a":"In reality, almost all DCFs are \u201ctoo dependent on future assumptions\u201d \u2013 it\u2019s actually quite rare to see a case where the Terminal Value is less than 50% of the Enterprise Value. But when it gets to be in the 80-90% range, you know that you may need to re-think your assumptions\u2026","cat":"dcf","diff":1,"src":"400Q"},{"q":"Should Cost of Equity be higher for a $5 billion or $500 million market cap company?","a":"It should be higher for the $500 million company, because all else being equal, smaller companies are expected to outperform large companies in the stock market (and therefore be \u201cmore risky\u201d). Using a Size Premium in your calculation would also ensure that Cost of Equity is higher for the $500 million company.","cat":"dcf","diff":1,"src":"400Q"},{"q":"What about WACC \u2013 will it be higher for a $5 billion or $500 million company?","a":"This is a bit of a trick question because it depends on whether or not the capital structure is the same for both companies. If the capital structure is the same in terms of percentages and interest rates and such, then WACC should be higher for the $500 million company for the same reasons as mentioned above. If the capital structure is not the same, then it could go either way depending on how much debt/preferred stock each one has and what the interest rates are.","cat":"dcf","diff":1,"src":"400Q"},{"q":"What\u2019s the relationship between debt and Cost of Equity?","a":"More debt means that the company is more risky, so the company\u2019s Levered Beta will be higher \u2013 all else being equal, additional debt would raise the Cost of Equity, and less debt would lower the Cost of Equity.","cat":"dcf","diff":1,"src":"400Q"},{"q":"Cost of Equity tells us what kind of return an equity investor can expect for investing in a given company \u2013 but what about dividends? Shouldn\u2019t we factor dividend yield into the formula?","a":"Trick question. Dividend yields are already factored into Beta, because Beta describes returns in excess of the market as a whole \u2013 and those returns include dividends.","cat":"dcf","diff":1,"src":"400Q"},{"q":"How can we calculate Cost of Equity WITHOUT using CAPM?","a":"There is an alternate formula: Cost of Equity = (Dividends per Share / Share Price) + Growth Rate of Dividends This is less common than the \u201cstandard\u201d formula but sometimes you use it for companies where dividends are more important or when you lack proper information on Beta and the other variables that go into calculating Cost of Equity with CAPM.","cat":"dcf","diff":1,"src":"400Q"},{"q":"Two companies are exactly the same, but one has debt and one does not \u2013 which one
