will have the higher WACC? This is tricky \u2013 the one without debt will have a higher WACC up to a certain point, because debt is \u201cless expensive\u201d than equity. Why? \u2022 \u2022 \u2022","a":"Interest on debt is tax-deductible (hence the (1 \u2013 Tax Rate) multiplication in the WACC formula). Debt is senior to equity in a company\u2019s capital structure \u2013 debt holders would be paid first in a liquidation or bankruptcy. Intuitively, interest rates on debt are usually lower than the Cost of Equity numbers you see (usually over 10%). As a result, the Cost of Debt portion of WACC will contribute less to the total figure than the Cost of Equity portion will. However, the above is true only to a certain point. Once a company\u2019s debt goes up high enough, the interest rate will rise dramatically to reflect the additional risk and so the Cost of Debt would start to increase \u2013 if it gets high enough, it might become higher than Cost of Equity and additional debt would increase WACC. It\u2019s a \u201cU-shape\u201d curve where debt decreases WACC to a point, then starts increasing it.","cat":"dcf","diff":1,"src":"400Q"},{"q":"Which has a greater impact on a company\u2019s DCF valuation \u2013 a 10% change in revenue or a 1% change in the discount rate?","a":"You should start by saying, \u201cit depends\u201d but most of the time the 10% difference in revenue will have more of an impact. That change in revenue doesn\u2019t affect only the current year\u2019s revenue, but also the revenue/EBITDA far into the future and even the terminal value.","cat":"dcf","diff":1,"src":"400Q"},{"q":"What about a 1% change in revenue vs. a 1% change in the discount rate?","a":"In this case the discount rate is likely to have a bigger impact on the valuation, though the correct answer should start with, \u201cIt could go either way, but most of the time\u2026\u201d","cat":"dcf","diff":1,"src":"400Q"},{"q":"How do you calculate WACC for a private company?","a":"This is problematic because private companies don\u2019t have market caps or Betas. In this case you would most likely just estimate WACC based on work done by auditors or valuation specialists, or based on what WACC for comparable public companies is.","cat":"dcf","diff":1,"src":"400Q"},{"q":"What should you do if you don\u2019t believe management\u2019s projections for a DCF model? You can take a few different approaches: \u2022 \u2022 \u2022","a":"You can create your own projections. You can modify management\u2019s projections downward to make them more conservative. You can show a sensitivity table based on different growth rates and margins and show the values assuming managements\u2019 projections and assuming a more conservative set of numbers. In reality, you\u2019d probably do all of these if you had unrealistic projections.","cat":"dcf","diff":1,"src":"400Q"},{"q":"Why would you not use a DCF for a bank or other financial institution?","a":"Banks use debt differently than other companies and do not re-invest it in the business \u2013 they use it to create products instead. Also, interest is a critical part of banks\u2019 business models and working capital takes up a huge part of their Balance Sheets \u2013 so a DCF for a financial institution would not make much sense. For financial institutions, it\u2019s more common to use a dividend discount model for valuation purposes.","cat":"dcf","diff":1,"src":"400Q"},{"q":"What types of sensitivity analyses would we look at in a DCF? Example sensitivities: \u2022","a":"Revenue Growth vs. Terminal Multiple 126 \u2022 \u2022 \u2022 EBITDA Margin vs. Terminal Multiple Terminal Multiple vs. Discount Rate Long-Term Growth Rate vs. Discount Rate And any combination of these (except Terminal Multiple vs. Long-Term Growth Rate, which would make no sense).","cat":"dcf","diff":1,"src":"400Q"},{"q":"A company has a high debt load and is paying off a significant portion of its principal each year. How do you account for this in a DCF?","a":"Trick question. You don\u2019t account for this at all in a DCF, because paying off debt principal shows up in Cash Flow from Financing on the Cash Flow Statement \u2013 but we only go down to Cash Flow from Operations and then subtract Capital Expenditures to get to Free Cash Flow. If we were looking at Levered Free Cash Flow, then our interest expense would decline in future years due to the principal being paid off \u2013 but we still wouldn\u2019t count the principal repayments themselves anywhere. 127","cat":"dcf","diff":1,"src":"400Q"},{"q":"Explain why we would use the mid-year convention in a DCF.","a":"You use it to represent the fact that a company\u2019s cash flow does not come 100% at the end of each year \u2013 instead, it comes in evenly throughout each year. In a DCF without mid-year convention, we would use discount period numbers of 1 for the first year, 2 for the second year, 3 for the third year, and so on. With mid-year convention, we would instead use 0.5 for the first year, 1.5 for the second year, 2.5 for the third year, and so on.","cat":"dcf","diff":3,"src":"400Q"},{"q":"How does the terminal value calculation change when we use the mid-year convention? When you\u2019re discounting the terminal value back to the present value, you use different numbers for the discount period depending on whether you\u2019re using the Multiples Method or Gordon Growth Method: \u2022","a":"Multiples Method: You add 0.5 to the final year discount number to reflect the fact that you\u2019re assuming the company gets sold at the end of the year. 128 \u2022 Gordon Growth Method: You use the final year discount number as is, because you\u2019re assuming the cash flows grow into perpetuity and that they are still received throughout the year rather than just at the end.","cat":"dcf","diff":3,"src":"400Q"},{"q":"If I\u2019m working with a public company in a DCF, how do I calculate its per-share value?","a":"Once you get to Enterprise Value, ADD cash and then subtract debt, preferred stock, and minority interest (and any other debt-like items) to get to Equity Value. Then, you need to use a circular calculation that takes into account the basic shares outstanding, options, warrants, convertibles, and other dilutive securities. It\u2019s circular because the dilution from these depends on the per-share price \u2013 but the per-share price depends on number of shares outstanding, which depends on the per-share price. To resolve this, you need to enable iterative calculations in Excel so that it can cycle through to find an approximate per-share price.","cat":"dcf","diff":3,"src":"400Q"},{"q":"Walk me through a Dividend Discount Model (DDM) that you would use in place","a":"of a normal DCF for financial institutions. The mechanics are the same as a DCF, but we use dividends rather than free cash flows:","cat":"dcf","diff":3,"src":"400Q"},{"q":"When you\u2019re calculating WACC, let\u2019s say that the company has convertible debt. Do you count this as debt when calculating Levered Beta for the company?","a":"Trick question. If the convertible debt is in-the-money then you do not count it as debt but instead assume that it contributes to dilution, so the company\u2019s Equity Value is higher. If it\u2019s out-of-the-money then you count it as debt and use the interest rate on the convertible for Cost of Debt.","cat":"dcf","diff":3,"src":"400Q"},{"q":"We\u2019re creating a DCF for a company that is planning to buy a factory for $100 in cash (no debt or other financing) in Year 4. Currently the present value of its Enterprise Value according to the DCF is $200. How would we change the DCF to account for the factory purchase, and what would our new Enterprise Value be?","a":"In this scenario, you would add CapEx spending of $100 in year 4 of the DCF, which would reduce Free Cash Flow for that year by $100. The Enterprise Value, in turn, would fall by the present value of that $100 decrease in Free Cash Flow. The actual math here is messy but you would calculate the present value by dividing $100 by ((1 + Discount Rate)^4) \u2013 the \u201c4\u201d just represents year 4 here. Then you would subtract this amount from the Enterprise Value. 130","cat":"dcf","diff":3,"src":"400Q"},{"q":"Walk me through a basic merger model.","a":"\u201cA merger model is used to analyze the financial profiles of 2 companies, the purchase price and how the purchase is made, and determines whether the buyer\u2019s EPS increases or decreases. Step 1 is making assumptions about the acquisition \u2013 the price and whether it was cash, stock or debt or some combination of those. Next, you determine the valuations and shares outstanding of the buyer and seller and project out an Income Statement for each one. Finally, you combine the Income Statements, adding up line items such as Revenue and Operating Expenses, and adjusting for Foregone Interest on Cash and Interest Paid on Debt in the Combined Pre-Tax Income line; you apply the buyer\u2019s Tax Rate to get the Combined Net Income, and then divide by the new share count to determine the combined EPS.\u201d","cat":"ma","diff":1,"src":"400Q"},{"q":"What\u2019s the difference between a merger and an acquisition?","a":"There\u2019s always a buyer and a seller in any M&A deal \u2013 the difference between \u201cmerger\u201d and \u201cacquisition\u201d is more semantic than anything. In a merger the companies are close to the same size, whereas in an acquisition the buyer is significantly larger.","cat":"ma","diff":1,"src":"400Q"},{"q":"Why would a company want to acquire another company?","a":"Several possible reasons: \u2022 \u2022 \u2022 \u2022 \u2022 \u2022 The buyer wants to gain market share by buying a competitor. The buyer needs to grow more quickly and sees an acquisition as a way to do that. The buyer believes the seller is undervalued. The buyer wants to acquire the seller\u2019s customers so it can up-sell and cross-sell to them. The buyer thinks the seller has a critical technology, intellectual property or some other \u201csecret sauce\u201d it can use to significantly enhance its business. The buyer believes it can achieve significant synergies and therefore make the deal accretive for its shareholders.","cat":"ma","diff":1,"src":"400Q"},{"q":"Why would an acquisition be dilutive?","a":"An acquisition is dilutive if the additional amount of Net Income the seller contributes is not enough to offset the buyer\u2019s foregone interest on cash, additional interest paid on debt, and the effects of issuing additional shares. Acquisition effects \u2013 such as amortization of intangibles \u2013 can also make an acquisition dilutive.","cat":"ma","diff":1,"src":"400Q"},{"q":"Is there a rule of thumb for calculating whether an acquisition will be accretive or dilutive?","a":"If the deal involves just cash and debt, you can sum up the interest expense for debt and the foregone interest on cash, then compare it against the seller\u2019s Pre-Tax Income. And if it\u2019s an all-stock deal you can use a shortcut to assess whether it is accretive (see question #5). But if the deal involves cash, stock, and debt, there\u2019s no quick rule-of-thumb you can use unless you\u2019re lightning fast with mental math.","cat":"ma","diff":1,"src":"400Q"},{"q":"A company with a higher P/E acquires one with a lower P/E \u2013 is this accretive or dilutive? Trick question. You can\u2019t tell unless you also know that it\u2019s an all-stock deal. If it\u2019s an all-cash or all-debt deal, the P/E multiples of the buyer and seller don\u2019t matter because no stock is being issued.","a":"Sure, generally getting more earnings for less is good and is more likely to be accretive but there\u2019s no hard-and-fast rule unless it\u2019s an all-stock deal.","cat":"ma","diff":1,"src":"400Q"},{"q":"What is the rule of thumb for assessing whether an M&A deal will be accretive or dilutive?","a":"In an all-stock deal, if the buyer has a higher P/E than the seller, it will be accretive; if the buyer has a lower P/E, it will be dilutive. On an intuitive level if you\u2019re paying more for earnings than what the market values your own earnings at, you can guess that it will be dilutive; and likewise, if you\u2019re paying less for earnings than what the market values your own earnings at, you can guess that it would be accretive.","cat":"ma","diff":1,"src":"400Q"},{"q":"If a company were capable of paying 100% in cash for another company, why would it choose NOT to do so?","a":"It might be saving its cash for something else or it might be concerned about running low if business takes a turn for the worst; its stock may also be trading at an all-time high and it might be eager to use that instead (in finance terms this would be \u201cmore expensive\u201d but a lot of executives value having a safety cushion in the form of a large cash balance). 133 10. Why would a strategic acquirer typically be willing to pay more for a company than a private equity firm would? Because the strategic acquirer can realize revenue and cost synergies that the private equity firm cannot unless it combines the company with a complementary portfolio company. Those synergies boost the effective valuation for the target company.","cat":"ma","diff":1,"src":"400Q"},{"q":"Why do Goodwill & Other Intangibles get created in an acquisition?","a":"These represent the value over the \u201cfair market value\u201d of the seller that the buyer has paid. You calculate the number by subtracting the book value of a company from its equity purchase price. More specifically, Goodwill and Other Intangibles represent things like the value of customer relationships, brand names and intellectual property \u2013 valuable, but not true financial Assets that show up on the Balance Sheet.","cat":"ma","diff":1,"src":"400Q"},{"q":"What is the difference between Goodwill and Other Intangible Assets?","a":"Goodwill typically stays the same over many years and is not amortized. It changes only if there\u2019s goodwill impairment (or another acquisition). Other Intangible Assets, by contrast, are amortized over several years and affect the Income Statement by hitting the Pre-Tax Income line. There\u2019s also a difference in terms of what they each represent, but bankers rarely go into that level of detail \u2013 accountants and valuation specialists worry about assigning each one to specific items.","cat":"ma","diff":1,"src":"400Q"},{"q":"Is there anything else \u201cintangible\u201d besides Goodwill & Other Intangibles that could also impact the combined company?","a":"Yes. You could also have a Purchased In-Process R&D Write-off and a Deferred Revenue Write-off. The first refers to any Research & Development projects that were purchased in the acquisition but which have not been completed yet. The logic is that unfinished R&D 134 projects require significant resources to complete, and as such, the \u201cexpense\u201d must be recognized as part of the acquisition. The second refers to cases where the seller has collected cash for a service but not yet recorded it as revenue, and the buyer must write-down the value of the Deferred Revenue to avoid \u201cdouble-counting\u201d revenue.","cat":"ma","diff":1,"src":"400Q"},{"q":"What are synergies, and can you provide a few examples?","a":"Synergies refer to cases where 2 + 2 = 5 (or 6, or 7\u2026) in an acquisition. Basically, the buyer gets more value than out of an acquisition than what the financials would predict. There are 2 types: revenue synergies and cost (or expense) synergies. \u2022 \u2022 Revenue Synergies: The combined company can cross-sell products to new customers or up-sell new products to existing customers. It might also be able to expand into new geographies as a result of the deal. Cost Synergies: The combined company can consolidate buildings and administrative staff and can lay off redundant employees. It might also be able to shut down redundant stores or locations.","cat":"ma","diff":1,"src":"400Q"},{"q":"How are synergies used in merger models?","a":"Revenue Synergies: Normally you add these to the Revenue figure for the combined company and then assume a certain margin on the Revenue \u2013 this additional Revenue then flows through the rest of the combined Income Statement. Cost Synergies: Normally you reduce the combined COGS or Operating Expenses by this amount, which in turn boosts the combined Pre-Tax Income and thus Net Income, raising the EPS and making the deal more accretive.","cat":"ma","diff":1,"src":"400Q"},{"q":"Are revenue or cost synergies more important?","a":"No one in M&A takes revenue synergies seriously because they\u2019re so hard to predict. Cost synergies are taken a bit more seriously because it\u2019s more straightforward to see how buildings and locations might be consolidated and how many redundant employees might be eliminated. That said, the chances of any synergies actually being realized are almost 0 so few take them seriously at all.","cat":"ma","diff":1,"src":"400Q"},{"q":"All else being equal, which method would a company prefer to use when acquiring another company \u2013 cash, stock, or debt? Assuming the buyer had unlimited resources, it would always prefer to use cash when buying another company. Why? \u2022","a":"\u2022 \u2022 \u2022 Cash is \u201ccheaper\u201d than debt because interest rates on cash are usually under 5% whereas debt interest rates are almost always higher than that. Thus, foregone interest on cash is almost always less than additional interest paid on debt for the same amount of cash/debt. Cash is also less \u201crisky\u201d than debt because there\u2019s no chance the buyer might fail to raise sufficient funds from investors. It\u2019s hard to compare the \u201ccost\u201d directly to stock, but in general stock is the most \u201cexpensive\u201d way to finance a transaction \u2013 remember how the Cost of Equity is almost always higher than the Cost of Debt? That same principle applies here. Cash is also less risky than stock because the buyer\u2019s share price could change dramatically once the acquisition is announced.","cat":"ma","diff":1,"src":"400Q"},{"q":"How much debt could a company issue in a merger or acquisition?","a":"Generally you would look at Comparable Companies/ Precedent Transactions to determine this. You would use the combined company\u2019s LTM (Last Twelve Months) EBITDA figure, find the median Debt/EBITDA ratio of whatever companies you\u2019re looking at, and apply that to your own EBITDA figure to get a rough idea of how much debt you could raise. You would also look at \u201cDebt Comps\u201d for companies in the same industry and see what types of debt and how many tranches they have used.","cat":"ma","diff":1,"src":"400Q"},{"q":"How do you determine the Purchase Price for the target company in an acquisition?","a":"You use the same Valuation methodologies we already discussed. If the seller is a public company, you would pay more attention to the premium paid over the current share price to make sure it\u2019s \u201csufficient\u201d (generally in the 15-30% range) to win shareholder approval. For private sellers, more weight is placed on the traditional methodologies.","cat":"ma","diff":1,"src":"400Q"},{"q":"Let\u2019s say a company overpays for another company \u2013 what typically happens afterwards and can you give any recent examples?","a":"There would be an incredibly high amount of Goodwill & Other Intangibles created if the price is far above the fair market value of the company. Depending on how the acquisition goes, there might be a large goodwill impairment charge later on if the company decides it overpaid. A recent example is the eBay / Skype deal, in which eBay paid a huge premium and extremely high multiple for Skype. It created excess Goodwill & Other Intangibles, and eBay later ended up writing down much of the value and taking a large quarterly loss as a result.","cat":"ma","diff":1,"src":"400Q"},{"q":"A buyer pays $100 million for the seller in an all-stock deal, but a day later the market decides it\u2019s only worth $50 million. What happens?","a":"The buyer\u2019s share price would fall by whatever per-share dollar amount corresponds to the $50 million loss in value. Note that it would not necessarily be cut in half. Depending on how the deal was structured, the seller would effectively only be receiving half of what it had originally negotiated. This illustrates one of the major risks of all-stock deals: sudden changes in share price could dramatically impact valuation.","cat":"ma","diff":1,"src":"400Q"},{"q":"Why do most mergers and acquisitions fail?","a":"Like so many things, M&A is \u201ceasier said than done.\u201d In practice it\u2019s very difficult to acquire and integrate a different company, actually realize synergies and also turn the acquired company into a profitable division. Many deals are also done for the wrong reasons, such as CEO ego or pressure from shareholders. Any deal done without both parties\u2019 best interests in mind is likely to fail.","cat":"ma","diff":1,"src":"400Q"},{"q":"What role does a merger model play in deal negotiations?","a":"The model is used as a sanity check and is used to test various assumptions. A company would never decide to do a deal based on the output of a model. It might say, \u201cOk, the model tells us this deal could work and be moderately accretive \u2013 it\u2019s worth exploring more.\u201d It would never say, \u201cAha! This model predicts 21% accretion \u2013 we should definitely acquire them now!\u201d Emotions, ego and personalities play a far bigger role in M&A (and any type of negotiation) than numbers do.","cat":"ma","diff":1,"src":"400Q"},{"q":"What types of sensitivities would you look at in a merger model? What variables","a":"would you look at? The most common variables to look at are Purchase Price, % Stock/Cash/Debt, Revenue Synergies, and Expense Synergies. Sometimes you also look at different operating sensitivities, like Revenue Growth or EBITDA Margin, but it\u2019s more common to build these into your model as different scenarios instead. You might look at sensitivity tables showing the EPS accretion/dilution at different ranges for the Purchase Price vs. Cost Synergies, Purchase Price vs. Revenue Synergies, or Purchase Price vs. % Cash (and so on). 138","cat":"ma","diff":1,"src":"400Q"},{"q":"What\u2019s the difference between Purchase Accounting and Pooling Accounting in an M&A deal?","a":"In purchase accounting the seller\u2019s shareholders\u2019 equity number is wiped out and the premium paid over that value is recorded as Goodwill on the combined balance sheet post-acquisition. In pooling accounting, you simply combine the 2 shareholders\u2019 equity numbers rather than worrying about Goodwill and the related items that get created. There are specific requirements for using pooling accounting, so in 99% of M&A deals you will use purchase accounting.","cat":"ma","diff":3,"src":"400Q"},{"q":"Walk me through a concrete example of how to calculate revenue synergies.","a":"\u201cLet\u2019s say that Microsoft is going to acquire Yahoo. Yahoo makes money from search advertising online, and they make a certain amount of revenue per search (RPS). Let\u2019s say this RPS is $0.10 right now. If Microsoft acquired it, we might assume that they could boost this RPS by $0.01 or $0.02 because of their superior monetization. So to calculate the additional revenue from this synergy, we would multiply this $0.01 or $0.02 by Yahoo\u2019s total # of searches, get the total additional revenue, and then select a margin on it to determine how much flows through to the combined company\u2019s Operating Income.\u201d","cat":"ma","diff":3,"src":"400Q"},{"q":"Why do deferred tax liabilities (DTLs) and deferred tax assets (DTAs) get created in M&A deals?","a":"These get created when you write up assets \u2013 both tangible and intangible \u2013 and when you write down assets in a transaction. An asset write-up creates a deferred tax liability, and an asset write-down creates a deferred tax asset. You write down and write up assets because their book value \u2013 what\u2019s on the balance sheet \u2013 often differs substantially from their \u201cfair market value.\u201d An asset write-up creates a deferred tax liability because you\u2019ll have a higher depreciation expense on the new asset, which means you save on taxes in the short-term \u2013 but eventually you\u2019ll have to pay them back, hence the liability. The opposite applies for an asset write-down and a deferred tax asset.","cat":"ma","diff":3,"src":"400Q"},{"q":"How do DTLs and DTAs affect the Balance Sheet Adjustment in an M&A deal?","a":"You take them into account with everything else when calculating the amount of Goodwill & Other Intangibles to create on your pro-forma balance sheet. The formulas are as follows: Deferred Tax Asset = Asset Write-Down * Tax Rate Deferred Tax Liability = Asset Write-Up * Tax Rate So let\u2019s say you were buying a company for $1 billion with half-cash and half-debt, and you had a $100 million asset write-up and a tax rate of 40%. In addition, the seller has total assets of $200 million, total liabilities of $150 million, and shareholders\u2019 equity of $50 million. Here\u2019s what would happen to the combined company\u2019s balance sheet (ignoring transaction/financing fees): \u2022 \u2022 \u2022 \u2022 \u2022 \u2022 First, you simply add the seller\u2019s Assets and Liabilities (but NOT Shareholders\u2019 Equity \u2013 it is wiped out) to the buyer\u2019s to get your \u201cinitial\u201d balance sheet. Assets are up by $200 million and Liabilities are down by $150 million. Then, Cash on the Assets side goes down by $500 million. Debt on the Liabilities & Equity side goes up by $500 million. You get a new Deferred Tax Liability of $40 million ($100 million * 40%) on the Liabilities & Equity side. Assets are down by $300 million total and Liabilities & Shareholders\u2019 Equity are up by $690 million ($500 + $40 + $150). So you need Goodwill & Intangibles of $990 million on the Assets side to make both sides balance.","cat":"ma","diff":3,"src":"400Q"},{"q":"Could you get DTLs or DTAs in an asset purchase?","a":"No, because in an asset purchase the book basis of assets always matches the tax basis. They get created in a stock purchase because the book values of assets are written up or written down, but the tax values are not.","cat":"ma","diff":3,"src":"400Q"},{"q":"How do you account for DTLs in forward projections in a merger model?","a":"You create a book vs. cash tax schedule and figure out what the company owes in taxes based on the Pretax Income on its books, and then you determine what it actually pays in cash taxes based on its NOLs and newly created amortization and depreciation expenses (from any asset write-ups). Anytime the \u201ccash\u201d tax expense exceeds the \u201cbook\u201d tax expense you record this as an decrease to the Deferred Tax Liability on the Balance Sheet; if the \u201cbook\u201d expense is higher, then you record that as an increase to the DTL.","cat":"ma","diff":3,"src":"400Q"},{"q":"Explain the complete formula for how to calculate Goodwill in an M&A deal.","a":"Goodwill = Equity Purchase Price \u2013 Seller Book Value + Seller\u2019s Existing Goodwill \u2013 Asset Write-Ups \u2013 Seller\u2019s Existing Deferred Tax Liability + Write-Down of Seller\u2019s Existing Deferred Tax Asset + Newly Created Deferred Tax Liability A couple notes here: \u2022 \u2022 \u2022 \u2022 \u2022 Seller Book Value is just the Shareholders\u2019 Equity number. You add the Seller\u2019s Existing Goodwill because it gets written down to $0 in an M&A deal. You subtract the Asset Write-Ups because these are additions to the Assets side of the Balance Sheet \u2013 Goodwill is also an asset, so effectively you need less Goodwill to \u201cplug the hole.\u201d Normally you assume 100% of the Seller\u2019s existing DTL is written down. The seller\u2019s existing DTA may or may not be written down completely (see the next question).","cat":"ma","diff":3,"src":"400Q"},{"q":"What is an exchange ratio and when would companies use it in an M&A deal?","a":"An exchange ratio is an alternate way of structuring a 100% stock M&A deal, or any M&A deal with a portion of stock involved. Let\u2019s say you were going to buy a company for $100 million in an all-stock deal. Normally you would determine how much stock to issue by dividing the $100 million by the buyer\u2019s stock price, and using that to get the new share count. With an exchange ratio, by contrast, you would tie the number of new shares to the buyer\u2019s own shares \u2013 so the seller might receive 1.5 shares of the buyer\u2019s shares for each of its shares, rather than shares worth a specific dollar amount. Buyers might prefer to do this if they believe their stock price is going to decline posttransaction \u2013 sellers, on the other hand, would prefer a fixed dollar amount in stock unless they believe the buyer\u2019s share price will rise after the transaction.","cat":"ma","diff":3,"src":"400Q"},{"q":"Walk me through the most important terms of a Purchase Agreement in an M&A deal. There are dozens, but here are the most important ones: \u2022 \u2022 \u2022 \u2022 \u2022 \u2022 \u2022 Purchase Price: Stated as a per-share amount for public companies. Form of Consideration: Cash, Stock, Debt\u2026 Transaction Structure: Stock, Asset, or 338(h)(10) Treatment of Options: Assumed by the buyer? Cashed out? Ignored?","a":"Employee Retention: Do employees have to sign non-solicit or non-compete agreements? What about management? Reps & Warranties: What must the buyer and seller claim is true about their respective businesses? No-Shop / Go-Shop: Can the seller \u201cshop\u201d this offer around and try to get a better deal, or must it stay exclusive to this buyer?","cat":"ma","diff":3,"src":"400Q"},{"q":"What\u2019s an Earnout and why would a buyer offer it to a seller in an M&A deal?","a":"An Earnout is a form of \u201cdeferred payment\u201d in an M&A deal \u2013 it\u2019s most common with private companies and start-ups, and is highly unusual with public sellers. It is usually contingent on financial performance or other goals \u2013 for example, the buyer might say, \u201cWe\u2019ll give you an additional $10 million in 3 years if you can hit $100 million in revenue by then.\u201d Buyers use it to incentivize sellers to continue to perform well and to discourage management teams from taking the money and running off to an island in the South Pacific once the deal is done.","cat":"ma","diff":3,"src":"400Q"},{"q":"How would an accretion / dilution model be different for a private seller?","a":"The mechanics are the same, but the transaction structure is more likely to be an asset purchase or 338(h)(10) election; private sellers also don\u2019t have Earnings Per Share so you would only project down to Net Income on the seller\u2019s Income Statement. Note that accretion / dilution makes no sense if you have a private buyer because private companies do not have Earnings Per Share.","cat":"ma","diff":3,"src":"400Q"},{"q":"How would I calculate \u201cbreak-even synergies\u201d in an M&A deal and what does the number mean?","a":"To do this, you would set the EPS accretion / dilution to $0.00 and then back-solve in Excel to get the required synergies to make the deal neutral to EPS. It\u2019s important because you want an idea of whether or not a deal \u201cworks\u201d mathematically, and a high number for the break-even synergies tells you that you\u2019re going to need a lot of cost savings or revenue synergies to make it work.","cat":"ma","diff":3,"src":"400Q"},{"q":"Normally in an accretion / dilution model you care most about combining both companies\u2019 Income Statements. But let\u2019s say I want to combine all 3 financial statements \u2013 how would I do this?","a":"You combine the Income Statements like you normally would (see the previous question on this), and then you do the following:","cat":"ma","diff":3,"src":"400Q"},{"q":"How do you handle options, convertible debt, and other dilutive securities in a merger model?","a":"The exact treatment depends on the terms of the Purchase Agreement \u2013 the buyer might assume them or it might allow the seller to \u201ccash them out\u201d assuming that the per-share purchase price is above the exercise prices of these dilutive securities. If you assume they\u2019re exercised, then you calculate dilution to the equity purchase price in the same way you normally would \u2013 Treasury Stock Method for options, and assume that convertibles convert into normal shares using the conversion price. 145 19. What are the main 3 transaction structures you could use to acquire another company? Stock Purchase, Asset Purchase, and 338(h)(10) Election. The basic differences: Stock Purchase: \u2022 \u2022 \u2022 \u2022 \u2022 Buyer acquires all asset and liabilities of the seller as well as off-balance sheet items. The seller is taxed at the capital gains tax rate. The buyer receives no step-up tax basis for the newly acquired assets, and it can\u2019t depreciate/amortize them for tax purposes. A Deferred Tax Liability gets created as a result of the above. Most common for public companies and larger private companies. Asset Purchase: \u2022 \u2022 \u2022 \u2022 \u2022 Buyer acquires only certain assets and assumes only certain liabilities of the seller and gets nothing else. Seller is taxed on the amount its assets have appreciated (what the buyer is paying for each one minus its book value) and also pays a capital gains tax on the proceeds. The buyer receives a step-up tax basis for the newly acquired assets, and it can depreciate/amortize them for tax purposes. No Deferred Tax Liability is created as a result of the above. Most common for private companies, divestitures, and distressed public companies. Section 338(h)(10) Election: \u2022 \u2022 \u2022 \u2022 Buyer acquires all asset and liabilities of the seller as well as off-balance sheet items. Seller is taxed on the amount its assets have appreciated (what the buyer is paying for each one minus its book value) and also pays a capital gains tax on the proceeds. The buyer receives a step-up tax basis for the newly acquired assets, and it can depreciate/amortize them for tax purposes. No Deferred Tax Liability is created as a result of the above. 146 \u2022 \u2022 Most common for private companies, divestitures, and distressed public companies. To compensate for the buyer\u2019s favorable tax treatment, the buyer usually agrees to pay more than it would in an Asset Purchase.","cat":"ma","diff":3,"src":"400Q"},{"q":"Would a seller prefer a stock purchase or an asset purchase? What about the buyer?","a":"A seller almost always prefers a stock purchase to avoid double taxation and to get rid of all its liabilities. The buyer almost always prefers an asset deal so it can be more careful about what it acquires and to get the tax benefit from being able to deduct depreciation and amortization of asset write-ups for tax purposes.","cat":"ma","diff":3,"src":"400Q"},{"q":"Explain what a contribution analysis is and why we might look at it in a merger","a":"model. A contribution analysis compares how much revenue, EBITDA, Pre-Tax Income, cash, and possibly other items the buyer and seller are \u201ccontributing\u201d to estimate what the ownership of the combined company should be. For example, let\u2019s say that the buyer is set to own 50% of the new company and the seller is set to own 50%. But the buyer has $100 million of revenue and the seller has $50 million of revenue \u2013 a contribution analysis would tell us that the buyer \u201cshould\u201d own 66% instead because it\u2019s contributing 2/3 of the combined revenue. It\u2019s most common to look at this with merger of equals scenarios, and less common when the buyer is significantly larger than the seller.","cat":"ma","diff":3,"src":"400Q"},{"q":"How do you account for transaction costs, financing fees, and miscellaneous expenses in a merger model?","a":"In the \u201cold days\u201d you used to capitalize these expenses and then amortize them; with the new accounting rules, you\u2019re supposed to expense transaction and miscellaneous fees upfront, but capitalize the financing fees and amortize them over the life of the debt. Expensed transaction fees come out of Retained Earnings when you adjust the Balance Sheet, while capitalized financing fees appear as a new Asset on the Balance Sheet and are amortized each year according to the tenor of the debt. 147","cat":"ma","diff":3,"src":"400Q"},{"q":"Walk me through a basic LBO model.","a":"\u201cIn an LBO Model, Step 1 is making assumptions about the Purchase Price, Debt/Equity ratio, Interest Rate on Debt and other variables; you might also assume something about the company\u2019s operations, such as Revenue Growth or Margins, depending on how much information you have. Step 2 is to create a Sources & Uses section, which shows how you finance the transaction and what you use the capital for; this also tells you how much Investor Equity is required. Step 3 is to adjust the company\u2019s Balance Sheet for the new Debt and Equity figures, and also add in Goodwill & Other Intangibles on the Assets side to make everything balance. In Step 4, you project out the company\u2019s Income Statement, Balance Sheet and Cash Flow Statement, and determine how much debt is paid off each year, based on the available Cash Flow and the required Interest Payments. Finally, in Step 5, you make assumptions about the exit after several years, usually assuming an EBITDA Exit Multiple, and calculate the return based on how much equity is returned to the firm.\u201d","cat":"lbo","diff":1,"src":"400Q"},{"q":"Why would you use leverage when buying a company? To boost your return.","a":"Remember, any debt you use in an LBO is not \u201cyour money\u201d \u2013 so if you\u2019re paying $5 billion for a company, it\u2019s easier to earn a high return on $2 billion of your own money and $3 billion borrowed from elsewhere vs. $3 billion of your own money and $2 billion of borrowed money. A secondary benefit is that the firm also has more capital available to purchase other companies because they\u2019ve used leverage.","cat":"lbo","diff":1,"src":"400Q"},{"q":"What variables impact an LBO model the most?","a":"Purchase and exit multiples have the biggest impact on the returns of a model. After that, the amount of leverage (debt) used also has a significant impact, followed by operational characteristics such as revenue growth and EBITDA margins.","cat":"lbo","diff":1,"src":"400Q"},{"q":"How do you pick purchase multiples and exit multiples in an LBO model?","a":"The same way you do it anywhere else: you look at what comparable companies are trading at, and what multiples similar LBO transactions have had. As always, you also show a range of purchase and exit multiples using sensitivity tables. Sometimes you set purchase and exit multiples based on a specific IRR target that you\u2019re trying to achieve \u2013 but this is just for valuation purposes if you\u2019re using an LBO model to value the company.","cat":"lbo","diff":1,"src":"400Q"},{"q":"What is an \u201cideal\u201d candidate for an LBO?","a":"\u201cIdeal\u201d candidates have stable and predictable cash flows, low-risk businesses, not much need for ongoing investments such as Capital Expenditures, as well as an opportunity for expense reductions to boost their margins. A strong management team also helps, as does a base of assets to use as collateral for debt. The most important part is stable cash flow.","cat":"lbo","diff":1,"src":"400Q"},{"q":"How do you use an LBO model to value a company, and why do we sometimes say that it sets the \u201cfloor valuation\u201d for the company?","a":"You use it to value a company by setting a targeted IRR (for example, 25%) and then back-solving in Excel to determine what purchase price the PE firm could pay to achieve that IRR. This is sometimes called a \u201cfloor valuation\u201d because PE firms almost always pay less for a company than strategic acquirers would.","cat":"lbo","diff":1,"src":"400Q"},{"q":"Give an example of a \u201creal-life\u201d LBO. The most common example is taking out a mortgage when you buy a house. Here\u2019s how the analogy works: \u2022 \u2022 \u2022 \u2022 \u2022","a":"Down Payment: Investor Equity in an LBO Mortgage: Debt in an LBO Mortgage Interest Payments: Debt Interest in an LBO Mortgage Repayments: Debt Principal Repayments in an LBO Selling the House: Selling the Company / Taking It Public in an LBO","cat":"lbo","diff":1,"src":"400Q"},{"q":"Can you explain how the Balance Sheet is adjusted in an LBO model?","a":"First, the Liabilities & Equities side is adjusted \u2013 the new debt is added on, and the Shareholders\u2019 Equity is \u201cwiped out\u201d and replaced by however much equity the private equity firm is contributing. On the Assets side, Cash is adjusted for any cash used to finance the transaction, and then Goodwill & Other Intangibles are used as a \u201cplug\u201d to make the Balance Sheet balance. Depending on the transaction, there could be other effects as well \u2013 such as capitalized financing fees added to the Assets side.","cat":"lbo","diff":1,"src":"400Q"},{"q":"Why are Goodwill & Other Intangibles created in an LBO?","a":"Remember, these both represent the premium paid to the \u201cfair market value\u201d of the company. In an LBO, they act as a \u201cplug\u201d and ensure that the changes to the Liabilities & Equity side are balanced by changes to the Assets side.","cat":"lbo","diff":1,"src":"400Q"},{"q":"We saw that a strategic acquirer will usually prefer to pay for another company in cash \u2013 if that\u2019s the case, why would a PE firm want to use debt in an LBO? It\u2019s a different scenario because:","a":"1. The PE firm does not intend to hold the company for the long-term \u2013 it usually sells it after a few years, so it is less concerned with the \u201cexpense\u201d of cash vs. debt and more concerned about using leverage to boost its returns by reducing the amount of capital it has to contribute upfront.","cat":"lbo","diff":1,"src":"400Q"},{"q":"Do you need to project all 3 statements in an LBO model? Are there any","a":"\u201cshortcuts?\u201d Yes, there are shortcuts and you don\u2019t necessarily need to project all 3 statements. For example, you do not need to create a full Balance Sheet \u2013 bankers sometimes skip this if they are in a rush. You do need some form of Income Statement, something to track how the Debt balances change and some type of Cash Flow Statement to show how much cash is available to repay debt. But a full-blown Balance Sheet is not strictly required, because you can just make assumptions on the Net Change in Working Capital rather than looking at each item individually.","cat":"lbo","diff":1,"src":"400Q"},{"q":"How would you determine how much debt can be raised in an LBO and how many tranches there would be?","a":"Usually you would look at Comparable LBOs and see the terms of the debt and how many tranches each of them used. You would look at companies in a similar size range and industry and use those criteria to determine the debt your company can raise.","cat":"lbo","diff":1,"src":"400Q"},{"q":"Let\u2019s say we\u2019re analyzing how much debt a company can take on, and what the terms of the debt should be. What are reasonable leverage and coverage ratios?","a":"This is completely dependent on the company, the industry, and the leverage and coverage ratios for comparable LBO transactions. To figure out the numbers, you would look at \u201cdebt comps\u201d showing the types, tranches, and terms of debt that similarly sized companies in the industry have used recently. There are some general rules: for example, you would never lever a company at 50x EBITDA, and even during the bubble leverage rarely exceeded 5-10x EBITDA.","cat":"lbo","diff":1,"src":"400Q"},{"q":"What is the difference between bank debt and high-yield debt? This is a simplification, but broadly speaking there are 2 \u201ctypes\u201d of debt: \u201cbank debt\u201d and \u201chigh-yield debt.\u201d There are many differences, but here are a few of the most important ones: \u2022 \u2022 \u2022","a":"\u2022 High-yield debt tends to have higher interest rates than bank debt (hence the name \u201chigh-yield\u201d). High-yield debt interest rates are usually fixed, whereas bank debt interest rates are \u201cfloating\u201d \u2013 they change based on LIBOR or the Fed interest rate. High-yield debt has incurrence covenants while bank debt has maintenance covenants. The main difference is that incurrence covenants prevent you from doing something (such as selling an asset, buying a factory, etc.) while maintenance covenants require you to maintain a minimum financial performance (for example, the Debt/EBITDA ratio must be below 5x at all times). Bank debt is usually amortized \u2013 the principal must be paid off over time \u2013 whereas with high-yield debt, the entire principal is due at the end (bullet maturity). Usually in a sizable Leveraged Buyout, the PE firm uses both types of debt. Again, there are many different types of debt \u2013 this is a simplification, but it\u2019s enough for entry-level interviews.","cat":"lbo","diff":1,"src":"400Q"},{"q":"Why might you use bank debt rather than high-yield debt in an LBO?","a":"If the PE firm or the company is concerned about meeting interest payments and wants a lower-cost option, they might use bank debt; they might also use bank debt if they are planning on major expansion or Capital Expenditures and don\u2019t want to be restricted by incurrence covenants.","cat":"lbo","diff":1,"src":"400Q"},{"q":"Why would a PE firm prefer high-yield debt instead?","a":"If the PE firm intends to refinance the company at some point or they don\u2019t believe their returns are too sensitive to interest payments, they might use high-yield debt. They might also use the high-yield option if they don\u2019t have plans for major expansion or selling off the company\u2019s assets. 152 17. Why would a private equity firm buy a company in a \u201crisky\u201d industry, such as technology? Although technology is more \u201crisky\u201d than other markets, remember that there are mature, cash flow-stable companies in almost every industry. There are some PE firms that specialize in very specific goals, such as: \u2022 \u2022 \u2022 Industry consolidation \u2013 buying competitors in a similar market and combining them to increase efficiency and win more customers. Turnarounds \u2013 taking struggling companies and making them function properly again. Divestitures \u2013 selling off divisions of a company or taking a division and turning it into a strong stand-alone entity. So even if a company isn\u2019t doing well or seems risky, the firm might buy it if it falls into one of these categories.","cat":"lbo","diff":1,"src":"400Q"},{"q":"What is meant by the \u201ctax shield\u201d in an LBO?","a":"This means that the interest a firm pays on debt is tax-deductible \u2013 so they save money on taxes and therefore increase their cash flow as a result of having debt from the LBO. Note, however, that their cash flow is still lower than it would be without the debt \u2013 saving on taxes helps, but the added interest expenses still reduces Net Income over what it would be for a debt-free company. 153 20. What is a dividend recapitalization (\u201cdividend recap\u201d)? In a dividend recap, the company takes on new debt solely to pay a special dividend out to the PE firm that bought it. It would be like if you made your friend take out a personal loan just so he/she could pay you a lump sum of cash with the loan proceeds. As you might guess, dividend recaps have developed a bad reputation, though they\u2019re still commonly used.","cat":"lbo","diff":1,"src":"400Q"},{"q":"Why would a PE firm choose to do a dividend recap of one of its portfolio companies?","a":"Primarily to boost returns. Remember, all else being equal, more leverage means a higher return to the firm. With a dividend recap, the PE firm is \u201crecovering\u201d some of its equity investment in the company \u2013 and as we saw earlier, the lower the equity investment, the better, since it\u2019s easier to earn a higher return on a smaller amount of capital.","cat":"lbo","diff":1,"src":"400Q"},{"q":"How would a dividend recap impact the 3 financial statements in an LBO?","a":"No changes to the Income Statement. On the Balance Sheet, Debt would go up and Shareholders\u2019 Equity would go down and they would cancel each other out so that everything remained in balance. On the Cash Flow Statement, there would be no changes to Cash Flow from Operations or Investing, but under Financing the additional Debt raised would cancel out the Cash paid out to the investors, so Net Change in Cash would not change. 154","cat":"lbo","diff":1,"src":"400Q"},{"q":"Tell me about all the different kinds of debt you could use in an LBO and the differences between everything. Here\u2019s a handy chart to explain all of this. Note that this chart does not cover every single feature or every single type of debt in the universe \u2013 just the most important ones, and what you\u2019re likely to be asked about in finance interviews: Debt Type Revolver Term Loan A Term Loan B Interest Rate: Floating / Fixed?","a":"Cash Pay? Tenor: Amortization: Prepayment? Investors: Seniority Lowest Low Floating Higher Secured? Call Protection? Covenants: 3-5 years None No 4-6 years Straight Line Yes Conservative Banks Senior Secured Yes 4-8 years Minimal Yes Sometimes Maintenance Senior Notes Higher Subordinated Mezzanine Notes Higher Highest Fixed Cash / PIK 8-12 years 7-10 years 8-10 years Bullet No HFs, Merchant Banks, Mezzanine Funds Senior Senior Equity Unsecured Subordinated Sometimes No Yes Incurrence 155 \u201cTenor\u201d is just the fancy word for \u201cHow many years will this loan be outstanding?\u201d Each type of debt is arranged in order of rising interest rates \u2013 so a revolver has the lowest interest rate, Term Loan A is slightly higher, B is slightly higher, Senior Notes are higher than Term Loan B, and so on. \u201cSeniority\u201d refers to the order of claims on a company\u2019s assets in a bankruptcy \u2013 the Senior Secured holders are first in line, followed by Senior Unsecured, Senior Subordinated, and then Equity Investors. \u201cFloating\u201d or \u201cFixed\u201d Interest Rates: A \u201cfloating\u201d interest rate is tied to LIBOR. For example, L + 100 means that the interest rate of the loan is whatever LIBOR is at currently, plus 100 basis points (1.0%). A fixed interest rate, on the other hand, would be 11%. It doesn\u2019t \u201cfloat\u201d with LIBOR or any other rate. Amortization: \u201cstraight line\u201d means the company pays off the principal in equal installments each year, while \u201cbullet\u201d means that the entire principal is due at the end of the loan\u2019s lifecycle. \u201cMinimal\u201d just means a low percentage of the principal each year, usually in the 1-5% range. Call Protection: Is the company prohibited from \u201ccalling back\u201d \u2013 paying off or redeeming \u2013 the security for a certain period? This is beneficial for investors because they are guaranteed a certain number of interest payments.","cat":"lbo","diff":3,"src":"400Q"},{"q":"How would an asset write-up or write-down affect an LBO model? / Walk me","a":"through how you adjust the Balance Sheet in an LBO model. All of this is very similar to what you would see in a merger model \u2013 you calculate Goodwill, Other Intangibles, and the rest of the write-ups in the same way, and then the Balance Sheet adjustments (e.g. subtracting cash, adding in capitalized financing fees, writing up assets, wiping out goodwill, adjusting the deferred tax assets / liabilities, adding in new debt, etc.) are almost the same. The key differences: \u2022 In an LBO model you assume that the existing Shareholders\u2019 Equity is wiped out and replaced by the equity the private equity firm contributes to buy the company; you may also add in Preferred Stock, Management Rollover, or 156 \u2022 \u2022 Rollover from Option Holders to this number as well depending on what you\u2019re assuming for transaction financing. In an LBO model you\u2019ll usually be adding a lot more tranches of debt vs. what you would see in a merger model. In an LBO model you\u2019re not combining two companies\u2019 Balance Sheets.","cat":"lbo","diff":3,"src":"400Q"},{"q":"Normally we care about the IRR for the equity investors in an LBO \u2013 the PE firm that buys the company \u2013 but how do we calculate the IRR for the debt investors?","a":"For the debt investors, you need to calculate the interest and principal payments they receive from the company each year. Then you simply use the IRR function in Excel and start with the negative amount of the original debt for \u201cYear 0,\u201d assume that the interest and principal payments each year are your \u201ccash flows\u201d and then assume that the remaining debt balance in the final year is your \u201cexit value.\u201d Most of the time, returns for debt investors will be lower than returns for the equity investors \u2013 but if the deal goes poorly or the PE firm can\u2019t sell the company for a good price, the reverse could easily be true.","cat":"lbo","diff":3,"src":"400Q"},{"q":"Why might a private equity firm allot some of a company\u2019s new equity in an LBO to a management option pool, and how would this affect the model?","a":"This is done for the same reason you have an Earnout in an M&A deal: the PE firm wants to incentivize the management team and keep everyone on-board until they exit the investment. The difference is that there\u2019s no technical limit on how much management might receive from such an option pool: if they hit it out of the park, maybe they\u2019ll all become millionaires. In your LBO model, you would need to calculate a per-share purchase price when the PE firm exits the investment, and then calculate how much of the proceeds go to the management team based on the Treasury Stock Method. An option pool by itself would reduce the PE firm\u2019s return, but this is offset by the fact that the company should perform better with this incentive in place. 157 5. Why you would you use PIK (Payment In Kind) debt rather than other types of debt, and how does it affect the debt schedules and the other statements? Unlike \u201cnormal\u201d debt, a PIK loan does not require the borrower to make cash interest payments \u2013 instead, the interest just accrues to the loan principal, which keeps going up over time. A PIK \u201ctoggle\u201d allows the company to choose whether to pay the interest in cash or have it accrue to the principal (these have disappeared since the credit crunch). PIK is more risky than other forms of debt and carries with it a higher interest rate than traditional bank debt or high yield debt. Adding it to the debt schedules is similar to adding high-yield debt with a bullet maturity \u2013 except instead of assuming cash interest payments, you assume that the interest accrues to the principal instead. You should then include this interest on the Income Statement, but you need to add back any PIK interest on the Cash Flow Statement because it\u2019s a non-cash expense.","cat":"lbo","diff":3,"src":"400Q"},{"q":"What are some examples of incurrence covenants? Maintenance covenants? Incurrence Covenants: \u2022 \u2022 \u2022 \u2022","a":"Company cannot take on more than $2 billion of total debt. Proceeds from any asset sales must be earmarked to repay debt. Company cannot make acquisitions of over $200 million in size. Company cannot spend more than $100 million on CapEx each year. Maintenance Covenants: \u2022 \u2022 \u2022 \u2022 \u2022 \u2022 Total Debt / EBITDA cannot exceed 3.0 x Senior Debt / EBITDA cannot exceed 2.0 x (Total Cash Payable Debt + Capitalized Leases) / EBITDAR cannot exceed 4.0 x EBITDA / Interest Expense cannot fall below 5.0 x EBITDA / Cash Interest Expense cannot fall below 3.0 x (EBITDA \u2013 CapEx) / Interest Expense cannot fall below 2.0 x","cat":"lbo","diff":3,"src":"400Q"},{"q":"Just like a normal M&A deal, you can structure an LBO either as a stock purchase or as an asset purchase. Can you also use Section 338(h)(10) election?","a":"In most cases, no \u2013 because one of the requirements for Section 338(h)(10) is that the buyer must be a C corporation. Most private equity firms are organized as LLCs or Limited Partnerships, and when they acquire companies in an LBO, they create an LLC shell company that \u201cacquires\u201d the company on paper.","cat":"lbo","diff":3,"src":"400Q"},{"q":"Walk me through how you calculate optional repayments on debt in an LBO model.","a":"First, note that you only look at optional repayments for Revolvers and Term Loans \u2013 high-yield debt doesn\u2019t have a prepayment option, so effectively it\u2019s always $0. First, you check how much cash flow you have available based on your Beginning Cash Balance, Minimum Cash Balance, Cash Flow Available for Debt Repayment from the Cash Flow Statement, and how much you use to make Mandatory Debt Repayments. Then, if you\u2019ve used your Revolver at all you pay off the maximum amount that you can with the cash flow you have available. Next, for Term Loan A you assume that you pay off the maximum you can, taking into account that you\u2019ve lost any cash flow you used to pay down the Revolver. You also need to take into account that you might have paid off some of Term Loan A\u2019s principal as part of the Mandatory Repayments. Finally, you do the same thing for Term Loan B, subtracting from the \u201ccash flow available for debt repayment\u201d what you\u2019ve already used up on the Revolver and Term Loan A. And just like Term Loan A, you need to take into account any Mandatory Repayments you\u2019ve made so that you don\u2019t pay off more than the entire Term Loan B balance. The formulas here get very messy and depend on how your model is set up, but this is the basic idea for optional debt repayments.","cat":"lbo","diff":3,"src":"400Q"},{"q":"Explain how a Revolver is used in an LBO model. You use a Revolver when the cash required for your Mandatory Debt Repayments exceeds the cash flow you have available to repay them. The formula is: Revolver Borrowing = MAX(0, Total Mandatory Debt Repayment \u2013 Cash Flow Available to Repay Debt).","a":"The Revolver starts off \u201cundrawn,\u201d meaning that you don\u2019t actually borrow money and don\u2019t accrue a balance unless you need it \u2013 similar to how credit cards work. You add any required Revolver Borrowing to your running total for cash flow available for debt repayment before you calculate Mandatory and Optional Debt Repayments. Within the debt repayments themselves, you assume that any Revolver Borrowing from","cat":"lbo","diff":3,"src":"400Q"},{"q":"How would you adjust the Income Statement in an LBO model? The most common adjustments: \u2022 \u2022 \u2022 \u2022 \u2022 \u2022 \u2022","a":"Cost Savings \u2013 Often you assume the PE firm cuts costs by laying off employees, which could affect COGS, Operating Expenses, or both. New Depreciation Expense \u2013 This comes from any PP&E write-ups in the transaction. New Amortization Expense \u2013 This includes both the amortization from writtenup intangibles and from capitalized financing fees. Interest Expense on LBO Debt \u2013 You need to include both cash and PIK interest here. Sponsor Management Fees \u2013 Sometimes PE firms charge a \u201cmanagement fee\u201d to a company to account for the time and effort they spend managing it. Common Stock Dividend \u2013 Although private companies don\u2019t pay dividends to shareholders, they could pay out a dividend recap to the PE investors. Preferred Stock Dividend \u2013 If Preferred Stock is used as a form of financing in the transaction, you need to account for Preferred Stock Dividends on the Income Statement. Cost Savings and new Depreciation / Amortization hit the Operating Income line; Interest Expense and Sponsor Management Fees hit Pre-Tax Income; and you need to subtract the dividend items from your Net Income number.","cat":"brain","diff":2,"src":"400Q"},{"q":"In an LBO model, is it possible for debt investors to get a higher return than the PE firm? What does it tell us about the company we\u2019re modeling?","a":"Yes, and it happens more commonly than you\u2019d think. Remember, high-yield debt investors often get interest rates of 10-15% or more \u2013 which effectively guarantees an IRR in that range for them. So no matter what happens to the company or the market, that debt gets repaid and the debt investors get the interest payments. But let\u2019s say that the median EBITDA multiples contract, or that the company fails to grow or actually shrinks \u2013 in these cases the PE firm could easily get an IRR below what the debt investors get.","cat":"brain","diff":2,"src":"400Q"},{"q":"What is the angle formed by the hands of the clock when it is 1:45?","a":"142.5 degrees. If we just think of the clock hour hand at 1 and the minute hand at the 45 position (near 9 o\u2019clock), that is 120 degrees since they are 4 \u201cnumbers\u201d apart, and each number on the clock represents 30 degrees (360/12). However, recall that the hour hand has already moved by the time the minute hand has reached the 45 position \u2013 it is now closer to 2 o\u2019clock. 45 represent \u00be of an hour, so the hour hand will have moved \u00be of 30 degrees, or 22.5 degrees. If we add them together, we see that 120 + 22.5 = 142.5 The most common mistake is to state the original number we arrived at \u2013 120 degrees \u2013 rather than finishing the calculation. Sometimes with this type of question the interviewer will lead you in the right direction if you have a basic idea of how to solve it.","cat":"brain","diff":2,"src":"400Q"},{"q":"You have stacks of quarters, dimes, nickels and pennies (these represent $0.25, $0.10, $0.05 and $0.01, respectively, in the US monetary system for anyone international). There are an unlimited number of coins in each stack. You can take coins from a stack in any amount and in any order and place them in your hand. What is the greatest dollar value in coins you can have in your hands without being able to make change for a dollar?","a":"$1.19. There are a few ways to think about this, but the easiest is to start with the largest coin \u2013 quarters \u2013 first and then work your way down. 4 quarters equals $1.00, so we clearly can\u2019t do that \u2013 but 3 quarters are ok because that\u2019s only $0.75. Next, we have dimes. Recall that we can use any combination of coins to make change for a dollar \u2013 if we were to have 5 dimes and put them together with the 2 quarters, that would make $1.00. So we\u2019ll use 4 instead \u2013 there\u2019s no combination there that would result in $1.00 when added to the quarters. Nickels are next. Here, we can\u2019t have any \u2013 because even a single nickel, $0.05, would add up to $1.00 when added to the 3 quarters we have ($0.75) and the 2 dimes ($0.20). Finally, for pennies we know that we can\u2019t have 5 pennies ($0.05) because we could then get to $1.00 using the same logic as we saw for the nickels. So 4 is the maximum here. With that, we see that 3 Quarters + 4 Dimes + 4 Pennies = $1.19 The most common mistake is not realizing you can use any combination of your existing coins to add up to a dollar \u2013 most people understand that you can\u2019t have 4 quarters, but sometimes interviewees forget that 2 quarters + 5 dimes = $1.00 as well. This is another case where asking clarifying questions \u2013 such as whether 2 quarters + 5 dimes would count as $1.00 \u2013 really helps. 163 4. You have a hose along with a 3 liter bucket and a 5 liter bucket. How do you get exactly 4 liters of water? First, fill the 3 liter bucket and pour it into the 5 liter one. Then, re-fill the 3 liter bucket and pour it into the 5 liter bucket until it\u2019s full \u2013 that leaves 1 liter in the 3 liter bucket and 5 in the 5 liter bucket. Then, pour out the 5 liter bucket so nothing is left and pour the 1 liter of water from the 3 liter bucket into the 5 liter bucket. Finally, fill the 3 liter bucket completely and pour it into the 5 liter bucket \u2013 since it already has 1 liter of water, you\u2019ll get exactly 4 liters. For this type of question, it\u2019s easiest to use deductive reasoning to get the answer. You know you can\u2019t possibly get 4 liters of water in the 3 liter bucket \u2013 it has to be in the 5 liter bucket. Since you can easily get 3 liters of water, that tells you that the \u201ctrick\u201d will involve isolating the remaining 1 liter and getting it into the 5 liter bucket. So then the question comes down to how to get the 1 liter of water in the 3 liter bucket. You know it has to involve pouring water into the 5 liter bucket, and that leads you in the right direction. 164","cat":"brain","diff":2,"src":"400Q"},{"q":"What is the primary purpose of US GAAP?","a":"In the US, the Securities and Exchange Commission (\"SEC\") authorizes the Financial Accounting Standards Board (\"FASB\") to determine the set of accounting rules followed by publicly traded companies. Under FASB, financial statements are required to be prepared in accordance with US Generally Accepted Accounting Principles (\"US GAAP\"). Through the standardization of financial reporting and ensuring all financials are presented on a fair, consistent basis \u2013 the interests of investors and lenders are protected.","cat":"accounting","diff":1,"src":"Redbook"},{"q":"What are the main sections of a 10-K?","a":"In a 10-K, you'll find the three core financial statements, which are the income statement, cash flow statement, and balance sheet. There'll also be a statement of shareholders\u2019 equity, a statement of comprehensive income, and supplementary data and disclosures to accompany the financials. Main Sections of a 10-K Business Overview Overview of the company\u2019s business divisions, strategy, product or service offerings, seasonality, geographical footprint, and key risks. Management\u2019s Discussion & Commentary and summarized analysis of the company\u2019s fiscal year result from Analysis (\"MD&A\") the perspective of the management team. Financial Statements The \u201cCore 3\u201d: Income Statement, Balance Sheet, Cash Flow Statement The \u201cOther 2\u201d: Statement of Comprehensive Income, Statement of Shareholders\u2019 Equity Notes Supplementary disclosures to the financial statements that provide more details about a company\u2019s recent financial performance.","cat":"accounting","diff":1,"src":"Redbook"},{"q":"How are the three financial statements connected?","a":"IS \u2194 CFS: The cash flow statement is connected to the income statement through net income, as net income is the starting line on the cash flow statement. CFS \u2194 BS: Next, the cash flow statement is linked to the balance sheet because it tracks the changes in the balance sheet\u2019s working capital (current assets and liabilities). The impact from capital expenditures (PP&E), debt or equity issuances, and share buybacks 3 Financial (treasury stock) are also reflected on the balance sheet. In addition, the ending cash Statements balance from the bottom of the cash flow statement will flow to the balance sheet as the Connections cash balance for the current period. IS \u2194 BS: The income statement is connected to the balance sheet through retained earnings. Net income minus dividends issued during the period will be added to the prior period's retained earnings balance to calculate the current period\u2019s retained earnings. Interest expense on the income statement is also calculated off the beginning and ending debt balances on the balance sheet, and PP&E on the balance sheet is reduced by depreciation, which is an expense on the income statement. If you have a balance sheet and must choose between the income statement or cash flow statement, which would you pick?","cat":"accounting","diff":1,"src":"Redbook"},{"q":"Why is the income statement insufficient to assess the liquidity of a company?","a":"The income statement can be misleading in the portrayal of a company\u2019s health from a liquidity and solvency standpoint. For example, a company can consistently show positive net income yet struggle to collect sales made on credit. The company's inability to retrieve payments from customers would not be reflected on its income statement. Accrual accounting often relies on management's discretion, making the income statement less reliable. Financial reporting under accrual accounting is also imperfect in the sense that it often relies on management discretion. This \"wiggle room\" for managerial discretion in reporting decisions increases the risk of earnings management and the misleading depiction of a company's actual operational performance. The solution to the shortcomings of the income statement is the cash flow statement, which reconciles net income based on the real cash inflows/(outflows) to understand the true cash impact from operations, investing, and financing activities during the period.","cat":"accounting","diff":1,"src":"Redbook"},{"q":"What are some discretionary management decisions that could inflate earnings?","a":"Using excess useful life assumptions for new capital expenditures to reduce the annual depreciation Switching from LIFO to FIFO if inventory costs are expected to increase, resulting in higher net income Refusing to write-down impaired assets to avoid the impairment loss, which would reduce net income Changing policies for costs to be capitalized rather than expensed (e.g., capitalized software costs) Repurchasing shares to decrease its share count and artificially increase earnings per share (\"EPS\") Deferral of capex or R&D to the next period to show more profitability and cash flow in the current period More aggressive revenue recognition policies in which the obligations of the buyer become less stringent Tell me about the revenue recognition and matching principle used in accrual accounting. Revenue Recognition Principle: Revenue is recorded in the same period the good or service was delivered (and therefore \"earned\"), whether or not cash was collected from the customer. Matching Principle: The expenses associated with the production/delivery of a good or service must be recorded in the same period as when the revenue was earned.","cat":"accounting","diff":1,"src":"Redbook"},{"q":"How does accrual accounting differ from cash-basis accounting?","a":"Accrual Accounting: For accrual accounting, revenue recognition is based on when it's earned and the expenses associated with that revenue are incurred in the same period. Cash-Basis Accounting: Under cash-basis accounting, revenues and expenses are recognized once cash is received or spent, regardless of whether the product or service was delivered to the customer.","cat":"accounting","diff":1,"src":"Redbook"},{"q":"What is the difference between cost of goods sold and operating expenses?","a":"Cost of Goods Sold: COGS represents the direct costs associated with the production of the goods sold or the delivery of services to generate revenue. Examples include direct material and labor costs. Operating Expenses: Operating expenses such as SG&A and R&D are not directly associated with the production of goods or services offered. Often called indirect costs, examples include rent, payroll, wages, commissions, meal and travel expenses, advertising, and marketing expenses.","cat":"accounting","diff":1,"src":"Redbook"},{"q":"When do you capitalize vs. expense items under accrual accounting?","a":"The factor that determines whether an item gets capitalized as an asset or gets expensed in the period incurred is its useful life (i.e., estimated timing of benefits). Capitalized: Expenditures on fixed and intangible assets expected to benefit the firm for more than one year need to be capitalized and expensed over time. For example, PP&E such as a building can provide benefits for 15+ years and is therefore depreciated over its useful life. Expensed: In contrast, when the benefits received are short-term, the related expenses should be incurred in the same period. For example, inventory cycles out fairly quickly within a year and employee wages should be expensed when the employee's services were provided. If depreciation is a non-cash expense, how does it affect net income? While depreciation is treated as non-cash and an add-back on the cash flow statement, the expense is taxdeductible and reduces the tax burden. The actual cash outflow for the initial purchase of PP&E has already occurred, so the annual depreciation is the non-cash allocation of the initial outlay at purchase.","cat":"accounting","diff":1,"src":"Redbook"},{"q":"Do companies prefer straight-line or accelerated depreciation?","a":"For GAAP reporting purposes, most companies prefer straight-line depreciation because lower depreciation will be recorded in the earlier years of the asset\u2019s useful life than under accelerated depreciation. As a result, companies using straight-line depreciation will show higher net income and EPS in the initial years. Eventually, the accelerated approach will show lower depreciation into an asset's life than the straight-line method. However, companies still prefer straight-line depreciation because of the timing, as many companies are focused more on near-term earnings.","cat":"accounting","diff":1,"src":"Redbook"},{"q":"What is the relationship between depreciation and the salvage value assumption?","a":"Most companies will use a salvage value assumption in which the remaining value of the asset is zero by the end of the useful life. The difference between the cost of the asset and residual value is known as the total depreciable amount. If the salvage value is assumed to be zero, the depreciation expense each year will be higher and the tax benefits from depreciation will be fully maximized. (Asset Historical Cost \u2212 Salvage Value) Straight Line Annual Depreciation = Useful Life Assumption","cat":"accounting","diff":1,"src":"Redbook"},{"q":"How would a $10 increase in depreciation flow through the financial statements?","a":"The depreciation expense will be embedded within either the cost of goods sold or the operating expenses line item on the income statement. IS: When depreciation increases by $10, EBIT would decrease by $10.","cat":"accounting","diff":1,"src":"Redbook"},{"q":"What is the difference between growth and maintenance capex?","a":"Growth Capex: The discretionary spending of a business to facilitate new growth plans, acquire more customers, and expand geographically. Throughout periods of economic expansion, growth capex tends to increase across most industries (and the reverse during an economic contraction). Maintenance Capex: The required expenditures for the business to continue operating in its current state (e.g., repair broken equipment). Which types of intangible assets are amortized? Amortization is based on the same accounting concept as depreciation, except it applies to intangible assets rather than fixed tangible assets such as PP&E. Intangible assets include customer lists, copyrights, trademarks, and patents, which all have a finite life and are thus amortized over their useful life.","cat":"accounting","diff":1,"src":"Redbook"},{"q":"What is goodwill and how is it created?","a":"Goodwill represents an intangible asset that captures the excess of the purchase price over the fair market value of an acquired business's net assets.","cat":"accounting","diff":1,"src":"Redbook"},{"q":"What is the \u201cgoing concern\u201d assumption used in accrual accounting?","a":"In accrual accounting, companies are assumed to continue operating into the foreseeable future and remain in existence indefinitely. The assumption has broad valuation implications, given the expectation of continued cash flow generation from the assets belonging to a company, as opposed to being liquidated.","cat":"accounting","diff":1,"src":"Redbook"},{"q":"Why are most assets recorded at their historical cost under accrual accounting?","a":"The historical cost principle states that an asset's value on the balance sheet must reflect the initial purchase price, not the current market value. This guideline represents the most consistent measurement method since there's no need for constant revaluations and markups, thereby reducing market volatility.","cat":"accounting","diff":1,"src":"Redbook"},{"q":"Why are the values of a company's intangible assets not reflected on its balance sheet?","a":"The objectivity principle of accrual accounting states that only verifiable, unbiased data can be used in financial filings, as opposed to subjective measures. For this reason, internally developed intangible assets such as branding, trademarks, and intellectual property will have no value recorded on the balance sheet because they cannot be accurately quantified and recorded. Companies are not permitted to assign values to these intangible assets unless the value is readily observable in the market via acquisition. Since there's a confirmable purchase price, a portion of the excess amount paid can be allocated towards the rights of owning the intangible assets and recorded on the closing balance sheet.","cat":"accounting","diff":1,"src":"Redbook"},{"q":"If the share price of a company increases by 10%, what is the balance sheet impact?","a":"There would no change on the balance sheet as shareholders\u2019 equity reflects the book value of equity. Equity value, also known as the \"market capitalization,\" represents the value of a company\u2019s equity based on supply and demand in the open market. In contrast, the book value of equity is the initial historical amount shown on the balance sheet for accounting purposes. This represents the company's residual value belonging to equity shareholders once all of its assets are liquidated and liabilities are paid off. Book vs. Market Value Book Value of Equity = Total Assets \u2013 Total Liabilities The equity value recorded on the books will be significantly understated from the market value in most cases. For example, the book value of Apple\u2019s common stock is only ~$51 billion as of its latest 10-K filing for FY 2020, whereas its market value of equity is over $2 trillion as of this guide's publishing date.","cat":"accounting","diff":1,"src":"Redbook"},{"q":"Do accounts receivable get captured on the income statement?","a":"There is no accounts receivable line item on the income statement, but it gets captured, if only partially, indirectly in revenue. Under accrual accounting, revenue is recognized during the period it was earned, whether or not cash was received. The two other financial statements would be more useful to understand what is happening to the accounts receivable balance since the cash flow statement will reconcile revenue to cash revenue, while the absolute balance of accounts receivable can be observed on the balance sheet.","cat":"accounting","diff":1,"src":"Redbook"},{"q":"Why are increases in accounts receivable a cash reduction on the cash flow statement?","a":"Since the cash flow statement begins with net income and net income captures all Increases in of a company\u2019s revenue (not just cash revenue), an increase in accounts receivable working capi
