tal means that more customers paid on credit during the period. assets are cash outflows, whereas Thus, a downward adjustment must be made to net income to arrive at the ending increases in working cash balance. Although the revenue has been earned under accrual accounting capital liabilities are standards, the customers have yet to make the due cash payments and this amount cash inflows. will be sitting as receivables on the balance sheet.","cat":"accounting","diff":1,"src":"Redbook"},{"q":"Why is deferred revenue classified as a liability while accounts receivable is an asset?","a":"Deferred Revenue: For deferred revenue, the company received payments upfront and has unfulfilled obligations to the customers that paid in advance, hence its classification as a liability. Accounts Receivable: A/R is an asset because the company has already delivered the goods/services and all that remains is the collection of payments from the customers that paid on credit.","cat":"accounting","diff":1,"src":"Redbook"},{"q":"Why are increases in accounts payable shown as an increase in cash flow?","a":"An increase in accounts payable would mean the company has been delaying payments to its suppliers or vendors, and the cash is currently still in the company's possession. The due payments will eventually be made, but the cash belongs to the company for the time being and is not restricted from being used. Thus, an increase in accounts payable is reflected as an inflow of cash on the cash flow statement. Which section of the cash flow statement captures interest expense? The cash flow statement doesn't directly capture interest expense. However, interest expense is recognized on the income statement and then gets indirectly captured in the cash from operations section since net income is the starting line item on the cash flow statement.","cat":"accounting","diff":1,"src":"Redbook"},{"q":"What happens to the three financial statements if a company initiates a dividend?","a":"IS: When a company initiates a dividend, there'll be no changes to the income statement. However, a line below net income will state the dividend per share (\"DPS\") to show the amount paid. CFS: On the cash flow statement, the cash from financing section will decrease by the dividend payout amount and lower the ending cash balance at the bottom. BS: The cash balance will decline by the dividend amount on the balance sheet, and the offsetting entry will be a decrease in retained earnings since dividends come directly out of retained earnings.","cat":"accounting","diff":1,"src":"Redbook"},{"q":"Do inventories get captured on the income statement?","a":"There is no inventory line item on the income statement, but it gets indirectly captured, if only partially, in cost of goods sold (or operating expenses). For a specific period, regardless of whether the associated inventory was purchased during the same period, COGS may reflect a portion of the inventory used up. The two other financial statements would be more useful for assessing inventory as the cash flow statement shows the year-over-year changes in inventory, while the balance sheet shows the beginning and end-of-period inventory balances.","cat":"accounting","diff":1,"src":"Redbook"},{"q":"How should an increase in inventory get handled on the cash flow statement?","a":"An increase in inventory reflects a use of cash and should thus be reflected as an outflow on the cash from operations section of the cash flow statement. The inventory balance increasing from the prior period implies the amount of inventory purchased exceeded the amount expensed on the income statement.","cat":"accounting","diff":1,"src":"Redbook"},{"q":"What is the difference between LIFO and FIFO, and what are the implications on net income?","a":"FIFO and LIFO are two inventory accounting methods to estimate the value of inventory sold in a period. First In, First Out (\"FIFO\"): Under FIFO accounting, the goods that were purchased earlier would be the first ones to be recognized and expensed on the income statement. Last In, First Out (\"LIFO\"): Alternatively, LIFO assumes that the most recently purchased inventories are recorded as the first ones to be sold first. The impact on net income would depend on how inventory costs have changed over time: First In, First Out (FIFO) Last In, First Out (LIFO) Rising Inventory Costs (\uf0e1) If inventory costs have been rising, lower COGS would be recorded under FIFO. Since the less expensive inventory was recognized, net income will be higher in the current period. If inventory costs have been rising, then COGS for the period will be higher under LIFO because the recent, pricier purchases are assumed to be sold first. Thus, the result would be lower net income for the period. Decreasing Inventory Costs (\uf0e2) If inventory costs have been dropping, COGS would be higher under FIFO, since older inventory costs are more expensive. The ending result would be lower net income for the period. If inventory costs have been dropping, then COGS would be lower under LIFO. Thereby, net income for the period will be higher since the cheaper inventory costs were recognized.","cat":"accounting","diff":1,"src":"Redbook"},{"q":"What is the average cost method of inventory accounting?","a":"Besides FIFO and LIFO, the average cost method is the third most widely used inventory accounting method. Under this method, the assigned inventory costs are based on a weighted average, in which the total costs of production in a period are summed up and divided by the total number of items produced. Each product cost is treated equally and inventory costs are spread out evenly, disregarding the date of purchase or production. Thus, this method is viewed as a simplistic compromise between the two other methods, but would be improper to use if the products sold are each unique with significant variance in the cost to manufacture and the sale price (i.e., more applicable for high-volume, identical batches of inventory).","cat":"accounting","diff":1,"src":"Redbook"},{"q":"How do you calculate retained earnings for the current period?","a":"Retained earnings represent the total cumulative amount of net income held onto by a company since inception after accounting for any dividends paid out to its common and preferred shareholders. Current Period Retained Earnings = Prior Retained Earnings + Net Income \u2013 Dividends","cat":"accounting","diff":1,"src":"Redbook"},{"q":"What does the retention ratio represent and how is it related to the dividend payout ratio?","a":"The retention ratio represents the proportion of net income retained by the company, net of any dividends paid out to shareholders. The inverse of the retention ratio is the dividend payout ratio, which measures the proportion of net income paid out as dividends to investors. (Net Income \u2212 Dividends) Dividends Paid Retention Ratio = Dividend Payout Ratio = Net Income Net Income","cat":"accounting","diff":1,"src":"Redbook"},{"q":"What are the two ways to calculate earnings per share (EPS)?","a":"1. Basic EPS: Determines a company's earnings on a per-share basis, but allocable to only the basic shares outstanding (otherwise known as \"common shares\"). (Net Income \u2212 Dividends on Preferred Stock) Basic EPS = Basic Weighted Average Shares Outstanding 2. Diluted EPS: Compares a company's earnings relative to its shares outstanding on a per-share basis but considers the impact of potentially dilutive securities such as options, warrants, and convertible securities. If an option is \"in-the-money,\" the option holder can become a common shareholder at their choosing. Thus, diluted EPS is a more accurate depiction of ownership value per share. Diluted EPS = (Net Income \u2212 Dividends on Preferred Stock) Diluted Weighted Average Shares Outstanding Where can you find the financial reports of public companies? In the US, public companies are required to report periodic filings with the SEC, including an annual report (10K) and three quarterly (10-Q) reports each year. These reports are available for free through SEC EDGAR. In other countries, reporting requirements will vary, but most countries will require at least an annual report, while some will require an interim filing (i.e., a report in the middle of the company\u2019s fiscal year). Only a few countries make company filings easily accessible through a central database, forcing analysts to rely on expensive financial data providers or dig through company websites manually to collect data. The closest database to EDGAR in breadth and ease of use is Canada\u2019s SEDAR database. In the United Kingdom, the closest EDGAR equivalent is Companies House, where private companies must also report their financials.","cat":"accounting","diff":1,"src":"Redbook"},{"q":"Why has understanding the differences between US GAAP and IFRS financial reporting become increasingly important?","a":"For public companies in the US, the reporting rules and guidelines are set by the Financial Accounting Standards Board (FASB) and referred to as US Generally Accepted Accounting Principles (US GAAP). The International Accounting Standards Board (IASB) oversees the International Financial Reporting Standards (IFRS), which is followed by over 144 countries. Understanding the differences between US GAAP and IFRS has become more important because: Continuation of Globalization: Globalization is the gradual convergence of economies in different countries. The widespread adoption of IFRS has placed pressure on the US to adopt IFRS to have a single set of accounting standards and rules used worldwide, but it seems unlikely in the near-term. Geographic Diversification of Investments: In recent years, investment firms have been broadening their investments' geographic scope to consider more opportunities overseas. Nowadays, institutional investors are more open to making investments in emerging markets due to the prevalence of opportunities and as a strategy to re-risk their overall portfolio. Cross-Border M&A Activity: Cross-border mergers and acquisitions (\"M&A\") have emerged as a strategy for multinational companies to enter new markets, extend their reach to new potential customers, and diversify their revenue sources.","cat":"accounting","diff":1,"src":"Redbook"},{"q":"What are some of the most common margins used to measure profitability?","a":"Profitability Margins Gross Margin Operating Margin Net Profit Margin EBITDA Margin The percentage of revenue remaining after subtracting just COGS, the direct costs associated with the company's revenue generation (e.g., direct materials, direct labor). Gross Margin = The percentage of profitability after subtracting operating expenses from gross profit. This measure is useful for comparisons due to being independent of capital structure and taxes. Operating Margin = The percentage of accrual profitability remaining after all expenses have been subtracted. Unlike operating margin, this measure is impacted by capital structure and taxes. Net Profit Margin = The most widely used profit margin for benchmarking due to being independent of capital structure and taxes, in addition to adjusted for noncash expenses (D&A) and non-recurring items. Gross Profit Revenue EBIT Revenue Net Income Revenue EBITDA Margin = Revenue","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What do the phrases \u201cabove the line\u201d and \u201cbelow the line\u201d mean?","a":"The expression \"the line\" is in reference to operating income, which represents the point that divides normal, ongoing business operations from non-operational line items. \u201cAbove the Line\u201d: If a profitability metric is \"above the line,\" it reflects a company's operational performance before non-operational items such as interest and taxes. Financing-related activities are an example of such non-operational items, as decisions on how to fund a company are discretionary (debt vs. equity). For example, a metric such as earnings before interest, taxes, depreciation and amortization (\"EBITDA\") is considered \u201cabove the line.\" Hence, its widespread usage for comparative purposes since operational performance is portrayed while being independent of capital structure and taxes. \u201cBelow the Line\u201d: In contrast, profitability metrics \"below the line\" have adjusted operating income for non-operating income and expenses, which are items classified as discretionary and unrelated to the core operations of a business. An example would be net income, since interest expense, non-operating income/(expenses), and taxes have all been accounted for in its ending value.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"Is EBITDA a good proxy for operating cash flow?","a":"While EBITDA does add back D&A, typically the largest non-cash expense, it doesn't capture the full cash impact of capital expenditures (\"capex\") or working capital changes during the period. EBITDA also doesn't adjust for stock-based compensation, although an increasingly used \u201cadjusted EBITDA\u201d metric does add-back SBC. These non-cash and any nonrecurring adjustments must be properly accounted for to assess a company's past operational performance and to accurately forecast its future cash flows. Despite the criticism regarding its drawbacks, EBITDA remains the most widely used proxy for operating cash flow in practice.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What are some examples of non-recurring items?","a":"Non-recurring items include legal settlements (gain or loss), restructuring expenses, inventory write-downs, or asset impairments. Often called \"scrubbing\" the financials, the act of adjusting for these non-recurring items is meant to normalize the cash flows and depict a company's true operating performance.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is the difference between organic and inorganic revenue growth?","a":"Organic Growth: A company experiencing organic growth is expanding to new Simply put, organic markets, enhancing its sales & marketing strategies, improving its growth is the product/service mix, or introducing new products. The focus is on optimization of a continuously making operational improvements and bringing in revenue (e.g., business from the set prices more appropriately post-market research, target right end markets). internal efforts of Inorganic Growth: Once the opportunities for organic growth have been management and maximized, a company may turn to inorganic growth, which refers to growth their employees. driven by M&A. Inorganic growth is often considered faster and more convenient than organic growth. Post-acquisition, a company can benefit from synergies, such as having new customers to sell to, bundling complementary products, and diversification in revenue.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"How does the relationship between depreciation and capex shift as companies mature?","a":"The more a company has spent on capex in recent years, the more depreciation the As a company begins company incurs in the near-term future. Therefore, when looking at high-growth to mature and its companies spending heavily on growth capex, their ratio between capex and annual growth stagnates, a depreciation will far exceed 1. greater proportion For mature businesses experiencing stagnating or declining growth, this ratio converges near 1, as the only capex is related to routine maintenance capex (e.g., replace equipment, refurbish store layouts). of its total capex will shift towards maintenance.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"Why are cash and debt excluded in the calculation of net working capital (NWC)?","a":"In practice, cash and other short-term investments (e.g., treasury bills, marketable securities, commercial paper) and any interest-bearing debt (e.g., loans, revolver, bonds) are excluded when calculating working capital because they're non-operational and don't directly generate revenue. Net Working Capital (NWC) = Operating Current Assets \u2212 Operating Current Liabilities Cash & cash equivalents are closer to investing activities since the company can earn a slight return (~0.25% to 1.5%) through interest income, whereas debt is classified as financing. Neither is operations-related, and both are thereby excluded in the calculation of NWC.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"Is negative working capital a bad signal about a company's health?","a":"Further context would be required, as negative working capital can be positive or negative. For instance, negative working capital can result from being efficient at collecting revenue, quick inventory turnover, and delaying payments to suppliers while efficiently investing excess cash into high-yield investments.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What does change in net working capital tell you about a company's cash flows?","a":"The change in net working capital is important because it gives you a sense of how much a company's cash flows will deviate from its accrual-based net income. Change in Net Working Capital = NWC Prior Period \u2212 NWC Current Period","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What ratios would you look at to assess working capital management efficiency?","a":"Efficiency Ratios Days Inventory Held (\"DIH\") DIH measures the average number of days it takes for a company to sell off its inventory. Companies strive to minimize their DIH and sell their inventory as soon as possible. Days Sales Outstanding DSO represents the average number of days it takes for a company to collect payments made on credit. Lower DSOs mean less time is needed to retrieve cash from sales made on credit. Days Payable Outstanding DPO refers to the average number of days it takes for a company to pay back its suppliers. Higher DPOs indicate the company has more bargaining power over its suppliers. Inventory ) \u00d7 Days COGS AR ) \u00d7 Days Revenue AP ) \u00d7 Days COGS","cat":"accounting","diff":2,"src":"Redbook"},{"q":"How would you forecast working capital line items on the balance sheet?","a":"Working Capital Forecast Accounts Receivable (A/R) A/R typically grows along with revenue and should remain in-line with historical periods. DSO often gradually decreases over time as companies become more efficient in payment collection. DSO should be calculated for historical periods (DSO = A/R \u00f7 Revenue x 365) Assumptions for DSO in future periods will be based on historical trends or an average. Forecasted A/R can be calculated by (DSO assumption \u00f7 365) x forecasted revenue. Inventories Inventory will grow in-line with COGS in most cases. DIH can decrease over time as companies become more efficient at selling their inventory. DIH would be calculated for historical periods (DIH = Inventory \u00f7 COGS x 365) Historical trends or an average of past periods should be used for the DIH assumptions. Forecasted inventory balance will be equal to the (DIH assumption \u00f7 365) x forecasted COGS. Prepaid Expenses Prepaid expenses will typically be SG&A related, but can grow with revenue if it's unclear. Historical prepaid expenses would be calculated as a % of SG&A (or revenue). Forecasted prepaid expenses will be equal to the % assumption x forecasted revenue. Other Current Assets Other current assets normally grow along with revenue, assuming they're tied to operations. Otherwise, can be straight-lined Other current assets for past periods would be calculated by dividing past amounts by revenue. Forecasted OCA would be equal to the % assumption x forecasted revenue. Accounts Payable (A/P) A/P will typically grow with COGS, especially if the company sells goods (i.e., inventory payment delays). DPO can be assumed to gradually increase if the company might have more buyer power in the future. DPO for past periods will be calculated (DPO = A/P \u00f7 COGS x 365). Historical trends would be followed or an average can be taken for the assumption. Forecasted A/P will be equal to the (DPO assumption \u00f7 365) x COGS. Accrued Expenses Accrued expenses usually relate to operating expenses, thus it will grow along with SG&A (or revenue if it's unclear). Accrued expenses as a percentage of SG&A will first be calculated for historical periods. Forecasted accrued expenses will be the % SG&A assumption x current period SG&A. Deferred Revenue Deferred revenue is typically forecasted to grow with the revenue, as it's likely a part of the company's business model. Deferred revenue as a % of revenue will be calculated for historical periods. Forecasted D/R will be equal to the % of revenue assumption x forecasted revenue. Other Current Liabilities Current liabilities are usually forecasted to grow with revenue","cat":"accounting","diff":2,"src":"Redbook"},{"q":"How would you forecast capex and D&A when creating a financial model?","a":"In the simplest approach, D&A can be projected as either a percentage of revenue or capital expenditures, while capex is forecasted as a percentage of revenue. Re-investments such as capex directly correlate with revenue growth, thus historical trends, management guidance, and industry norms should be closely followed. Alternatively, a depreciation waterfall schedule can be put together, which would require more data from the company to track the PP&E currently in-use and the remaining useful life of each. In addition, management plans for future capex spending and the approximate useful life assumptions for each purchase will be necessary. As a result, depreciation from old and new capex will be separately shown. For projecting amortization, useful life assumptions would also be required, which can often be found in a separate footnote in a company's financial reports.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is the difference between the current ratio and the quick ratio?","a":"The current ratio and quick ratio are used to assess a company\u2019s near-term liquidity position. The two ratios are both used to determine if a company can meet its short-term obligations using just its short-term assets at the present moment. Current Ratio: A current ratio greater than 1 implies that the company is financially healthy in terms of liquidity and can meet its short-term obligations. Current Assets Current Liabilities Quick Ratio: Otherwise known as the acid-test ratio, the quick ratio measures short-term liquidity, but uses stricter policies on what classifies as a liquid asset. Therefore, it includes only highly liquid assets that could be converted to cash in less than 90 days with a high degree of certainty. Current Ratio = Quick Ratio = (Cash & Cash Equivalents + AR + Short Term Investments) Current Liabilities","cat":"accounting","diff":2,"src":"Redbook"},{"q":"Give some examples of when the current ratio might be misleading?","a":"The cash balance used includes the minimum cash amount required for working capital needs \u2013 meaning operations could not continue if cash were to dip below this level. Similarly, the cash balance may contain restricted cash, which is not freely available for use by the business and is instead held for a specific purpose. Short-term investments that cannot be liquidated in the markets easily could have been included (i.e., low liquidity, cannot sell without a substantial discount). Accounts receivable could include \u201cbad A/R\", but management refuses to recognize it as such.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"Is it bad if a company has negative retained earnings?","a":"Not necessarily. Retained earnings can turn negative if the company has generated more accounting losses than profits. For example, this is often the case for startups and early-stage companies investing heavily to support future growth (e.g., high capex, sales & marketing expenses, R&D spend). Another component of retained earnings is the payout of dividends and share repurchases, contributing to lower or even negative retained earnings. In these scenarios, the negative retained earnings mean the company has returned more capital to shareholders than taken in.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"How can a profitable firm go bankrupt?","a":"To be profitable, a company must generate revenues that exceed expenses. However, if the company is ineffective at collecting cash from customers and allows its receivables to balloon, or if it cannot get favorable terms from suppliers and must pay cash for all inventories and supplies, the company can suffer from liquidity problems due to the timing mismatch of cash inflows and outflows. Profitable companies with these types of working capital issues can usually secure financing, but if financing suddenly becomes unavailable (e.g., 2008 credit crisis), the company could be forced to declare bankruptcy. Alternatively, a profitable company that took on far too much debt in its capital structure and could not service the interest payments may also default on its debt obligations.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What does return on assets (ROA) and return on equity (ROE) each measure?","a":"Return on assets (\"ROA\") and return on equity (\"ROE\") are measures of profitability that show how effective a company\u2019s management team is at utilizing the resources it has on-hand (assets or equity). Return on Assets: ROA measures asset utilization and how efficiently a company's assets are used to generate earnings. A high ROA relative to a peer group indicates assets are being used near full capacity, whereas a low ROA means management may not be deriving the full potential benefit from its assets. Return on Assets (ROA) = Net Income (Average of Beginning and Ending Total Assets) Return on Equity: The ROE ratio gives insight into how efficiently a management team has been using the capital shareholders have contributed. A higher ROE means management is efficient at using the money raised from equity financing (and vice versa). Net Income Return on Equity (ROE) = (Average of Beginning and Ending Book Value of Equity)","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is the relationship between return on assets (ROA) and return on equity (ROE)?","a":"The relationship between ROA and ROE is tied to the use of leverage. In the absence of debt in the capital structure, the two metrics would be equal. But if the company were to add debt to its capital structure, its ROE would rise above its ROA due to increased cash, as total assets would rise while equity decreases.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"When using metrics such as ROA and ROE, why do we use averages for the denominator?","a":"The numerator, usually net income, comes from the income statement. The denominator, either assets or equity, comes from the balance sheet. The income statement covers a specific period, whereas the balance sheet is a snapshot at one particular point in time. Thus, the average between the beginning and ending balance of the denominator is used to adjust for this mismatch in timing.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What are some shortcomings of the ROA and ROE metrics for comparison purposes?","a":"A company's ROA and ROE ratios are benchmarked against competitors in the same industry to assess management efficiency and track historical trends. However, the ROA and ROE ratios are most useful when compared to a peer group of companies with similar growth rates, margin profiles, and risks. This approach would be best suited for established companies operating in mature, low-growth industries with many comparable companies to accurately track the management team's profitability and efficiency.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What is the return on invested capital (ROIC) metric used to measure?","a":"The return on invested capital (\"ROIC\") metric is used to assess how efficient a management team is at capital allocation. A company that generates an ROIC over its cost of capital (WACC) suggests the management team has been allocating capital efficiently (i.e., investing in profitable projects or investments) and if sustained over the long-run, this indicates a competitive advantage. ROIC represents one of the most fundamental assessments of a company: \"How much in returns is the company earning for each dollar invested?\" NOPAT Return on Invested Capital (ROIC) = Invested Capital","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What does the asset turnover ratio measure?","a":"The asset turnover ratio is a metric used to understand how efficiently a company uses its assets to generate sales. The asset turnover ratio answers the question, \"How many dollars in revenue does the company generate per dollar of assets?\" The higher the ratio, the better, as this suggests the company is generating more revenue per dollar of an asset owned. But it has shortfalls in being distorted by capital expenditures and asset sales. Revenue Asset Turnover Ratio = (Average of Beginning and Ending Total Assets)","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What does inventory turnover measure and how does it differ from days inventory held (DIH)?","a":"The inventory turnover ratio is how often a company has sold and replaced its inventory balance throughout a specified period (i.e., the number of times inventory was \"turned over\"). Cost of Goods Sold Inventory Turnover = (Average of Beginning and Ending Inventory) In contrast, DIH is the average number of days it takes for a company to turn its inventory into revenue.","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What does accounts receivables turnover measure?","a":"Accounts receivable turnover is a metric used to measure the number of times per year that a company can collect its average accounts receivable from customers. The higher the turnover ratio, the better as it indicates the company is efficient at collecting its due payments from customers that paid on credit. Revenue Receivables Turnover = (Average of Beginning and Ending Accounts Receivables)","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What does accounts payables turnover measure and is a higher or lower number preferable?","a":"Accounts payable turnover measures how quickly a company pays its vendors. Generally, longer credit terms provide a company with more flexibility as it means the company has more cash-on-hand. A higher A/P turnover means the company pays off its A/P balance quickly, meaning the cash outflows occur faster. Cost of Goods Sold Accounts Payable Turnover = (Average Beginning and Ending Accounts Payable)","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What are some ratios you would look at to perform credit analysis?","a":"Credit Ratio Type Purpose Examples Liquidity Ratios Assesses a company\u2019s ability to meet its current obligations using its current assets. Current Ratio Quick Ratio Cash Ratio Leverage/Solvency Compares a company's use of debt to assets, Ratios equity, earnings, and total capitalization to evaluate if its debt obligations can be met. Debt-to-EBITDA Debt-to-Assets Debt-to-Equity Coverage Ratios Times Interest Earned EBITDA Interest Coverage Ratio Debt Service Coverage Ratio Fixed Charge Coverage Ratio Measures a company's ability to service interest payments and other debt-related obligations using a cash flow metric. Profitability Ratios Conveys a company's ability to consistently generate profits, enabling it to meet its debt obligations. Gross, Operating, Net Profit, and EBITDA Margins % ROE, ROA, and ROIC","cat":"accounting","diff":2,"src":"Redbook"},{"q":"What are the two types of credit ratios used to assess a company's default risk?","a":"Credit Ratios Leverage Ratios Leverage ratios compare the amount of debt held by a company to a specific cash flow metric, most often EBITDA. Total Debt/EBITDA Senior Debt/EBITDA Net Debt/EBITDA Total Debt/Equity Total Debt/Total Capital Interest Coverage Ratios Interest coverage ratios measure a company\u2019s ability to cover its interest payments using its cash flows. The higher the interest coverage ratio, the better (ideally, >2.0x). EBIT/Interest Expense EBITDA/Interest Expense EBITDA/Cash Interest Expense (EBITDA \u2013 Capex)/Interest Expense","cat":"accounting","diff":2,"src":"Redbook"},{"q":"How do you calculate the debt service coverage ratio (DSCR) and what does it measure?","a":"The debt service coverage ratio (DSCR) is a measure of creditworthiness that tests a company\u2019s ability to pay its current debt obligations using its current cash flows. As a general rule, a DSCR greater than 1.0 shows the company is generating sufficient cash flows to pay down its debt. But a DSCR below 1.0 could be a cause of concern, as it suggests the company might have insufficient cash flows to handle the debt it currently holds. There are various methods to calculate the DSCR, but one commonly used example is shown below: (EBITDA \u2212 Capex) (Mandatory Principal Repayment + Interest Expense)","cat":"accounting","diff":2,"src":"Redbook"},{"q":"How do you calculate the fixed charge coverage ratio (FCCR) and what does it mean?","a":"The fixed charge coverage ratio (FCCR) is used to assess if a company's earnings can cover its fixed charges, which can include rent, utilities, and interest expense. The higher the ratio, the better the creditworthiness. Fixed charges can include expenses such as rent or lease payments, and utility bills. Fixed Charge Coverage Ratio (FCCR) = (EBIT + Lease Charges)","cat":"accounting","diff":2,"src":"Redbook"},{"q":"How would raising capital through share issuances affect earnings per share (EPS)?","a":"The impact on EPS is that the share count increases, which decreases EPS. But there can be an impact on net income, assuming the share issuances generate cash because there would be higher interest income, which increases net income and EPS. However, most companies' returns on excess cash are low, so this doesn't offset the negative dilutive impact on EPS from the increased share count. Alternatively, share issuances might affect EPS in an acquisition where stock is the form of consideration. The amount of net income the acquired company generates will be added to the acquirer\u2019s existing net income, which could have a net positive (accretive) or negative (dilutive) impact on EPS.","cat":"accounting","diff":3,"src":"Redbook"},{"q":"How would a share repurchase impact earnings per share (EPS)?","a":"The impact on EPS following a share repurchase is a reduced share count, which increases EPS. However, there would be an impact on net income, assuming the share repurchase was funded using excess cash. The interest income that would have otherwise been generated on that cash is no longer available, causing net income and EPS to decrease. But the impact would be minor since the returns on excess cash are low, and would not offset the positive impact the repurchase had on EPS from the reduced share count.","cat":"accounting","diff":3,"src":"Redbook"},{"q":"What is the difference between the effective and marginal tax rates?","a":"Effective Tax Rate: The effective tax rate represents the percentage of taxable income corporations must pay in taxes. For historical periods, the effective tax rate can be backed out by dividing the taxes paid by the pre-tax income (or earnings before tax). Taxes Paid Effective Tax Rate % = Earnings Before Tax Marginal Tax Rate: The marginal tax rate is the taxation percentage on the last dollar of a company\u2019s taxable income. The tax expense depends on the statutory tax rate of the governing jurisdiction and the company's taxable income, as the tax rate adjusts according to the tax bracket in which it falls.","cat":"accounting","diff":3,"src":"Redbook"},{"q":"Why is the effective and marginal tax rate often different?","a":"Effective and marginal tax rates differ because the effective tax rate calculation uses pre-tax income from the accrual-based income statement. Since there's a difference between the taxable income on the income statement and taxable income shown on the tax filing, the tax rates will nearly always be different. Thus, the \u201cTax Provision\u201d line item on the income statement rarely matches the actual cash taxes paid to the IRS.","cat":"accounting","diff":3,"src":"Redbook"},{"q":"Could you give specific examples of why the effective and marginal tax rates might differ?","a":"Under GAAP, many companies follow different accounting standards and rules for tax and financial reporting. Most companies use straight-line depreciation (i.e., equal allocation of the expenditure over the useful life) for reporting purposes, but the IRS requires accelerated depreciation for tax purposes \u2013 meaning, book depreciation is lower than tax depreciation for earlier periods until the DTLs reverse. Companies that incurred substantial losses in earlier years could apply tax credits (i.e., NOL carryforwards) to reduce the amount of taxes due in later periods.","cat":"accounting","diff":3,"src":"Redbook"},{"q":"What are deferred tax liabilities (DTLs)?","a":"Deferred tax liabilities (\"DTLs\") are created when a company recognizes a tax expense on its GAAP income statement that, because of a temporary timing difference between GAAP and IRS accounting, is not actually paid to the IRS that period but is expected to be paid in the future. DTLs are often related to depreciation. Companies can use accelerated depreciation methods for tax purposes but elect to use straight-line depreciation for GAAP reporting. This means that for a given depreciable asset, the amount of depreciation recognized in the earlier years for tax purposes will be greater than under GAAP. Temporary timing differences in book and tax accounting lead to the creation of DTAs/DTLs, which will gradually unwind to a balance of zero. Those temporary timing differences are recognized as DTLs. Since these differences are just temporary \u2013 under both book and tax reporting, the same cumulative depreciation will be recognized over the life of the asset \u2013 at a certain point into the asset\u2019s useful life, an inflection point will be reached where the depreciation expense for tax reporting will become lower than for GAAP.","cat":"accounting","diff":3,"src":"Redbook"},{"q":"What are deferred tax assets (DTAs)?","a":"Deferred tax assets (\"DTAs\") are created when a company recognizes a tax expense on its GAAP income statement that, due to a temporary timing difference between GAAP and IRS accounting rules, is lower than what must be paid to the IRS for that period. These net operating losses (\"NOLs\") that a company can carry forward against future income create DTAs. For example, a company that reported a pre-tax loss of $10 million will not get an immediate tax refund. Instead, it'll carry forward these losses and apply them against future profits.","cat":"accounting","diff":3,"src":"Redbook"},{"q":"What are the notable takeaways from Joe Biden\u2019s proposed tax plans?","a":"The corporate tax rate will rise from the Trump Era\u2019s Tax Cuts and Jobs Act (\"TCJA\") rate of 21% to 28%; estimated to increase the government\u2019s tax revenue from $2 trillion to $3 trillion over the next decade. The top tax rate for individuals with a taxable income of $400k+ will rise from 37% to 39.6%. A 12.4% payroll tax will be imposed on those earning $400k+ and to be split evenly between employers and employees. Minimum tax on corporations with book profits of $100+ million, which would be structured so that corporations would pay the greater amount between 1) their regular corporate income tax or 2) the 15% minimum tax with net operating loss (NOL) and foreign tax credits allowed.","cat":"accounting","diff":3,"src":"Redbook"},{"q":"Does a company truly not incur any costs by paying employees through stock-based compensation rather than cash?","a":"Stock-based compensation is a non-cash expense that reduces a company\u2019s taxable income and is added-back on the cash flow statement.","cat":"accounting","diff":3,"src":"Redbook"},{"q":"Could you define contra-liability, contra-asset, and contra-equity with examples of each?","a":"Contra-Liability: A contra-liability is a liability account that carries a debit balance. While classified as a liability, it functions closer to an asset by providing benefits to the company. An example would be financing fees in M&A. The financing fees are amortized over the debt's maturity, which reduces the annual tax burden and results in tax savings until the end of the term. Contra-Asset: A contra-asset is an asset that carries a credit balance. An example would be depreciation, as it reduces the fixed asset\u2019s carrying balance while providing tax benefits to the company. There is often a line called \u201cAccumulated Depreciation,\u201d which is the contra-asset account reflected on the balance sheet. Contra-Equity: A contra-equity account has a debit balance and reduces the total amount of equity held by a company. An example would be treasury stock, which reduces shareholders\u2019 equity. Since treasury stock reduces the total shareholders' equity, treasury stock is shown as a negative on the balance sheet.","cat":"accounting","diff":3,"src":"Redbook"},{"q":"What is an allowance for doubtful accounts on the balance sheet?","a":"Under US GAAP, the allowance for doubtful accounts estimates the percentage of uncollectible accounts receivable. This line item is considered a contra-asset because it reduces the accounts receivable balance. The allowance, often called a bad debt reserve, represents management\u2019s estimate of the amount of A/R that appears unlikely to be paid by customers. In effect, a more realistic value for A/R that'll actually be turning into cash is shown on the balance sheet, while preventing any sudden decreases in the company's A/R balance.","cat":"accounting","diff":3,"src":"Redbook"},{"q":"What is the difference between a write-down and a write-off?","a":"Write-Downs: In a write-down, an adjustment is made to an asset such as inventory or PP&E that has become impaired. The asset's fair market value (FMV) has fallen below its book value; hence, its classification as an impaired asset. Based on the write-down amount deemed appropriate, the value of the asset is decreased to reflect its true value on the balance sheet. Examples of asset write-downs would include damages caused by minor fires, accidents, or sudden value deterioration from lower demand. Write-Offs: Unlike a write-down in which the asset retains some value, a write-off reduces an asset's value to zero, meaning the asset has been determined to hold no current or future value (and should therefore be removed from the balance sheet). Examples include uncollectible AR, \"bad debt,\" and stolen inventory.","cat":"accounting","diff":3,"src":"Redbook"},{"q":"How would a $100 inventory write-down impact the three financial statements?","a":"IS: The $100 write-down charge will be reflected in the cost of goods line item. The cash impact of The expense would decrease EBIT by $100, and net income would decline by the write-down was $70, assuming a 30% tax rate. net positive, as the CFS: The starting line item, net income, will be down $70, but the $100 writecompany's taxable down is an add-back since there's no actual cash outflow from the write-down. income was reduced The net impact to the ending cash will be a $30 increase. from the tax savings. BS: On the asset side, cash is up $30 due to inventory being written down $100. This will be offset by the decrease of $70 in net income that flows through retained earnings on the equity section. Both sides of the balance sheet will be down by $70 and remain in balance.","cat":"accounting","diff":3,"src":"Redbook"},{"q":"How does buying a building impact the three financial statements?","a":"IS: Initially, there'll be no impact on the income statement since the purchase of the building is capitalized. CFS: The PP&E outflow is reflected in the cash from investing section and reduces the cash balance. BS: The cash balance will go down by the purchase price of the building, with the offsetting entry to the cash reduction being the increase in PP&E. Throughout the purchased building's useful life, depreciation is recognized on the income statement, which reduces net income each year, net of the tax expense saved (since depreciation is tax-deductible).","cat":"accounting","diff":3,"src":"Redbook"},{"q":"How does selling a building with a book value of $6 million for $10 million impact the three financial statements?","a":"IS: If I sell a building for $10 million with a book value of $6 million, a $4 million gain from the sale would be recognized on the income statement, which will increase my net income by $4 million. CFS: Since the $4 million gain is non-cash, it'll be subtracted from net income in the cash from operations section. In the investing section, the full cash proceeds of $10 million are captured. BS: The $6 million book value of the building is removed from assets while cash increases by $10 million, for a net increase of $4 million to assets. On the L&E side, retained earnings will increase by $4 million from the net income increase, so the balance sheet remains balanced.","cat":"accounting","diff":3,"src":"Redbook"},{"q":"If a company has continuously incurred goodwill impairment charges, what do you take away from seeing this in their financials?","a":"Goodwill on the balance sheet remains unchanged unless it's impaired, meaning the purchaser has determined that the acquired assets are worth less than initially thought. While goodwill impairment can be attributed to unforeseeable circumstances, impairments as a common occurrence may raise concerns regarding the management team\u2019s history of overpaying for assets or their inability to integrate new acquisitions.","cat":"accounting","diff":3,"src":"Redbook"},{"q":"What is the accounting treatment for finance leases?","a":"Finance leases is an accounting approach that recognizes the present value of all future lease payments as debt and recognizes the value provided by those future lease obligations as an asset (PP&E) on the lessee\u2019s balance sheet. Unlike debt, where the principal is defined, companies must estimate the initial finance lease liability as the present value of all future lease payments, using a discount rate assumption. For example, a 4-year lease with $500,000 annual year-end lease payments at an assumed discount rate of 10% will be recognized. Similar to debt, leases are long-term obligations to make payments to another party. However, lease payments rarely include explicit interest payments in the way debt does. Instead, the interest fees are implied and accounted for in the total lease expense. Over the finance lease term, the asset is depreciated, while the lease liability accrues interest during the year and is then reduced by lease payments (similar to principal payments with debt). On the income statement, depreciation and the implied interest expense reduces net income. To recap, the balance sheet initially treats the finance lease as a debt-like liability and the underlying asset as an owned asset. Over the life of the lease, the income statement impact doesn't capture the rent expense as one might intuitively assume. Instead, finance lease accounting breaks up the lease payments into two components on the income statement: interest and depreciation expenses \u2013 even though a company in actuality is paying a lease payment that commingles these two items.","cat":"accounting","diff":3,"src":"Redbook"},{"q":"What is the accounting treatment for operating leases?","a":"Lease accounting changed significantly in 2019 for both US GAAP and IFRS. IFRS doesn't allow operating leases at all, so this only applies to US GAAP. The initial balance sheet impact is the same as finance leases: Initially, the lease is recognized as a liability on the balance sheet (just like debt) with the corresponding asset as PP&E. The income statement is where the accounting diverges from finance leases. The income statement is simply reduced by the rent (lease) expense throughout the lease term. For example, if a 5-year lease calls for the annual lease payment of $500,000, the annual rent expense will be recognized as a $500,000 operating expense per year. The cash flow statement will already reflect the lease payment in each period via the net income line, so the lease payment affects the cash flow statement in cash from operations.","cat":"accounting","diff":3,"src":"Redbook"},{"q":"What are the three sub-classifications of investment securities?","a":"1. Trading Securities: These are debt or equity investments intended to generate short-term profits. The purchase amount of the security will be recorded at its initial cost on the balance sheet and periodically marked-to-market until sold. Any unrealized gain/(loss) will be recorded on the income statement throughout the holding period until the realized gain/(loss) when sold. 2. Available-for-Sale Securities (\"AFS\"): These are debt or equity securities held for the long-term but sold before maturity. The investment amount will be recorded at the initial cost on the balance sheet, markedto-market until the sale, and categorized as either current or non-current. A distinction from trading securities is how unrealized gains or losses are not be reflected on the income statement, but recorded as \u201cAccumulated Other Comprehensive Income\u201d on the balance sheet. Once sold, the realized gain/(loss) will be recognized on the income statement. 3. Held-to-Maturity Securities (\"HTM\"): These are long-term investments in debt securities held until the end of their term. HTM applies only to debt instruments, typically government bonds, certificates of deposit (CDs), and investment-grade corporate bonds, as they have fixed payment schedules and maturity dates. HTM securities are low risk, low return holdings since there's a low risk of default, and the long-term holding horizon helps mitigate many risks. The investment's original cost is recorded on the balance sheet (reported at amortized cost). However, the value of the investment is not adjusted following changes in its FMV due to the HTM classification.","cat":"accounting","diff":3,"src":"Redbook"},{"q":"Could you name an example of an asset that's exempt from the cost principle rule?","a":"Mark-to-market accounting would record the asset at its current fair market value and then adjust the value to reflect what an asset would sell for today. There are a few exceptions to the cost principle rule, with one of them being marketable securities, which are highly liquid and traded on stock exchanges.","cat":"accounting","diff":3,"src":"Redbook"},{"q":"When can a company capitalize software development costs under accrual accounting?","a":"The capitalization of software development costs involves internally developed software costs being recognized similar to fixed asset purchases, as opposed to being expensed as incurred in the current period. These software-related costs can include programmers' compensation, market testing, and various direct or indirect overhead costs related to bringing the software to the public. To capitalize software development costs, the software being developed must be eligible based on GAAP's criterion. Broadly, there are two stages of software development in which a company can capitalize software costs: 1. The application development stage for software intended for internal use such as coding 2. The stage when the software\u2019s \u201ctechnological feasibility\u201d has been reached and can be marketed The accounting treatment of capitalized software costs is like that of certain intangible assets, in which the software costs are capitalized and amortized over the useful life assumption on the income statement.","cat":"accounting","diff":3,"src":"Redbook"},{"q":"What is a PIK toggle note?","a":"A PIK toggle note provides the issuer of the debt with the option to defer an interest payment, but the entire debt balance, including the accrued payments that must be paid by maturity. Loans can come arranged with a fixed PIK schedule outlined in the lending terms, but certain debt instruments can come with the optionality to let the issuer decide whether to pay in cash or accrue over to the next period. Therefore, whether interest expense is paid-in-cash or PIK effectively becomes a discretionary decision.","cat":"accounting","diff":3,"src":"Redbook"},{"q":"What is the purpose of the original issue discount feature of debt?","a":"An original issue discount (\"OID\") is a feature of debt meant to make the issuance more appealing to investors as a \u201cdeal sweetener.\u201d Typically, the reduction is 1-2% of the debt issuance. For example, that if there's $100 of debt being raised, you'll issue it so that the lender only has to pay $98 or $99. An OID is modeled similarly to financing fees and amortized over the term of the debt.","cat":"accounting","diff":3,"src":"Redbook"},{"q":"How can you forecast a company's implied share price using its EPS?","a":"Since the P/E ratio is equal to a company's share price divided by its EPS, a company's implied share price can be estimated by taking the forecasted EPS figure and then multiplying it by a P/E ratio assumption. The conservative approach is to use the company's current P/E ratio as of the present day (or a minor contraction). This estimated share price can be sanity checked by using the consensus EPS annual growth rate as a proxy for share price growth. Both approaches implicitly assume a fixed P/E ratio, but this is meant to be an approximation of where a company could be trading at, rather than a precise share price forecast.","cat":"accounting","diff":3,"src":"Redbook"},{"q":"Could you explain the concept of present value and how it relates to company valuations?","a":"The present value concept is based on the premise that \"a dollar in the present is worth more than a dollar in the future\" due to the time value of money. The reason being money currently in possession has the potential to earn interest by being invested today. Cash Flow t=1 Present Value t= 0 = (1 + r) t=1 Present Value Basics For intrinsic valuation methods, the value of a company will be equal to the sum of the present value of all the future cash flows it generates. Therefore, a company with a high valuation would imply it receives high returns on its invested capital by investing in positive net present value (\"NPV\") projects consistently while having low risk associated with its cash flows.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"What is equity value and how is it calculated?","a":"Often used interchangeably with the term market capitalization (\u201cmarket cap\u201d), equity value represents a company's value to its equity shareholders. A company's equity value is calculated by multiplying its latest closing share price by its total diluted shares outstanding, as shown below: Equity Value = Latest Closing Share Price \u00d7 Total Diluted Shares Outstanding","cat":"valuation","diff":2,"src":"Redbook"},{"q":"How do you calculate the fully diluted number of shares outstanding?","a":"The treasury stock method (\"TSM\") is used to calculate the fully diluted number of shares outstanding based on the options, warrants, and other dilutive securities that are currently \u201cin-the-money\u201d (i.e., profitable to exercise). The TSM involves summing up the number of in-the-money (\"ITM\") options and warrants and then adding that figure to the number of basic shares outstanding. In the proceeding step, the TSM assumes the proceeds from exercising those dilutive options will go towards repurchasing stock at the current share price to reduce the net dilutive impact.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"What is enterprise value and how do you calculate it?","a":"Conceptually, enterprise value (\"EV\") represents the value of the operations of a company to all stakeholders including common shareholders, preferred shareholders, and debt lenders. Thus, enterprise value is considered capital structure neutral, unlike equity value, which is affected by financing decisions. Enterprise value is calculated by taking the company's equity value and adding net debt, preferred stock, and minority interest. Equity value represents just the residual value to equity holders, whereas enterprise value pertains to all providers of capital. Enterprise Value = Equity Value + Net Debt + Preferred Stock + Minority Interest","cat":"valuation","diff":2,"src":"Redbook"},{"q":"How do you calculate equity value from enterprise value?","a":"To get to equity value from enterprise value, you would first subtract net debt, where net debt equals the company\u2019s gross debt and debt-like claims (e.g., preferred stock), net of cash, and non-operating assets. Equity Value = Enterprise Value \u2013 Net Debt \u2013 Preferred Stock \u2013 Minority Interest Which line items are included in the calculation of net debt? The calculation of net debt accounts for all interest-bearing debt, such as short-term and longterm loans and bonds, as well as non-equity financial claims such as preferred stock and noncontrolling interests. From this gross debt amount, cash and other non-operating assets such as short-term investments and equity investments are subtracted to arrive at net debt. Net Debt = Total Debt \u2013 Cash & Equivalents","cat":"valuation","diff":2,"src":"Redbook"},{"q":"When calculating enterprise value, why do we add net debt?","a":"The underlying idea of net debt is that the cash on a company\u2019s balance sheet could pay down the outstanding debt if needed. For this reason, cash and cash equivalents are netted against the company\u2019s debt, and many leverage ratios use net debt rather than the gross amount.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"What is the difference between enterprise value and equity value?","a":"Enterprise value represents all stakeholders in a business, including equity shareholders, debt lenders, and preferred stock owners. Therefore, it's independent of the capital structure. In addition, enterprise value is closer to the actual value of the business since it accounts for all ownership stakes (as opposed to just equity owners). To tie this to a recent example, many investors were astonished that Zoom, a video conferencing platform, had a higher market capitalization than seven of the largest airlines combined at one point. The points being neglected were: vs. Equity Value The equity values of the airline companies were temporarily deflated given the travel restrictions, and the government bailout had not yet been announced. The airlines are significantly more mature and have far more debt on their balance sheet (i.e., more nonequity stakeholders).","cat":"valuation","diff":2,"src":"Redbook"},{"q":"Could a company have a negative net debt balance and have an enterprise value lower than its equity value?","a":"Yes, negative net debt just means that a company has more cash than debt. For example, both Apple and Microsoft have massive negative net debt balances because they hoard cash. In these cases, companies will have enterprise values lower than their equity value. If it seems counter-intuitive that enterprise value can be lower than equity value, remember that enterprise value represents the value of a company\u2019s operations, which excludes any non-operating assets. When you think about it this way, it should come as no surprise that companies with much cash (which is treated as a non-operating asset) will have a higher equity value than enterprise value.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"Can the enterprise value of a company turn negative?","a":"While negative enterprise values are a rare occurrence, it does happen from time to time. A negative enterprise value means a company has a net cash balance (total cash less total debt) that exceeds its equity value.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"If a company raises $250 million in additional debt, how would its enterprise value change?","a":"Theoretically, there should be no impact as enterprise value is capital structure neutral. The new debt raised shouldn't impact the enterprise value, as the cash and debt balance would increase and offset the other entry.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"Why do we add minority interest to equity value in the calculation of enterprise value?","a":"Minority interest represents the portion of a subsidiary in which the parent company doesn't own. Under US GAAP, if a company has ownership over 50% of another company but below 100% (called a \u201cminority interest\u201d or \u201cnon-controlling investment\u201d), it must include 100% of the subsidiary\u2019s Conceptually, you financials in their financial statements despite not owning 100%. may find it useful to","cat":"valuation","diff":2,"src":"Redbook"},{"q":"What are the two main approaches to valuation?","a":"1. Intrinsic Valuation: For an intrinsic valuation, the value of a business is arrived at by looking at the business's ability to generate cash flows. The discounted cash flow method is the most common type of intrinsic valuation and is based on the notion that a business's value equals the present value of its future free cash flows. 2. Relative Valuation: In relative valuation, a business's value is arrived at by looking at Valuation comparable companies and applying the average or median multiples derived from Methods the peer group \u2013 often EV/EBITDA, P/E, or some other relevant multiple to value the target. This valuation can be done by looking at the multiples of comparable public companies using their current market values, which is called \"trading comps,\" or by looking at the multiples of comparable companies recently acquired, which is called \"transaction comps.\"","cat":"valuation","diff":2,"src":"Redbook"},{"q":"What are the most common valuation methods used in finance?","a":"Valuation Methods Comparable Company Analysis (\"Trading Comps\") Trading comps value a company based on how similar publicly-traded companies are currently being valued at by the market. Comparable Transactions Analysis Transaction comps value a company based on the amount buyers paid to (\"Transaction Comps\") acquire similar companies in recent years. Discounted Cash Flow Analysis DCFs value a company based on the premise that its value is a function of its projected cash flows, discounted at an appropriate rate that reflects the risk of those cash flows. Leveraged Buyout Analysis An LBO will look at a potential acquisition target under a highly leveraged scenario to determine the maximum purchase price the firm would be willing to pay. Liquidation Analysis Liquidation analysis is used for companies under (or near) distress and values the assets of the company under a hypothetical, worst-case scenario liquidation. Among the DCF, comparable companies analysis, and transaction comps, which approach yields the highest valuation? Transaction comps analysis often yields the highest valuation because it looks at valuations for companies that have been acquired, which factor in control premiums. Control premiums can often be quite significant and as high as 25% to 50% above market prices. Thus, the multiples derived from this analysis and the resulting valuation are usually higher than a straight trading comps valuation or a standalone DCF valuation. Which of the valuation methodologies is the most variable in terms of output? Because of its reliance on forward-looking projections and discretionary assumptions, the DCF is the most variable out of the different valuation methodologies. Relative valuation methodologies such as trading and transaction comps are based on the actual prices paid for similar companies. While there'll be some discretion involved, the valuations derived from comps deviate to a lesser extent than DCF models. Contrast the discounted cash flow (DCF) approach to the trading comps approach. Advantages Disadvantages Discounted Cash Flow (DCF) The DCF values a company based on the company\u2019s forecasted cash flows. This approach is viewed as the most direct and academically rigorous way to measure value. Considered to be independent of the market and instead based on the fundamentals of the company. The DCF suffers from several drawbacks; most notably, it's very sensitive to assumptions. Forecasting the financial performance of a company is challenging, especially if the forecast period is extended. Many criticize the use of beta in the calculation of WACC, as well as how the terminal value comprises around threequarters of the implied valuation. Trading Comps Trading comps value a company by looking at how the market values similar businesses. Thus, comps relies much more heavily on market pricing to determine the value of a company (i.e., the most recent, actual prices paid in the public markets). In reality, there are very few truly comparable companies, so in effect, it's always an \u201capples and oranges\u201d comparison. While the value derived from a comps analysis is viewed by many as a more realistic assessment of how a company could expect to be priced, it's vulnerable to how the market is not always right. Therefore, a comps analysis is simply pricing, as opposed to a valuation based on the company\u2019s fundamentals. Comps make just as many assumptions as a DCF, but they are made implicitly (as opposed to being explicitly chosen assumptions like in a DCF).","cat":"valuation","diff":2,"src":"Redbook"},{"q":"How can you determine which valuation method to use?","a":"Each valuation method has its shortcomings; therefore, a combination of different valuation techniques should be used to arrive at a range of valuation estimates. Using various methods allows you to arrive at a more defensible approximation and sanity-check your assumptions. The DCF and trading comps are often used in concert such that the comps provide a market-based sanity-check to intrinsic DCF valuation (and vice versa). For example, an analyst valuing an acquisition target may look at the past premiums and values paid on comparable transactions to determine what the acquirer must realistically expect to pay. The analyst may also value the company using a DCF to help show how far market prices are from intrinsic value estimates. Another example of when the DCF and comps approaches can be used together is when an investor considers investing in a business \u2013 the analyst may identify investing opportunities where comps-derived market values for companies are significantly lower than valuations derived using a DCF (although it bears repeating that the DCF\u2019s sensitivity to assumptions is a frequent criticism).","cat":"valuation","diff":2,"src":"Redbook"},{"q":"Would you agree with the statement that relative valuation relies less on the discretionary assumptions of individuals?","a":"That could be argued as an inaccurate statement. While a comps analysis often All valuation yields different valuations from a DCF, that\u2019s only because of inconsistent implicit methods contain assumptions across both approaches. If the implicit assumptions of the comps some degree of analysis were entirely consistent with the explicit assumptions of the DCF analysis, inherent bias; thus, the valuations using both approaches would theoretically be equal. various methods","cat":"valuation","diff":2,"src":"Redbook"},{"q":"What does free cash flow (FCF) represent?","a":"Free cash flow (\"FCF\") represents a company's discretionary cash flow, meaning the cash flow remaining after accounting for the recurring expenditures to continue operating. The simplest calculation of FCF is shown below: Free Cash Flow (FCF) = Cash from Operations \u2013 Capex The cash from investing section, other than capex, and the financing section are excluded because these activities are optional and discretionary decisions up to management.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"Why are periodic acquisitions excluded from the calculation of FCF?","a":"The calculation of free cash flow should include only inflows/(outflows) of cash from the core, recurring operations. That said, a periodic acquisition is a one-time, unforeseeable event, whereas capex is recurring and a normal part of operations (i.e., capex is required for a business to continue operating).","cat":"valuation","diff":2,"src":"Redbook"},{"q":"Could you define what the capital structure of a company represents?","a":"The capital structure is how a company funds its ongoing operations and growth plans. Most companies' capital structure consists of a mixture of debt and equity, as each source of capital comes with its advantages and disadvantages. As companies mature and build a track record of profitability, they can usually get debt financing easier and at more favorable rates since their default risk has decreased. Thus, it's ordinary to see leverage ratios increase in proportion with the company's maturity. The optimal capital structure is the D/E mix that minimizes the cost of capital, while maximizing the firm value.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"Why would a company issue equity vs. debt (and vice versa)?","a":"Advantages Disadvantages Equity No required payments, unlike debt, giving management more flexibility around repayment. Dividends to equity shareholders can be issued, but the timing and magnitude are at the board and management\u2019s discretion. Another advantage of equity is that it gives companies access to a vast investor base and network. Issuing equity dilutes ownership, and equity is a high cost of capital. Public equity comes with more regulatory requirements, scrutiny from shareholders and equity analysts, and full disclosures of their financial statements. The management team could lose control over their company and be voted out by shareholders if the company underperforms. Debt The interest expense on debt is taxdeductible, unlike dividends to equity shareholders (although recent tax reform rules limit the deduction for highly levered companies). Debt results in no ownership dilution for equity shareholders and has a lower cost of capital. Increased leverage forces discipline on management, resulting in risk-averse decision-making as a side benefit. Required interest and principal payments that introduce the risk of default. Loss of flexibility from restrictive debt covenants prevents management from undertaking a variety of activities such as raising more debt, issuing a dividend, or making an acquisition. Less room for errors in decision-making, therefore poor decisions by management come with more severe consequences.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"Why would a company repurchase shares? What would the impact on the share price and financial statements be?","a":"A company buys back shares primarily to move cash from the company\u2019s balance sheet to shareholders, similar to issuing dividends. The primary difference is that instead of shareholders receiving cash as with dividends, a share repurchase removes shareholders. The impact on share price is theoretically neutral \u2013 as long as shares are priced correctly, a Share share buyback shouldn't lead to a change in share price because while the share count Repurchases & (denominator) is reduced, the equity value is also reduced by the now lower company cash Issuances balances. That said, share buybacks can positively or negatively affect share price movement, depending on how the market perceives the signal. Cash-rich but otherwise risky companies could see artificially low share prices if investors discount that cash in their valuations. Here, buybacks should lead to a higher share price, as the upward share price impact of a lower denominator is greater than the downward share price impact of a lower equity value numerator. Conversely, if shareholders view the buyback as a signal that the company\u2019s investment prospects are not great (otherwise, why not pump the cash into investments?), the denominator impact will be more than offset by a lower equity value (due to lower cash, lower perceived growth and investment prospects). On the financials, the accounting treatment of the $100 million share buyback would be treated as: Cash is credited by $100 million Treasury stock is debited by $100 million","cat":"valuation","diff":2,"src":"Redbook"},{"q":"Why might a company prefer to repurchase shares over the issuance of a dividend?","a":"The so-called \"double taxation\" when a company issues a dividend, in which the same income is taxed at the corporate level (dividends are not tax-deductible) and then again at the shareholder level. Share repurchases will artificially increase EPS by reducing the number of shares outstanding and can potentially increase the company's share price. Many companies increasingly pay employees using stock-based compensation to conserve cash, thus share buybacks can help counteract the dilutive impact of those shares. Share buybacks imply a company's management believes their shares are currently undervalued, making the repurchase a potential positive signal to the market. Share repurchases can be one-time events unless stated otherwise, whereas dividends are typically meant to be long-term payouts indicating a transition internally within a company. Cutting a dividend can be interpreted very negatively by the market, as investors will assume the worst and expect future profits to decrease (hence, dividends are rarely cut once implemented). A company with $100 million in net income and a P/E multiple of 15x is considering raising $200 million in debt to pay out a one-time cash dividend. How would you decide if this is a good idea? If we assume that the P/E multiple stays the same after the dividend and a cost of debt of 5%, the impact to shareholders is as follows: Net income drops from $100 million to $90 million [($200 million new borrowing x 5%) = $10 million] Equity value drops from $1,500 million (15 x $100 million) to $1,350 million (15.0 x $90 million) Although there's a tax impact since interest is mostly deductible, it can be ignored for interviewing purposes. That\u2019s a $150 million drop in equity value. However, shareholders are immediately getting $200 million. So ignoring any tax impact, there's a net benefit of $50 million ($200 million \u2013 $150 million) to shareholders. The assumptions we made about taxes, the cost of debt and the multiple staying the same all affect the result. If any of those variables were different \u2013 for example, if the cost of debt was higher \u2013 the equity value might be wiped out in light of this move. A key assumption in getting the answer here was that P/E ratios would remain the same at 15x. A company\u2019s P/E multiple is a function of its growth prospects, ROE, and cost of equity. Hence, borrowing more with no compensatory increase in investment or growth raises the cost of equity via a higher beta, which will pressure the P/E multiple down. While it appears based on our assumptions that this is a decent idea, it could easily be a bad idea given a different set of assumptions. It's possible that borrowing for the sake of issuing dividends is unsustainable indefinitely because eventually, debt levels will rise to a point where the cost of capital and P/E ratios are adversely affected. Broadly, debt should support investments and activities that will lead to firm and shareholder value creation rather than extract cash from the business.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"When would it be most appropriate for a company to distribute dividends?","a":"Companies that distribute dividends are usually low-growth with fewer profitable projects in their pipeline. Therefore, the management opts to pay out dividends to signal the company is confident in its long-term profitability and appeal to a different shareholder base (more specifically, long-term dividend investors).","cat":"valuation","diff":2,"src":"Redbook"},{"q":"What is CAGR and how do you calculate it?","a":"The compound annual growth rate (\"CAGR\") is the rate of return required for an investment to grow from its beginning balance to its ending balance. Put another way, CAGR is the annualized average growth rate. Ending Value 1 ) t \u20131 Beginning Value","cat":"valuation","diff":2,"src":"Redbook"},{"q":"What is the difference between CAGR and IRR?","a":"The compound annual growth rate (CAGR) and internal rate of return (IRR) are both used to measure the return on an investment. However, the calculation of CAGR involves only three inputs: the investment\u2019s beginning and ending value and the number of years. IRR, or the XIRR in Excel to be more specific, can handle more complex situations with the timing of the cash inflows and outflows (i.e., the volatility of the multiple cash flows) accounted for, rather than just smoothing out the investment returns. CAGR is usually for assessing historical data (e.g., past revenue growth), whereas IRR is used more often for investment decision-making.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"How would you value a painting?","a":"A painting has no intrinsic value, generates no cash flows, and cannot be valued in the traditional sense. The pricing of the painting is a function of what someone will pay for it in the market, rather than being anchored by its fundamentals. To determine the approximate price, you would have to analyze comparable transactions to see the amount others paid to purchase similar paintings in the past.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"When would it be appropriate to use a sum-of-the-parts approach to valuing a company?","a":"In a sum-of-the-parts (\"SOTP\") analysis, each division of a company will have its unique risk/return profile and need to be broken up to value the entire company more accurately as a whole. Thus, a different discount rate will value each segment, and there'll be distinct peer groups for the trading and transaction comps. Upon completing each division's valuation, the ending values would be summed up to arrive at the total value. An example of when SOTP analysis (or break-up analysis) would be used is when the company being valued has many operating divisions in unrelated industries, each with differing risk-profiles (e.g., conglomerate).","cat":"valuation","diff":2,"src":"Redbook"},{"q":"What is an illiquidity discount?","a":"The illiquidity discount used when valuing private companies is related to being unable to exit an investment quickly. Most investors will pay a premium for an otherwise similar asset if there's the optionality to sell their","cat":"valuation","diff":2,"src":"Redbook"},{"q":"What is the difference between unlevered FCF (FCFF) and levered FCF (FCFE)?","a":"Unlevered FCF: FCFF represents cash flows a company generates from its core operations after accounting for all operating expenses and investments. To calculate FCFF, you start with EBIT, which is an unlevered measure of profit because it excludes interest and any other payments to lenders. You'll then tax effect EBIT, add back non-cash items, make working capital adjustments, and subtract capital expenditures to arrive at FCFF. Tax-affected EBIT is often referred to as Net Operating Profit After Taxes (\u201cNOPAT\u201d) or Earnings Before Interest After Taxes (\u201cEBIAT\u201d). FCFF = EBIT \u00d7 (1 \u2013 Tax Rate) + D&A \u2013 Changes in NWC \u2013 Capex Levered FCF: FCFE represents cash flows that remain after payments to lenders since interest expense and de
