bt paydown are deducted. These are the residual cash flows that belong to equity owners. Instead of tax-affected EBIT, you start with net income, add back non-cash items, adjust for changes in working capital, subtract capex, and add cash inflows/(outflows) from new borrowings, net of debt paydowns. FCFE = Cash from Operations \u2013 Capex \u2013 Debt Principal Payment","cat":"dcf","diff":2,"src":"Redbook"},{"q":"What is the difference between the unlevered DCF and the levered DCF?","a":"Unlevered DCF: The unlevered DCF discounts the unlevered FCFs to arrive directly at enterprise value. When you have a present value, add any non-operating assets such as cash and subtract any financing-related liabilities such as debt to get to the equity value. The appropriate discount rate for the unlevered DCF is the weighted average cost of capital (WACC) because the rate should reflect the riskiness to both debt and equity Unlevered vs. capital providers since UFCFs are cash flows that belong to debt and equity providers. Levered DCF Levered DCF: The levered DCF approach, on the other hand, arrives at equity value directly. First, the levered FCFs are forecasted and discounted, which gets you to equity value directly. The appropriate discount rate on LFCFs is the cost of equity since these cash flows belong solely to equity owners and should thus reflect the risk of equity capital. If you wanted to get to enterprise value, you would add back net debt. The levered and unlevered DCF method should theoretically lead to the same enterprise value and equity value, but in practice, it's very difficult to get them to be precisely equal.","cat":"dcf","diff":2,"src":"Redbook"},{"q":"What is the formula to calculate the weighted average cost of capital (WACC)?","a":"The weighted average cost of capital (WACC) can be viewed as the opportunity cost of an investment based on comparable investments with similar risk profiles. WACC is calculated by multiplying the equity weight by the cost of equity and adding it to the debt weight multiplied by the tax-affected cost of debt. For the equity and debt values, the market values must be used rather than the book values. Equity Debt \u00d7 R equity ) + [ \u00d7 R debt (1 \u2013 t)] Debt + Equity Debt + Equity E/(D + E) and D/(D + E) are the equity and debt weights of the total capital structure Requity = Cost of Equity Rdebt = Cost of Debt, and must be tax-affected since interest is tax-deductible t = Tax Rate %","cat":"dcf","diff":2,"src":"Redbook"},{"q":"Does a higher beta translate into a higher or lower valuation?","a":"A company with a high beta suggests more risk and will exhibit higher volatility than the market (i.e., higher sensitivity to market fluctuations). Thus, a higher discount rate will be used by investors to value the company\u2019s cash flows, which directly leads to a lower valuation, all else being equal.","cat":"dcf","diff":2,"src":"Redbook"},{"q":"What type of sectors would have higher or lower betas?","a":"A useful question to ask yourself when assessing beta is: \"Would consumers require (or demand) this product or service during a recession?\" High Beta: A beta of >1 would mean the industry is highly cyclical and be more volatile than the broad market. For example, the automobile, semiconductors, and construction industry have higher betas since most consumers only purchase cars and new homes during positive economic growth. Low Beta: A beta of < 1 suggests the security is less volatile than the broad market. Consumer product stores that sell necessary, everyday goods such as toiletries and personal hygiene products would have a low beta. Other sectors with low betas are hospitals/healthcare facilities and utilities, which provide essential goods and services required by consumers regardless of the prevailing economic climate.","cat":"dcf","diff":2,"src":"Redbook"},{"q":"What are the benefits of the industry beta approach?","a":"The industry \u03b2 approach looks at the \u03b2 of a comparable peer group to the company being valued and then applies this peer-group derived beta to the target. The benefits are that company-specific noise is eliminated, which refers to distorting events that could cause the correlation shown in its beta to be less accurate. So the peer-group derived beta is \u201cnormalized\u201d since it takes the average of the unlevered betas of comparable businesses and then relevers it at the target capital structure of the company being valued. The implied assumption is that the company's business risk will converge with its peer group over the long run. This approach also enables one to arrive at an industry-derived beta for private companies that lack readily observable betas. To perform a DCF analysis for a private company, the industry beta approach would be required as privately-held companies don't have readily observable betas.","cat":"dcf","diff":2,"src":"Redbook"},{"q":"What are the flaws of regression betas?","a":"1. Backward Looking: The standard procedure to estimate the beta is through a regression model that compares the historical market index returns and company returns, in which the slope of the regression corresponds to the beta of the stock. However, this past performance (and correlation) may not be an accurate indicator of the stock's future performance. 2. Large Standard Error: The regression model is sensitive to the assumptions used, such as the index chosen to be the proxy for the market return. There are also company-specific events that can cause deviations that are not indicative of a company\u2019s true correlation with the market. 3. Constant Capital Structure: The regression beta reflects the averaged past D/E ratios instead of the current leverage in the company\u2019s capital structure. The amount of leverage used by a company often directly relates to its maturity, so this can be argued to be a flawed assumption for forecasting purposes, especially when considering beta\u2019s relationship with debt.","cat":"dcf","diff":2,"src":"Redbook"},{"q":"What is the typical relationship between beta and the amount of leverage used?","a":"Generally, mature companies with lower betas will have a higher percentage of debt in their capital structure because they can easily get cheap financing based on their long-lasting track record of cash flows and profitability, as well as being non-cyclical and carrying less risk than the broad market. In comparison, a company with a high beta will be reluctant to use debt or if they do, the terms of the debt would be less favorable. From a financier's perspective: \"Would the lender be comfortable loaning money to a company that has a higher beta and volatility throughout different economic cycles?\"","cat":"dcf","diff":2,"src":"Redbook"},{"q":"What are the formulas used to unlever and relever beta?","a":"By unlevering beta for the peer group, each comparable company\u2019s business risk is isolated, and the distorting effect of leverage is removed. Calculating raw betas from historical returns and even projected betas is an imprecise measurement of future beta because of estimation errors (i.e., standard errors create a large potential range for beta). As a result, it's recommended to use an industry beta. Since the betas of comparable companies are distorted because of different rates of leverage, we unlever the betas of these comparable companies: \u03b2 Unlevered = \u03b2(Levered) Debt [1 + (Equity) (1 \u2212 t)] Then, once a median or average unlevered beta is calculated, this beta is relevered at the target company\u2019s capital structure: \u03b2 Levered = \u03b2 Unlevered \u00d7 [(1 + (1 \u2212 t) ( Debt )] Equity","cat":"dcf","diff":2,"src":"Redbook"},{"q":"Is it possible for an asset to have a negative beta?","a":"Yes, the most commonly cited example is gold, which has an inverse relationship with the market. When the stock market goes up, the price of gold will often decrease.","cat":"dcf","diff":2,"src":"Redbook"},{"q":"How do you estimate the cost of debt?","a":"The cost of debt is readily observable in the market as the yield on debt with equivalent risk.","cat":"dcf","diff":2,"src":"Redbook"},{"q":"What is the difference between WACC and IRR?","a":"Internal Rate of Return: The IRR is the rate of return on a project\u2019s expenditures. Given a beginning value and ending value, the IRR is the implied interest rate at which the initial capital investment would have to grow to reach the ending value. Alternatively, it's defined as the discount rate on a stream of cash flows leading to a net present value (NPV) of 0. Weighted Average Cost of Capital: The WACC (or cost of capital) is the average minimum required internal rate of return for both debt and equity providers of capital. Thus, an IRR that exceeds the WACC is an often-used criterion for deciding whether a project should be pursued. Which would have more of an impact on a DCF, the discount rate or sales growth rate? The discount rate and the sales growth rate will be sensitized in a proper DCF model, but the discount rate's impact would far exceed that of operational assumptions such as the sales growth rate.","cat":"dcf","diff":2,"src":"Redbook"},{"q":"How is the terminal value calculated?","a":"There are two common approaches to calculate the terminal value (\"TV\"): 1. Growth in Perpetuity Approach: Often called the Gordon Growth method, the growth in perpetuity approach calculates the terminal value by assuming a perpetual growth rate on cash flows after the explicit forecast period and then inserting this assumption into the static perpetuity formula. Terminal Value (TV) = FCFt+1 (r \u2013 g) 2. Exit Multiple Approach: The exit multiple approach calculates the terminal value by applying a multiple assumption on a financial metric (usually EBITDA) in the terminal year. The multiple reflects the multiple of a comparable company in a mature state.","cat":"dcf","diff":2,"src":"Redbook"},{"q":"Why is it necessary to discount the terminal value back to the present?","a":"Under both approaches, the terminal value represents the present value of the company\u2019s cash flows in the final year of the 1st stage of the explicit forecast period right before entering the perpetuity stage. The TV calculated is the present value of a growing perpetuity at the very end of the stage 1 projection of cash flows. Thus, this future value must be discounted back to its present value (PV) since the DCF is based on what a company is worth today, the current date of the valuation. For the perpetuity approach, how do you determine the long-term growth rate? The long-term growth rate is the rate that the company will grow into perpetuity. That being said, it should range somewhere between 1% to 3% (sometimes up to 5%). Often, GDP or the risk-free rate are proxies for g. This growth rate must reflect the steady-state period when growth has slowed down to a sustainable rate. A hypothetical question to ask would be: \"Can this company grow at X% for the next hundred years?\" If not, then the perpetuity growth rate should be adjusted downward to be more realistic.","cat":"dcf","diff":2,"src":"Redbook"},{"q":"What is the argument against using the exit multiple approach in a DCF?","a":"In theory, a DCF is an intrinsic, cash-flow based valuation method independent of the market. By using the exit multiple approach, relative valuation is being brought into the valuation. However, the exit multiple approach is widely used in practice due to being easier to discuss and defend in terms of justifying the assumptions used.","cat":"dcf","diff":2,"src":"Redbook"},{"q":"What is the purpose of using a mid-year convention in a DCF model?","a":"By using the mid-year convention, we are treating the projected cash flows as if they're generated at the midpoint of the given period. Without this mid-year adjustment, the DCF implicitly assumes that all cash flows are being received at the end of the year. This would be inaccurate since cash flows are generated steadily throughout the year, depending on the industry. The compromise is to use a mid-year convention that assumes the CFs are received in the middle of the year. Since the projected cash flows are received earlier, the implied valuation of the company would increase because of the earlier received cash flows. For example, if the cash flow you're discounting is Year 5 and the discount factor is 5, the mid-year convention would use a discount factor of 4.5 since we are assuming half a year has passed before the cash flow is generated.","cat":"dcf","diff":2,"src":"Redbook"},{"q":"Could you give me an example of when the mid-year convention might be inappropriate?","a":"While the mid-year convention in a DCF is standard practice, it may be inaccurate for highly seasonal companies. Many retail companies experience strong seasonal patterns in demand, and sales are disproportionally received in the 3rd and 4th quarters. This is particularly the case for retailers that have a niche in winter clothing. For example, the mid-year convention may be an inappropriate adjustment for Canada Goose, a Canadian company that focuses primarily on winter clothing. The unadjusted, period-end assumption may be more appropriate in this scenario.","cat":"dcf","diff":2,"src":"Redbook"},{"q":"How would raising additional debt impact a DCF analysis?","a":"The enterprise value based on an unlevered DCF should theoretically remain relatively unchanged since the DCF is capital structure neutral. But if the debt raised changed the capital structure weights substantially, the implied valuation could change. As the percentage of debt in the capital structure increases, the cost of debt increases from the higher default risk (which lowers the implied valuation). Imagine that two companies have the same total leverage ratio with identical free cash flows and profit margins. Do both companies have the same amount of default risk? If one company has significantly more cash on its balance sheet, it'll most likely be better positioned from a risk perspective. When assessing leverage risk, a company's excess cash should be considered since this cash could help paydown debt. Hence, many consider cash to be \u201cnegative debt\u201d (i.e., the implied assumption of net debt). Therefore, one of the main leverage ratios looked at in addition to Total Debt/EBITDA is Net Debt/EBITDA. All else being equal, the company with a higher excess cash balance and lower Net Debt/EBITDA would be at lower risk of bankruptcy (and lower cost of debt).","cat":"dcf","diff":2,"src":"Redbook"},{"q":"When would a DCF be an inappropriate valuation method?","a":"Practically, when you don't have access to financial statements, a credible DCF analysis valuation is difficult, and a comps analysis might be more realistic. So if you have a data point such as revenue or EBIT, a comps analysis is easier to implement. In addition, DCFs may be unfeasible when the company is not expected to generate positive cash flows for the foreseeable future. Here, much of the company\u2019s value is weighted towards the distant future, and the DCF becomes less credible.","cat":"dcf","diff":2,"src":"Redbook"},{"q":"Why is a DCF not used to value early stage startups?","a":"Although the DCF approach is based upon a company's future cash flows, this method can still be used on early-stage startups that are cash flow negative. The caveat being, there must be a path towards turning cash flow positive in the distant future. & Weaknesses The longer the explicit forecast period, the more uncertainty surrounding the implied valuation. DCFs become less reliable for early-stage startups that may not reach a sustainable, stable growth rate for 15+ years as it becomes very difficult to accurately predict the FCFs beyond this period. A DCF valuation is most credible when looking at mature companies with an established market position, as opposed to pre-revenue companies that have not yet determined their business model, go-to-market strategy, or target end-user. If 80% of a DCF valuation comes from the terminal value, what should be done? The explicit forecast period may not be long enough (should range from 5 to 10 years). In the final year in the explicit stage, the company should have reached normalized, stable growth. Alternatively, the terminal value assumptions may be too aggressive and not reflect stable growth.","cat":"dcf","diff":2,"src":"Redbook"},{"q":"How would you handle stock options when calculating a company\u2019s share count?","a":"The standard convention for stock options is to include in the dilutive share count any vested (exercisable) options whose strike price is below the current share price (\u201cin-the-money\u201d). In addition, any option proceeds the company received from the exercising of those options are assumed to be used by the company to repurchase shares at the current share price (the treasury stock method). But certain finance professionals use all outstanding in-the-money options (as opposed to just the vested inthe-money options) to perform the analysis. The logic being that any options that are still unvested will vest soon, and since they're in-the-money, it's more conservative to include them in the share count.","cat":"dcf","diff":2,"src":"Redbook"},{"q":"How would you handle convertible preferred stock in the share count?","a":"Convertible preferred stock is assumed to be converted into common stock to calculate diluted shares if the liquidation value (i.e., the preferred stock's conversion price) is lower than the current share price. For example, imagine a company whose current share price is $60 issued raised $500 million several years ago by issuing 10 million preferred shares, each granting the holder the right to collect either $50 per preferred share (its liquidation value) or to convert it to one share of common stock. Since the current share price is greater than the liquidation value, we would assume that the preferred stock is converted for calculating the diluted share count.","cat":"dcf","diff":2,"src":"Redbook"},{"q":"How would you handle convertible bonds in the share count?","a":"Convertible bonds are assumed to be converted into common stock if the conversion price of the bond is lower than the current share price. For example, imagine a company whose current share price is $60 issued raised $500 million several years ago by issuing a bond convertible into 10 million shares of common stock. Since the current share price is greater than the conversion price, we assume the bond is converted to calculate diluted shares. If conversion into common stock is assumed to calculate the share count, the convertible bonds should be eliminated from the balance sheet when calculating net debt to be consistent (and avoid double-counting).","cat":"dcf","diff":2,"src":"Redbook"},{"q":"How should operating leases be treated in a DCF valuation?","a":"They should be capitalized because leases usually burden the tenant with obligations and penalties that are far more similar to debt obligations than to a simple expense (i.e., tenants should present the lease obligation as a liability on their balance sheet as they do for long-term debt). In fact, the option to account for leases as an operating lease was eliminated starting in 2019 for that reason. Therefore, when operating leases are significant for a business (retailers and capital-intensive businesses), the rent expense should be ignored from the free cash flow build-up, and instead, the present value of the lease obligation should be reflected as part of net debt. For forecasting purposes, do you use the effective or marginal tax rate? The choice between whether to use the effective or marginal tax rate boils down to one specific assumption found in valuation methods such as the DCF: the tax rate assumption used will be the tax rate paid into perpetuity. In most cases, the effective tax rate will be lower than the marginal tax rate, mainly because many companies will defer paying the government. Hence, line items such as deferred tax assets (DTAs) and deferred tax liabilities (DTLs) are created. If you use the effective tax rate, you implicitly assume this deferral of taxes to be a recurring line item forever. But this would be inaccurate since DTAs and DTLs unwind, and the balance eventually becomes zero. The recommended approach is to look at the historical periods (i.e., past 3-5 years) and base your near-term tax rate assumptions on the effective tax rate. But by the time the 2nd stage of the DCF is approaching, the tax rate should be \u201cnormalized\u201d and be within close range of the marginal tax rate.","cat":"dcf","diff":2,"src":"Redbook"},{"q":"How does a lower tax rate impact the valuation from a DCF?","a":"1. Greater Free Cash Flows: A lower tax rate would result in more net income as fewer taxes have to be paid to the government, meaning more earnings retention and higher cash flow. 2. Higher Cost of Debt: A lower tax rate results in a higher after-tax cost of debt and a higher re-levered beta, all else being equal. If the tax rate is reduced, that would mean the after-tax cost of debt would rise, and the benefit from the tax-deductibility of interest (\u201ctax shield\u201d) would be reduced. 3. Higher Beta: A lower tax rate would result in a higher levered beta, which would cause the cost of equity and WACC to increase. While the last two implications suggest a lower valuation, the net impact on the company's valuation would be specific to the company's fundamentals, and one would have to flow through all the changes in a DCF model to see if the increased FCF offsets the increased WACC.","cat":"dcf","diff":2,"src":"Redbook"},{"q":"How does a dividend discount model (DDM) differ from a discounted cash flow model (DCF)?","a":"The dividend discount model (\"DDM\") stipulates that the value of a company is a function of the present value of all its future dividends paid out, whereas the discounted cash flow states a company is worth the sum of the present value of all the future free cash flows it generates. The DDM will forecast a company's future dividends based on a dividend per share (\"DPS\") and growth rate assumptions \u2013 which are then discounted using the cost of equity. For the terminal value calculation, an equity value based multiple will be used, most commonly P/E. Therefore, the DDM directly calculates the equity value and then equity value per share (similar to levered DCFs, but different from unlevered DCFs).","cat":"dcf","diff":2,"src":"Redbook"},{"q":"What are the major drawbacks of the dividend discount model (DDM)?","a":"Forward-looking valuation methods each have their shortcomings, and the DDM is no exception, given its sensitivity to assumptions such as the dividend payout ratio, dividend growth rate, and required rate of return. But some additional drawbacks that help explain why DDM is used less often include: The DDM cannot be used on high-growth companies as the denominator would turn negative since the growth rate would exceed the expected return rate. The DDM is more suitable for large, mature companies with a consistent track record of paying out dividends, but even then, it can be very challenging to forecast out the growth rate of dividends paid. Most companies don't pay out any dividends, especially as share buybacks have become common. The DDM neglects buybacks, an increasingly important source of returns for shareholders.","cat":"dcf","diff":2,"src":"Redbook"},{"q":"What is the purpose of using multiples in valuation?","a":"A valuation multiple is a financial ratio that reflects how valuable a particular company is in","cat":"dcf","diff":2,"src":"Redbook"},{"q":"How do you determine what the appropriate numerator is for a multiple?","a":"For multiples, the represented stakeholders in the numerator and denominator must match.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"When putting together a peer group for comps, what would some key considerations be?","a":"Operational Profile: These characteristics entail the nature of the business, such as its industry, business model, products/services sold, and end markets served. In addition, the company\u2019s position within the market (market leader or market challenger), stage in the life cycle, and seasonality/cyclicality should all be considered. The importance of selecting the right peer group for a comps-derived valuation cannot be overstated, and this begins with understanding the target's operational characteristics. Financial Profile: If the company might be a suitable inclusion to the peer group based on its operational characteristics, its financial profile would then be considered. Some metrics to gather would be the company's key cash flow metrics, size in terms of valuation, profitability margins, credit ratios, historical/estimated growth rates, and return metrics. Operational Profile Financial Profile Industry/Sector Size (Enterprise Value, Equity Value) Product and Service Offerings Margin Profile (Gross Margin, Operating Margin, EBITDA Margin) End Markets and Customers Type Historical and Forecasted Growth Rates (Revenue, Distribution Channels Credit Profile (Leverage Ratios, Coverage Ratios) Cyclicality or Seasonality Return Metrics (ROIC, ROA, ROE)","cat":"valuation","diff":2,"src":"Redbook"},{"q":"What are the primary advantages of the trading comps approach?","a":"Public Filings: Trading comps involves public companies, making data collection far more convenient since all their reports and filings are easily accessible online. Less Data Required: Implementation is a key advantage of trading comps, as proper DCFs cannot be built without detailed financials and supplementary data. But to get a decent trading comps-based valuation, only a few data points (e.g., EBITDA, revenue, net income) are required, making it easier to value companies when access to data sets is limited. Current Valuations: Trading comps reflect up-to-date, current valuations based on investor sentiment as of the present day, since it's based on the latest prices paid in the public markets.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"Why is transaction comps analysis often more challenging than trading comps?","a":"Performing comparable acquisition analysis can be challenging when there has been limited (or no) M&A activity within the relevant space, or the comparable transactions were completed a long time ago in a completely different economic environment. Data from those prices paid might not reflect current market trends and investor sentiment. The transaction dates place a significant constraint on the pool of comparable transactions. Generally, only relatively recent transactions (within the last five years) offer insight into industry valuations. & Weaknesses The transaction context must also be looked at, such as the form of consideration, the type of buyer (financial or strategic), and the deal's circumstances, which can significantly influence the final purchase price. However, this information about the deal can be challenging to compile, especially when they involve private companies, as they're not required to disclose all this deal-related information. Most times, even the purchase price paid for a company may not even be announced \u2013 thus, the data found is \u201cspotty\u201d and less straight-forward than trading comps.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"Should two identical companies with different leverage ratios trade at different P/E multiples?","a":"P/E multiples can vary significantly due to leverage differences for otherwise identical companies. All else being equal, as a company borrows debt, the EPS (denominator) will decline due to higher interest expense. The impact on the share price, on the other hand, is hard to predict and depends on how the debt is used:","cat":"valuation","diff":2,"src":"Redbook"},{"q":"What are some common enterprise and equity value multiples?","a":"Enterprise Value Multiples: EV/Revenue, EV/EBIT, EV/EBITDA Equity Value Multiples: Price/Earnings (P/E), Price/Book (P/B), Price/Levered Cash Flows","cat":"valuation","diff":2,"src":"Redbook"},{"q":"Why would it be incorrect to use enterprise value and net income in a multiple?","a":"There would be a mismatch between the represented investor groups in the numerator and denominator. Enterprise value represents the value of the operations to all stakeholders in a company, meaning the cash flows belonging to both lenders and equity providers of capital. Net income, however, represents the residual value that flows just to equity shareholders.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"Why might one company trade at a higher multiple than another?","a":"One company may be valued at a higher multiple than another because of superior fundamentals such as better growth prospects, higher return on invested capital, lower cost of capital (WACC), and more robust cash flow generation. Investors are forward-looking. Therefore, companies with better growth trajectories and signs of being well managed with efficient capital allocation are rewarded with higher valuations. Intuitively, what does the P/E ratio mean? The price-to-earnings ratio (P/E) is one of the most widely used metrics by investors to determine a company's relative value against the industry average and its peers. This can then help determine whether the company is undervalued, fairly valued, or overvalued. The P/E ratio answers: \"How much is the market willing to pay for a dollar of this company\u2019s earnings?\" PE Ratio = Current Share Price EPS PE Ratio = Market Capitalization Net Income A company is currently trading at 12.5x EBITDA, is it overvalued? The answer depends on the company's industry being valued and how its valuation fares compared to the rest of its peer group. For instance, a software company trading at 12.5x would be near the sector median, whereas a double-digit multiple in an industry such as Oil & Gas is rare. We recommend researching various industries and identifying those that consistently receive higher valuations on average (e.g., software, healthcare) and which ones don't \u2013 and then figure out the reason. The differences can often be related to cyclical trends that are impacting an industry. For example, sub-industries related to cloud computing, cybersecurity, remote healthcare, gaming, and video streaming services have seen significant valuation increases since the beginning of the pandemic.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"When would the use of the PEG ratio be appropriate?","a":"The PEG ratio is used to standardize the P/E ratio and enable comparisons among companies with different expected long-term growth rates (g). As a broad rule of thumb, a stock is fairly valued when the PEG ratio is 1, undervalued when the PEG ratio is below 1, and overvalued when above 1. PEG Ratio = P (E ) g There are two approaches for the growth rate used: 1. Trailing PEG: In the first option, the growth rate can be based on a company's historical growth. For example, the LTM growth rate could be used, or the annualized growth rate over the past 3-5 years. 2. Forward PEG: The other, more commonly used option calculates the growth rate from a 1-3 year projection based on consensus estimates or an annualized version of those growth rates.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"When would you value a business using the P/B ratio?","a":"The P/B ratio can be used when the company's book value captures a substantial part of its real value. An example would be commercial banks, as most of their assets and liabilities are frequently re-valued and similar to their actual market values.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"When should you value a company using a revenue multiple vs. EBITDA?","a":"Companies with negative profits and EBITDA will have meaningless EBITDA multiples. As a result, multiples based on revenue are the only available option to gain some level of insight.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"How would you value a pre-revenue early stage internet company?","a":"An internet company with no revenue or negative profitability could be valued using user engagement metrics such as the subscriber count, monthly active users, daily active users, and website hits. For example, prerevenue internet startups are often valued using multiples such as EV/DAU or EV/MAU.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"Why is calendarization a required step when performing comps analysis?","a":"Calendarization involves aligning the fiscal year ending dates of a group of comparable companies to allow for a more accurate comparison. The general convention is to adjust the financials so that all the fiscal years end in December. The reason calendarization is necessary is that cyclicality and seasonality can skew results and create discrepancies when making comparisons.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"Can you define M&A and explain the difference between a merger and an acquisition?","a":"Mergers and acquisitions (M&A) is an umbrella term that refers to the combination of two businesses. To buyers, M&A serves as an alternative to organic growth, whereas for sellers, M&A provides an opportunity to cash out or share in the newly formed entity's risk/reward. The two terms are often used interchangeably but have some minor differences: Merger: A merger suggests the combination of two similarly sized companies (i.e., \"merger of equals\"), where the form of consideration is at least partially with stock, so shareholders from both entities remain.","cat":"valuation","diff":2,"src":"Redbook"},{"q":"What are some potential reasons that a company might acquire another company?","a":"Value Creation from Revenue and Cost Synergies Ownership of Technology Assets (IP, Patents, Proprietary Technology) Talent Acquisitions (New Skilled Employees) Expansion in Geographic Reach or into New Product/Service Markets Diversification in Revenue Sources (Less Risk, Lower Cost of Capital) Reduce Time to Market with New Product Launches Increased Number of Channels to Sell Products/Services Market Leadership and Decreased Competition (if Horizontal Integration) Achieve Supply Chain Efficiencies (if Vertical Integration) Tax Benefits (if Target has NOLs)","cat":"ma","diff":1,"src":"Redbook"},{"q":"What are the differences among vertical, horizontal, and conglomerate mergers?","a":"Vertical Merger: A vertical merger involves two or more companies that serve different value chain functions. From the increased control over the supply chain, the combined entity should theoretically eliminate inefficiencies. Horizontal Merger: A horizontal merger comprises a merger amongst companies directly competing in the same (or very similar) market. Thus, following a horizontal merger, competition in the market decreases (e.g., Sprint & T-Mobile merger). Notable benefits that stem from a horizontal merger are the increased geographical coverage to sell products/services and an increase in pricing power. Conglomerate: A conglomerate refers to the combination of multiple business entities operating in unrelated industries for diversification purposes \u2013 an example would be Berkshire Hathaway. In terms of vertical integration, what is the difference between forward and backward integration? Backward Integration: When an acquirer moves upstream, it means they're purchasing suppliers or manufacturers of the product the company sells \u2013 this is known as backward integration. Forward Integration: When an acquirer moves downstream, it means they're purchasing a company that moves them closer to the end customer such as a distributor or technical support \u2013 this is known as forward integration.","cat":"ma","diff":1,"src":"Redbook"},{"q":"What are synergies and why are they important in a deal?","a":"Synergies are the expected cost savings or incremental revenues arising from an acquisition. They're important because if an acquirer believes synergies can be realized, a higher premium would be paid. 1. Revenue Synergies: Cross-selling, upselling, product bundling, new distribution channels, geographic expansion, access to new end markets, reduced competition leads to more pricing power 2. Cost Synergies: Eliminate overlapping workforces (reduce headcount), closure or consolidation of redundant facilities, streamlined processes, purchasing power over suppliers, tax savings (NOLs)","cat":"ma","diff":1,"src":"Redbook"},{"q":"Why should companies acquired by strategic acquirers expect to fetch higher premiums than those selling to private equity buyers?","a":"Strategic buyers can often benefit from synergies, which enables them to offer a higher price. However, the recent trend of financial buyers making add-on acquisitions has enabled them to fare better in auctions and place higher bids since the platform company can benefit from synergies similar to a strategic buyer.","cat":"ma","diff":1,"src":"Redbook"},{"q":"What are some of the most common reasons that M&A deals fail to create value?","a":"Overpaying/Overestimating Synergies: Nearly all M&A deals involve a premium in the purchase price. Even if the deal results in positive results, it might not be enough to justify the premium. Overpaying for an asset goes hand-in-hand with overestimating synergies. Synergies are challenging to achieve in practice and should be estimated conservatively, but doing so would result in missing out on acquisition opportunities and being out-bid. An acquirer often has to accept that the expected synergies used to justify the premium paid may not be met for the sake of completing the deal. Inadequate Due Diligence: An acquirer will often fail to perform sufficient diligence before acquiring a company. The decision may have been made while overly-focused on the target's positives and the potential post-integration benefits while neglecting the risks. A competitive auction with a short timeline can lead to this type of poor judgment, in which the other buyers become a distraction. Lack of Strategic Plan: For an M&A deal, when an acquirer becomes fixated on pursuing more resources and achieving greater scale without an actual strategy, this can lead to synergies not being realized despite an abundance of resources on-hand and potential growth opportunities. Poor Execution/Integration: Post-closing, the acquirer's management team may exhibit poor leadership and an inability to integrate the new acquisition. This poor integration can lead to diminished employee morale, cultural mismatches, and a noticeable drop in product/service quality. Of all the reasons M&A deals can fail, cultural compatibility can be the trickiest risk to assess. Studies have repeatedly shown a high percentage of deals destroy shareholder value. If that's the case, why do companies still engage in M&A? Many studies have concluded that most M&A deals destroy shareholder value. Yet, M&A is often a many companies continue to pursue growth through M&A. defensive response to structural sector One reason companies choose to engage in M&A is that many deals are done out of necessity, meaning they were defensive measures taken to protect their market share disruption that presents a threat to or to maintain competitive parity. Once a company owns a sizeable percentage of a an existing business market, its focus shifts towards protecting its existing market share as opposed to model. growth and stealing more market share (i.e., the company is now the target incumbent to steal market share from). Therefore, the company must always be on the look-out for developing trends or companies that could someday become a threat, which is closely related to technological adaptation and staying innovative as industries continuously develop. M&A is a method for companies to fend off outside threats and gain new technological capabilities.","cat":"ma","diff":1,"src":"Redbook"},{"q":"What are the typical components found in a letter of intent (LOI)?","a":"Once a buyer has proceeded with the next steps in making a potential acquisition, the next step is to provide the seller with a formal letter of intent (\"LOI\"). An LOI is a letter stating the proposed initial terms, including the purchase price, the form of consideration, and planned financing sources. Usually non-binding, an LOI represents what a definitive agreement could look like, but there's still room for negotiation and revisions to be made in submitted LOIs (i.e., this is not a final document).","cat":"ma","diff":1,"src":"Redbook"},{"q":"What are the two most common ways that hostile takeovers are pursued?","a":"1. Tender Offer: In a tender offer, the acquirer will publicly announce an offer to purchase shares from existing shareholders for a premium. The intent is to acquire enough voting shares to have a controlling stake in the target's equity that enables them to push the deal through. 2. Proxy Fight: Alternatively, a proxy fight involves a hostile acquirer attempting to persuade existing shareholders to vote out the existing management team to take over the company. Convincing existing shareholders to turn against the existing management team and board of directors to initiate a proxy fight is the hostile acquirer's objective, as the acquirer needs these shareholders' votes, which it does by trying to convince the company is being mismanaged.","cat":"ma","diff":1,"src":"Redbook"},{"q":"What is a reverse merger and what benefits does it provide?","a":"A reverse merger is when a privately held company undergoes a merger with another company that's already publicly traded in the markets. The public company can either be an operating company or be an empty corporate shell. The benefit of reverse mergers is that the public entity can now issue shares without incurring the costs associated with IPOs.","cat":"ma","diff":1,"src":"Redbook"},{"q":"What is an S-4 filing and when does it have to be filed?","a":"An S-4 is a required form that must be filed with the SEC prior to a merger and acquisition activity taking place. Contained in the S-4 will be material information related to the transaction, such as the deal rationale, negotiated terms, risk factors, pro forma financials, and other related material.","cat":"ma","diff":1,"src":"Redbook"},{"q":"What is a holdback in M&A?","a":"To help mitigate transaction risks, a holdback mechanism can require a portion of the purchase price of an acquisition to be placed in escrow to protect the interests of the buyer post-closing until the terms of the agreement have been satisfied. This provision can be used to ensure the seller follows through on all agreedupon conditions outlined in the deal agreement and minimize the risk of monetary loss for the buyer. These funds would be held in escrow and can be released to the buyer if the seller violates the terms.","cat":"ma","diff":1,"src":"Redbook"},{"q":"What type of material is found in an M&A pitchbook?","a":"A pitchbook is a marketing document used by investment banks to pitch potential clients to hire them for a particular transaction. The pitchbook will differ by each investment bank, but the general M&A transaction pitchbook will include: 1. 2. 3. 4. 5. 6. 7. Introduction of the Investment Bank and Dedicated Team Members Situational Overview of the Deal and Client Company Prevailing Market and Industry Trends Implied Valuation Range and Combined M&A Model Proposed Deal Strategy Outline and Key Considerations Credentials and Tombstones of Relevant Industry Experience Appendix (DCF Model, Trading Comps, Transaction Comps)","cat":"ma","diff":1,"src":"Redbook"},{"q":"What are two ways to determine the accretive/dilutive impact to EPS?","a":"1. Bottom-Up Analysis: When the post-transaction EPS calculation is done as a bottom-up analysis, this involves starting from the buyer\u2019s and seller\u2019s standalone EPS and adjusting to reflect the incremental interest expense, additional acquirer shares that must be issued, synergies, and incremental depreciation and amortization due to asset write-ups. 2. Top-Down Analysis: Alternatively, the accretion/dilution analysis can be done top-down, whereby the two income statements are combined, starting with revenue and then moving down to expenses while making the deal-related adjustments.","cat":"ma","diff":3,"src":"Redbook"},{"q":"What does accretion/dilution analysis tell you about the attractiveness of a transaction?","a":"An accretive deal doesn't necessarily indicate value creation for the acquirer (and vice versa for dilutive deals).","cat":"ma","diff":3,"src":"Redbook"},{"q":"What does it mean when a transaction is done on a \u201ccash-free, debt-free\u201d basis?","a":"Nearly all M&A deals are negotiated on a \u201ccash-free, debt-free\u201d basis. A transaction done on a CFDF basis implicitly assumes the seller will pay off all the debt outstanding and extract all the excess cash before the new buyer completes the transaction. Excess cash in this context is defined as the cash remaining after the debt has been paid down and above its minimum cash balance. Since the acquirer doesn't have to assume the debt on the seller\u2019s balance sheet or get to use its cash, the acquirer is just paying the seller for the company's enterprise value.","cat":"ma","diff":3,"src":"Redbook"},{"q":"Is it better to finance a deal via debt or stock?","a":"Buyer\u2019s Perspective: When the buyer\u2019s P/E ratio is significantly higher than the target\u2019s, a stock transaction will be accretive, which is an important consideration for buyers and may tilt the decision towards stock. When considering debt, the buyer\u2019s access to debt financing and the cost of debt will influence the buyer\u2019s willingness to finance a Deal transaction with debt. The buyer will also analyze the deal\u2019s impact on its capital Consideration structure, credit rating implications, and credit statistics. Seller\u2019s Perspective: Most sellers will prefer cash (i.e., debt financing) over a stock sale unless tax deferment is a priority for the seller. A stock sale is usually most palatable to the seller in a transaction that more closely resembles a merger of equals and when the buyer is a public company, where its stock is viewed as a relatively stable form of consideration.","cat":"ma","diff":3,"src":"Redbook"},{"q":"What does purchase consideration refer to in M&A?","a":"The purchase consideration in an M&A deal represents the acquirer's proposed payment method to the target\u2019s shareholders. The purchase consideration can be categorized as cash, stock, or a combination. The tax consequences represent decisive factors that shareholders consider when assessing an offer: An acquisition paid all-cash has an immediate tax consequence, as a taxable event has been triggered. In contrast, if the purchase method made was all-equity (i.e., exchange of shares in the newly merged company), this would not trigger any taxes. Shareholders\u2019 perception of the post-M&A company and its future can also impact their decision:","cat":"ma","diff":3,"src":"Redbook"},{"q":"What is an exchange ratio and what are the two main types?","a":"For partial or all-stock deals, the purchase offer can be structured as either a fixed or floating exchange ratio. 1. Fixed Exchange Ratio: A fixed exchange ratio clearly defines the number of shares of the acquirer\u2019s stock to be exchanged for one share of the target. The number of shares to be required by the target\u2019s shareholders is constant, as well as their ownership percentage in the new entity, regardless of the share price movement once the definitive agreement between the two parties is signed and executed. The target\u2019s shareholders bear the risk that the share price could decline post-closing, with no provision in place to protect them in the event this were to occur. 2. Floating Exchange Ratio: A floating exchange ratio sets a specific amount per share the acquirer has agreed to pay for each share of the target\u2019s stock in the form of the acquirer\u2019s shares. Therefore, the target's shareholders have downside protection if the share price falls post-closing.","cat":"ma","diff":3,"src":"Redbook"},{"q":"Why might some shareholders prefer cash compensation rather than stock?","a":"Certain types of shareholders might prefer cash rather than stock as the purchase consideration because cash is tangible, and the value received post-closing is guaranteed. These types of shareholders are more risk-averse and may not view the prospects of the combined company positively. Other shareholders may prefer compensation in stock to take part in the combined entity's upside potential and to delay paying taxes.","cat":"ma","diff":3,"src":"Redbook"},{"q":"Would you expect an all-cash or all-stock deal to result in a higher valuation?","a":"In most cases, an all-stock deal will result in a lower valuation than an all-cash deal since the target's shareholders get to participate in the potential upside of owning equity in the new entity.","cat":"ma","diff":3,"src":"Redbook"},{"q":"How do you calculate the offer value in an M&A deal?","a":"The offer price per share refers to the purchase price to acquire the seller's equity on a per-share basis. Thus, the calculation of offer value involves multiplying the fully diluted shares outstanding (including options and convertible securities) times the offer price per share. Offer Value = Fully Diluted Shares Outstanding \u00d7 Offer Price Per Share","cat":"ma","diff":3,"src":"Redbook"},{"q":"How do you calculate the transaction value?","a":"Transaction value in the M&A context refers to the target\u2019s implied enterprise value given the offer value. The transaction value equals the target offer value plus the target\u2019s net debt. Transaction Value = Target Offer Value + Net Debt","cat":"ma","diff":3,"src":"Redbook"},{"q":"What are the most common balance sheet adjustments in an M&A model?","a":"In an M&A analysis, certain line items on the acquirer and target's balance sheet can simply be lumped together. However, others need to be adjusted to reflect deal-related accounting and funding adjustments. On the Accounting Side Goodwill: Eliminate the existing, pre-deal target goodwill and create new goodwill from the new deal. PP&E and Intangible Assets: Write up assets to fair market value (FMV). Deferred Tax Liabilities (DTLs): Create new deferred tax liabilities in a stock sale. Target Equity: Eliminate target equity from the consolidation. On the Funding Side Debt: Create new acquirer debt (if the deal was partially funded with debt) and eliminate Target debt (Target debt is often refinanced and reflected in the new acquirer debt financing, although in rare cases, it can carry over). Equity: Increase the existing value of acquirer equity by the value of new acquirer equity issued. Cash: Reduce cash by the excess cash used to fund the deal and pay transaction and financing fees with a corresponding reduction to equity (the transaction fees) and to new debt (the financing fees).","cat":"ma","diff":3,"src":"Redbook"},{"q":"What are the most common income statement adjustments in an M&A model?","a":"In an acquisition, the acquirer and target income statements are consolidated. But before doing so, certain line items must be adjusted as part of purchase accounting. Income Statement Adjustments Revenue: Increase consolidated revenue by any revenue synergies. Income Operating Expenses: Reduce consolidated expenses by any expected cost synergies. Statement Deal Incremental D&A: Asset write-ups often result in more non-cash D&A. Thus, Adjustments incremental D&A expenses from write-ups need to be added to consolidated D&A. Other Expenses: Transaction fees are expensed on the income statement. Interest Expense: Acquirer interest expense is adjusted up when debt financing is used to fund the deal. Target interest expense is eliminated when target debt is refinanced. Financing Fees: Financing fees related to raising debt are amortized over the term of the debt, and the non-cash expense is recognized within interest expense. Interest Income: Reduce interest income by the impact of excess cash used to fund the deal. Taxes: All the adjustments above need to be tax-affected at the acquirer\u2019s tax rate. Pro Forma EPS: Use the acquirer\u2019s pre-deal share count and then add the number of acquirer shares issued in the transaction.","cat":"ma","diff":3,"src":"Redbook"},{"q":"What does a goodwill impairment tell you about a deal?","a":"Companies are required to estimate the value of their past acquisitions periodically. A goodwill impairment occurs when the acquiring company determines the current value is lower than the original price paid for the target company. For example, suppose an acquirer that paid $100 million for a business with $40 million in goodwill now estimates the acquired business's value to be $70 million. Here, the acquirer must recognize a $30 million goodwill impairment via retained earnings, bringing the goodwill balance down to $10 million. Goodwill & Acquisition Accounting Which balance sheet items are often adjusted to fair market value in a transaction? Property, plant, and equipment (PP&E) and intangible assets are often carried at book values significantly below market values. As a result, these two assets are written-up the most in a transaction. Who determines the value of fair market write-ups in a transaction? Independent appraisers, accountants, and other valuation firms can help determine the write-up amounts.","cat":"ma","diff":3,"src":"Redbook"},{"q":"What is the purpose of a fairness opinion in the M&A context?","a":"A fairness opinion is a document provided by the seller\u2019s investment banker to the seller\u2019s board of directors attesting to the fairness of a transaction from a 3rd party perspective. The purpose of the fairness opinion is to provide the selling shareholders with an unbiased evaluation of the deal.","cat":"ma","diff":3,"src":"Redbook"},{"q":"Would an acquirer prefer $100 in revenue synergies or $100 in cost synergies?","a":"An acquirer would prefer $100 in cost synergies because all those cost savings (after accounting for tax) flow through to the bottom line, while revenue synergies have associated costs that reduce the bottom-line benefit. For example, $100 in revenue synergies for a company with 40% pre-tax profit margins and a 25% tax rate would see $100 x 40% x (1 - 25%) = $30 flow to the bottom line, while the same company with $100 in cost synergies would see $100 x (1 - 25%) = $75 flow to the bottom line.","cat":"ma","diff":3,"src":"Redbook"},{"q":"Are acquirers more likely to achieve revenue synergy or cost synergy expectations?","a":"While both revenue and cost synergy expectations are often not fully achieved post transaction, revenue synergy assumptions are less accurate than cost synergy assumptions. This is because cost synergies can point towards specific cost-cutting initiatives such as laying off workers and shutting down facilities. In contrast, revenue synergies are driven by higher-level, more uncertain assumptions around cross-selling, new product launches, and other growth initiatives. For investment bankers, why is a sell-side process typically shorter than a buy-side assignment? As a practical matter, once the owner of a company proceeds with a potential sale, it'll usually be easy to find a group of buyers. So when working on behalf of the seller, the likelihood of completing a transaction is higher. On the other hand, many companies regularly engage in market research and \u201cdipping their toe in the water\u201d type explorations of potential acquisition candidates. Thus, when working on behalf of a buyer, these engagements can drag on for months and often end in no transaction. an M&A Advisor","cat":"ma","diff":3,"src":"Redbook"},{"q":"What are some standard income statement adjustments related to a transaction?","a":"M&A Income Statement Adjustments Expected Synergies Capitalized Financing Fees Incremental Depreciation & Amortization Additional Interest Expense Loss of Interest Income","cat":"ma","diff":3,"src":"Redbook"},{"q":"What causes incremental D&A to be recorded in M&A deals?","a":"Incremental D&A is created due to asset write-ups. The assets of the target, most often PP&E and intangible assets, are written-up to their fair value in a deal if appropriate. The increase in D&A will reduce pro forma net income and pro forma EPS.","cat":"ma","diff":3,"src":"Redbook"},{"q":"What is the impact of target NOLs in M&A?","a":"Depending on the deal structure, target NOLs are assumed by the acquirer, although their use by the acquirer is capped at an annual limit that's a function of the purchase price x the long-term tax-exempt rate. Alternatively, target NOLs can be used to offset the seller\u2019s gain on sale, which since the 2017 tax reform act, has been capped at 80% of the target\u2019s taxable income.","cat":"ma","diff":3,"src":"Redbook"},{"q":"Why are deferred tax liabilities (DTLs) created in transactions?","a":"Deferred tax liabilities (DTLs) are created because of deal-related asset write-ups. Specifically, when a company is acquired, its assets' book basis often gets written up to fair market value.","cat":"ma","diff":3,"src":"Redbook"},{"q":"What happens to a target\u2019s existing NOLs in transactions?","a":"The treatment of existing target NOLs depends on the structure of the deal: Asset Sales: NOLs can be used up by the target to offset any gain on sale on the corporate level. The acquirer doesn't get any remaining unused NOLs as they're permanently lost. Stock Sales: NOLs can be used by the acquirer in the future but are subject to an annual \u201cIRC 382 limitation,\u201d which limits the annual carryforward to a regularly published \u201clong term tax-exempt rate\u201d times the equity purchase price. An M&A deal has an adjustment for a deferred revenue write-down. Why would this occur? A deferred revenue write-down adjustment is often seen in software M&A deals (e.g., Adobe's acquisition of Marketo-Magento), as revenue is typically under long-term subscription contracts. The value of the deferred revenue might get revalued (and reduced) to its fair value before the transaction closes, leading to a writedown if it's determined the amount recognized is less than what was originally on the books. There could various causes, such as collectability not being reasonably assured, terminated/breached contracts, or changes in customer contract terms (e.g., upgrades, maintenance, support) that all require reestimating the remaining performance obligation, the costs required to fulfill the performance obligations, and the appropriate profit margin associated with fulfilling the performance obligation.","cat":"ma","diff":3,"src":"Redbook"},{"q":"How are seller notes in M&A modeled?","a":"Seller notes (or seller financing) are modeled the same way as any other debt instrument. Therefore, it'll show up in the Sources & Uses schedule as a source of funds since these notes helped finance the deal. In most cases, seller notes will come in the form of subordinated debt with a high, fixed interest rate given its position in the capital structure. But often, the option for PIK interest or conversion feature will be attached.","cat":"ma","diff":3,"src":"Redbook"},{"q":"What is the purpose of the working capital peg negotiation in M&A?","a":"The working capital peg is the negotiated sufficient level of net working capital required post-closing of a transaction and should represent the normalized NWC requirements to operate the business on an ongoing basis. From the perspective of the buyer, the purpose of setting this target is to prevent the seller from taking cash beyond NWC requirements. Therefore, a working capital peg ensures the business can continue operating with no more capital required upon closing.","cat":"ma","diff":3,"src":"Redbook"},{"q":"What is a leveraged buyout (LBO)?","a":"In a leveraged buyout, a private equity firm (often called the financial sponsor) acquires a company with most of the purchase price being funded through the use of various debt instruments such as loans, bonds. The financial sponsor will secure the financing package ahead of the closing of the transaction and then contribute the remaining amount. Once the sponsors gain majority control of the company, they get to work on streamlining the business \u2013 which usually means operational improvements, restructuring, and asset sales intending to make the company more efficient at generating cash flow so that the large debt burden can be quickly paid down. The investment horizon for sponsors is 5-7 years, at which point the firm hopes to exit by either: Selling the company to another private equity firm or strategic acquirer Taking the company public via an initial public offering (IPO) Financial sponsors usually target returns of ~20-25% when considering an investment.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What is the intuition underlying the usage of debt in an LBO?","a":"The typical transaction structure in an LBO is financed using a high percentage of borrowed funds, with a relatively small equity contribution from the financial sponsor. As the debt principal is paid down throughout the holding period, the sponsor will realize greater returns at exit. Therefore, private equity firms attempt to maximize the amount of leverage while keeping the debt level manageable to avoid bankruptcy risk. The less equity the sponsor has to contribute, the higher the returns to the fund \u2013 all else being equal. The logic behind why it's beneficial for sponsors to contribute minimal equity is due to debt having a lower cost of capital than equity. One reason the cost of debt is lower is that debt is higher on the capital structure \u2013 as well as the interest expense being tax-deductible, which creates a \u201ctax shield.\u201d Thus, the increased leverage enables the firm to reach its returns threshold easier.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What are the main levers in an LBO that drive returns?","a":"1. Debt Paydown (Deleveraging): Through deleveraging, the value of the private The equity value of equity firm's equity grows over time as more debt principal is paid down using an investment is the the acquired company's free cash flows. residual value once 2. EBITDA Growth: Growth in EBITDA can be achieved by making operational non-equity claims improvements to the business\u2019s margin profile (e.g., cost-cutting, raising prices), have been paid off; implementing new growth strategies, and making accretive add-on acquisitions. thus, the importance 3. Multiple Expansion: In the ideal scenario, the financial sponsor hopes to exit an of deleveraging in investment at a higher multiple than entry. The exit multiple can increase from LBO value creation. improved investor sentiment, better economic conditions, increased scale or diversification, and favorable transaction dynamics (e.g., competitive auction led by strategics).","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What attributes make a business an ideal LBO candidate?","a":"Strong Free Cash Flow Generation: The ideal LBO candidate must have predictable, FCF generation with high margins given the amount of debt that would be put on the business. To make the interest payments and debt paydown, consistent FCF generation year-after-year is essential and should be reflected in the target's historical performance. Recurring Revenue: Revenue with a recurring component implies there's less risk Characteristics associated with the cash flows of the company. Examples of factors that make revenue more recurring include long-term customer contracts and selling high-value products or services required by customers, meaning the product/service is necessary for business continuity (as opposed to being a discretionary, non-essential spend). \"Economic Moat\": When a company has a \"moat,\" it has a differentiating factor that enables a sustainable competitive advantage, which leads to market share and profit protection from outside threats. This effectively creates a barrier against competition. Examples of deterrents include branding, patents, proprietary technology, economies of scale, network effects, and switching costs. Favorable Unit Economics: High margins are a byproduct of good unit economics, a well-managed cost structure, low capital expenditures, and minimal working capital requirements. These factors all lead to more FCFs being available to make interest payments, paydown debt principal (required and optional), and re-invest more into operations of the business. In addition, when a company's unit economics is consistently better than the rest of the market, this is oftentimes an indication of a competitive advantage. Strong, Committed Management Team: Qualified management teams will have a proven track record, which can be proxied by the number of years working with one another and their past achievements. The importance of the management team cannot be overstated, as they're the ones executing the strategic plan. Undervalued (Low Purchase Multiple): While finding undervalued companies has become increasingly difficult as more capital has flooded the private capital markets, many private equity firms pursue opportunistic buyouts where the company can be acquired for a lower price due to external factors. For example, an industry may have fallen out of favor temporarily or come under pressure due to macro or industry-related trends, which could allow a firm to complete the purchase at a discount. Since a lower entry multiple was paid, the opportunity for value creation through exiting at a higher multiple (i.e., multiple expansion) is greater while the risk of having overpaid is reduced. Value-Add Opportunities: For traditional LBO firms, the ideal target will be very well-run, but there should be some areas of inefficiencies that can be improved upon. These represent opportunities for value creation such as selling non-core business assets, taking cost-cutting measures, and implementing more effective sales & marketing strategies.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What types of industries attract more deal flow from financial buyers?","a":"Non-Cyclical/Low-Growth: Industries with stagnant to low growth tend to attract higher amounts of interest from private equity investors, as many companies will turn to inorganic growth once organic growth opportunities seem to have diminished. In an effort to continue growing and increase margins, companies will turn to M&A and start acquiring smaller companies. Therefore, these strategics represent potential buyers, which means there'll be a viable exit plan from the perspective of a private equity firm. Usually, these industries are non-cyclical and mature with minimal disruption risk, making them the ideal industry for private equity firms that specialize in add-ons (i.e., \u201cbuy-and-build\u201d) and pursue fragmented markets where the consolidation strategy is more viable. Subscription-Based/Contractual: Industries with business models based around long-term customer contracts are viewed favorably by private equity firms, especially if the business model is based around subscription models, as these companies are known for having recurring, stable revenue from reliable commercial customers. B2B enterprise software companies are valued at such high multiples consistently and sought after by private equity firms for this very reason. High R&D Requirements: Industries involving technical products will usually have a lot of deal flow because incumbents will prefer to acquire companies with proven technologies rather than building them in-house, which would require significant amounts of time and resources. For that reason, many private equity firms will pursue smaller niche players and grow them, knowing there will be strategic buyers later on interested in acquiring the company for their technology. These companies will often have significant pricing power and an established niche, making them ideal targets for PE investors. Potential Synergies: Certain industries will have more opportunities for synergies to be realized. This can come in the form of revenue synergies such as upselling, cross-selling, and product bundling, as well as in the form of cost synergies, such as benefiting from economies of scale and reducing redundant costs. For example, industrial technology and software is known for being two of the best industries for upselling and cross-selling to existing customers, while healthcare services such as dental clinics and psychiatry treatment centers are known for having inefficient cost-structures that can benefit significantly from cost synergies through increased scale, operational improvements, and streamlining processes. Favorable Industry Trends: The potential investment should be well-positioned to benefit from ongoing industry tailwinds. This means that incremental improvements are going on in the industry that could be potential add-ons that provide more value to their customers, as opposed to industry-disrupting developments that would create the need for significant investments to adjust to the changing landscape.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What would be the ideal type of products/services of a potential LBO target?","a":"The quality of a Mission-Critical: The ideal product or service should be essential to the end company's revenue markets being served and the discontinuance of the product or service's usage is determined by its should be detrimental to business continuity. In other words, the customer predictability, should be unable to function without this product/service due to how deeply defensibility, and embedded it has become in its operations. certainty of being Recurring/Contract-Based: Revenue from long-term, contractual-agreements recurring. is highly regarded by private equity investors. For instance, enterprise software companies are known for having predictable revenue due to their subscription-based business models and long-term contracts with commercial customers. High-Switching Costs: The decision to switch to another provider should come with high switching costs that make customers reluctant to move to a competitor. This would mean the costs should outweigh the benefits of moving to a lower-cost provider. High-Tech: The more technical the product, the higher the barrier to entry and more pricing power over its end markets due to the lack of competition. In effect, this leads to more stable, low-risk cash flows, with the optionality to increase prices if necessary. The proxy for finding companies selling technical products is high R&D expenditures, patents/IP, and industry reputation. Location-Based Competition: Certain private equity firms will pursue companies where competition is location-specific. This is more prevalent for service-oriented industries such as landscaping and commercial cleaning. The primary benefit is that these are fragmented markets with less competition and often involve long-term, contract-based customer relationships.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What is the relationship between debt and purchase price?","a":"The relationship between debt and purchase price is another reason such large amounts of debt are being used in LBOs. The usage of debt enables a private equity firm to purchase companies of a particular size it could otherwise not purchase using equity alone or with a minimal amount of borrowed funds. In addition, the usage of high debt leaves the firm with more unused capital (called \u201cdry powder\u201d) for other investments or add-on acquisitions for their existing portfolio companies.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"How is the maximum leverage used in an LBO typically determined?","a":"The debt-to-equity mix in private equity deals has hovered around 60% debt/40% equity as M&A activity stabilized since the 2008 financial crisis. However, leverage varies significantly across industries, besides being specific to the target company's fundamental qualities. Debt/EBITDA has hovered in the 5.0x to 7.0x range and is pressured upward as overall valuations increase. When LBOs emerged as a type of M&A transaction in the 1980s, debt represented as much as 90% of the capital structure. But this has come down because of the risks inherent to high debt burdens.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"Why might a private equity firm not raise leverage to the maximum leverage, even if it had the option to do so?","a":"Generally, a private equity firm will want to maximize the amount of debt without endangering the company and putting it at risk of default. The reason being more leverage means less required equity and the greater the potential returns. But there are several reasons a private firm might intentionally raise less leverage than the maximum amount that can be raised from lenders: Increased Default Risk: The firm may have doubts regarding whether the acquired company could support the additional debt. Even if the company is in a stable industry and has healthy credit ratios, it's a judgment call by the firm on how much debt to use as a percentage of its total debt capacity. Negative Perception: The firm doesn't want to appear to be using excessive leverage at the company's expense. Nowadays, private equity firms pitch themselves as value-add partners and avoid having a reputation for extracting as much value as they can from a business for their benefit. Decreased Fund Returns/Fundraising Implications: If a firm\u2019s portfolio company declares bankruptcy, this would not only ruin the current fund\u2019s returns, but it would make future fundraising efforts more challenging. Lenders would also be less willing to fund the private equity firm in the future and companies (potential investments) would be reluctant to partner with them. Planned Dividend Recap: The firm might be planning to do a dividend recapitalization later on, especially if it forecasts lower interest rates than the present day. Therefore, there would be remaining debt capacity, and the additional debt capital would be raised under better terms.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What determines a company's debt capacity?","a":"In most cases, a leveraged finance group at an investment bank and the capital markets team will guide a private equity firm looking to raise debt financing. 1. First, the industry risk is typically the starting point to assess what type of The more predictable the free cash flows of the company, the greater its debt capacity and tolerance for a high debt-to-equity mix. financing package could be obtained. Numerous factors would be looked at, such as the industry growth rate, past cyclicality, barriers to entry, the threat of disruption by technological advancements, and regulatory risks. 2. Once the industry has been looked at, the focus will narrow down on the company's competitive position in the market and substitution risk. The objective is to understand how this company compares to the rest of the market and if it has differentiating factors that protect its revenue and margins. 3. Then, the company's historical performance will be closely examined to create a forecast model. The forecast will focus on mostly downside scenarios and look for predictable, steady cash flows, as this allows the company to handle a higher level of debt. 4. Based on scenario analysis from the forecast model, the company's appropriate debt capacity will be determined. This leverage multiple (Total Debt/EBITDA) represents the maximum leverage multiple the debt can be raised up to with a sufficient \"cushion\" that enables it to meet all of its debt obligations even if it were to underperform (e.g., EBITDA drops 20-25%). Note, the leverage and interest coverage ratio parameters will vary significantly based on the industry and the prevailing lending environment. In the context of an LBO, what is the \u201ctax shield\u201d? In an LBO, the \u201ctax shield\u201d refers to the reduction in taxable income from the highly levered capital structure. As interest payments on debt are tax-deductible, the tax savings provide an additional incentive for private equity firms to maximize the amount of leverage they can get for their transactions. Since senior debt is cheaper, why don't financial sponsors fund the entire debt portion of the capital structure with senior debt? Senior lenders will only lend up to a certain point (usually 2.0x to 3.0x EBITDA), beyond which only costlier debt is available because the more debt a company incurs, the higher its risk of default. The senior debt has the lowest risk due to its seniority in the capital structure and imposes the strictest limits on the business via covenants, which require secured interests. Subordinated junior debt is less restrictive but requires higher interest rates than Role of Tax Savings in LBOs more senior tranches of debt.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What is a secondary buyout?","a":"A secondary buyout, or sponsor-to-sponsor deal, is when a private equity firm exits an investment by selling to another private equity firm. There is substantial evidence showing that secondary buyouts have lower returns than traditional buyouts, as many of the operational improvements and value-add opportunities have been exhausted by the previous owner.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"What is a dividend recapitalization?","a":"A dividend recapitalization (or dividend recap) occurs when a financial sponsor, having acquired a company via an LBO, raises additional debt intending to pay themselves a dividend using those newly raised proceeds. In most cases, a dividend recap is completed once the sponsor has paid down a portion of the initial debt raised, which creates additional debt capacity. Therefore, dividend recaps allow for partial monetization and sponsors can de-risk some of their investment, unlike an outright exit via a sale or IPO. As a side benefit, the dividend recap would positively impact the fund\u2019s IRR from the earlier retrieval of funds.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"How can a private equity firm increase the probability of achieving multiple expansion during the sale process?","a":"Building a higher quality business via entering new markets through geographic expansion, product development, or strategic add-ons could help a PE firm fetch higher exit valuations \u2013 and increase the odds of exiting at a higher multiple than entry. Also, exit multiples can expand due to improvements in market conditions, investor sentiment in the relevant sector, and transaction dynamics (e.g., selling to a strategic).","cat":"lbo","diff":2,"src":"Redbook"},{"q":"Why is multiple expansion viewed as a less than ideal lever for value creation?","a":"The standard LBO modeling convention is to conservatively assume the firm will exit at the same EV/EBITDA multiple as the entry multiple. The reason being that the deal environment in the future is unpredictable, and relying on multiple expansion to meet the return threshold is risky, given the amount of uncertainty surrounding the exit. If meeting the return hurdles is contingent on exiting at a higher multiple in the future, the target company may be a less-than-ideal LBO candidate. In comparison, the creation of value through EBITDA growth and debt paydown is easier to develop a plan for than reliance on exiting at a higher multiple, which has many moving pieces out of the investor's control.","cat":"lbo","diff":2,"src":"Redbook"},{"q":"Can you name a scenario when multiple con
